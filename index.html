<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S26 Premium - Auto Precision v37.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000; --card: #151515; --blue: #0a84ff; --green: #30d158; --red: #ff453a; --text: #fff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        .header { font-size: 24px; font-weight: 900; color: var(--blue); margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        .badge { font-size: 10px; background: #333; padding: 4px 8px; border-radius: 6px; color: var(--green); letter-spacing: 1px; }

        .input-box { background: var(--card); border: 1px solid #333; border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 8px; font-weight: bold; }
        input { width: 100%; background: #000; border: 1px solid #444; border-radius: 12px; padding: 15px; color: #fff; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; outline: none; }
        
        .row { display: flex; gap: 10px; }
        
        button { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--blue); color: #fff; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }

        .result-card { background: linear-gradient(145deg, #1a1a1c, #000); border: 1px solid var(--blue); border-radius: 24px; padding: 35px 20px; text-align: center; display: none; margin-top: 20px; }
        .door-time { font-size: 80px; font-weight: 900; color: var(--blue); letter-spacing: -3px; line-height: 1; margin: 15px 0; }
        .train-info { font-size: 16px; color: var(--green); font-weight: bold; margin-bottom: 15px; }
        .meta-info { font-size: 13px; color: #777; border-top: 1px solid #222; padding-top: 15px; line-height: 1.6; }

        #log { background: #050505; border: 1px solid #222; padding: 15px; height: 180px; overflow-y: auto; color: #0f0; font-size: 11px; margin-top: 20px; border-radius: 8px; font-family: 'Cascadia Code', monospace; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span>S26 <span style="color:#fff;">Premium</span></span>
        <span class="badge">v37.0 PRECISION</span>
    </div>

    <div class="input-box">
        <div class="row">
            <div style="flex: 1;"><label>출발역</label><input type="text" id="start" value="상일동"></div>
            <div style="flex: 1;"><label>도착역</label><input type="text" id="dest" value="서울역"></div>
        </div>
        
        <div class="row">
            <div style="flex: 1;"><label>목표 날짜</label><input type="date" id="date"></div>
            <div style="flex: 1;"><label>목표 도착 시각</label><input type="time" id="time" value="10:00"></div>
        </div>
        
        <button onclick="runPrecisionEngine()"><i class="fas fa-satellite-dish"></i> 실배차 정밀 역산 (자동)</button>
    </div>

    <div id="result" class="result-card">
        <div style="font-size: 14px; color: #aaa; font-weight: bold;">이 시각 전까지 도착하려면, 현관문을 나설 시각</div>
        <div id="res-door" class="door-time">--:--</div>
        <div id="res-train" class="train-info"></div>
        <div id="res-meta" class="meta-info"></div>
    </div>

    <div id="log">시스템 대기 중. 도착 시간과 역을 입력하고 실행하세요.</div>
</div>

<script>
    // ★ 사용자님이 생성하신 구글 스크립트 웹앱 주소를 꼭 넣어주세요! ★
    const GOOGLE_PROXY = 'https://script.google.com/macros/s/AKfycbxLWndiEwIbdskJSR1kj3_Zj55bee0Dzoi7Pxet1IkWw46L8mhwGxPYUdx2kYx4bgQUXA/exec';
    
    const KEY = '597057594f6b696d3438526a7a564e';
    const MARGIN = 10;

    window.onload = () => {
        const now = new Date();
        document.getElementById('date').value = now.toISOString().slice(0, 10);
    };

    function printLog(msg, color = "#0f0") {
        const logBox = document.getElementById('log');
        const timeStr = new Date().toLocaleTimeString();
        logBox.innerHTML += `<div style="color:${color}; margin-bottom:4px;">[${timeStr}] ${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    async function runPrecisionEngine() {
        const start = document.getElementById('start').value.trim();
        const dest = document.getElementById('dest').value.trim();
        const dateStr = document.getElementById('date').value; 
        const timeStr = document.getElementById('time').value; 
        
        if (!start || !dest) return alert("출발역과 도착역을 입력하세요.");
        if (GOOGLE_PROXY.includes("여기에_주소_붙여넣기")) return alert("코드 내부의 GOOGLE_PROXY 변수에 구글 스크립트 주소를 넣어주세요!");

        document.getElementById('result').style.display = 'none';
        document.getElementById('log').innerHTML = "";
        
        printLog(`[정밀 엔진 가동] ${start} ➔ ${dest} (${timeStr} 도착 목표)`);

        try {
            let [targetH, targetM] = timeStr.split(':').map(Number);
            let targetTotalMins = targetH * 60 + targetM;
            
            // 1차 검색: 소요 시간을 알아내기 위해 목표시간 기준으로 대충 한 번 찌릅니다.
            const dummyDate = `${dateStr} 12:00:00`; 
            const probeUrl = `http://openapi.seoul.go.kr:8088/${KEY}/xml/getShtrmPath/1/1/${start}/${dest}/${encodeURIComponent(dummyDate)}/1/%20/%20/Y`;
            const probeFetchUrl = `${GOOGLE_PROXY}?url=${encodeURIComponent(probeUrl)}`;
            
            printLog("소요 시간 분석 중...");
            const probeRes = await fetch(probeFetchUrl);
            const probeXml = new DOMParser().parseFromString(await probeRes.text(), "text/xml");
            
            if (probeXml.getElementsByTagName("resultCode")[0]?.textContent !== "00") {
                throw new Error("경로를 찾을 수 없습니다. 역 이름을 확인하세요.");
            }
            
            const travelTimeSecs = probeXml.getElementsByTagName("totalreqHr")[0]?.textContent;
            const travelMins = Math.ceil(Number(travelTimeSecs) / 60);
            printLog(`순수 소요 시간: 약 ${travelMins}분`);

            // 2차 검색: 목표시간에서 소요시간과 버퍼(30분)를 뺀 '진짜 검색 시작 시간' 계산
            // $$ T_{search} = T_{target} - \Delta t_{travel} - 30\text{min} $$
            let searchMins = targetTotalMins - travelMins - 30;
            if (searchMins < 0) searchMins += 24 * 60;
            
            const searchTimeStr = `${String(Math.floor(searchMins/60)).padStart(2,'0')}:${String(searchMins%60).padStart(2,'0')}:00`;
            const realDateTime = `${dateStr} ${searchTimeStr}`;
            
            printLog(`정밀 타격 범위 설정: ${searchTimeStr} 부터 5대 열차 스캔...`);

            const realUrl = `http://openapi.seoul.go.kr:8088/${KEY}/xml/getShtrmPath/1/5/${start}/${dest}/${encodeURIComponent(realDateTime)}/1/%20/%20/Y`;
            const realFetchUrl = `${GOOGLE_PROXY}?url=${encodeURIComponent(realUrl)}`;
            
            const res = await fetch(realFetchUrl);
            const xmlText = await res.text();
            const xmlDoc = new DOMParser().parseFromString(xmlText, "text/xml");

            const paths = xmlDoc.getElementsByTagName("path");
            let bestTrain = null;
            let minDiff = Infinity; 

            // 목표 시간(10:00)을 넘지 않으면서 가장 늦게 도착하는(가장 가까운) 열차 추출
            for (let i = 0; i < paths.length; i++) {
                const arrTime = paths[i].getElementsByTagName("trainArvlTm")[0]?.textContent;
                const depTime = paths[i].getElementsByTagName("trainDptreTm")[0]?.textContent;
                
                if (!arrTime || !depTime) continue;

                let [aH, aM, aS] = arrTime.split(':').map(Number);
                let arrTotalMins = aH * 60 + aM;
                
                let diff = targetTotalMins - arrTotalMins;
                
                // 음수면 목표 시간 초과(지각). 양수이면서 가장 작은 값을 찾음
                if (diff >= 0 && diff < minDiff) {
                    minDiff = diff;
                    bestTrain = { dep: depTime, arr: arrTime };
                }
            }

            if (!bestTrain) {
                throw new Error("설정하신 시간 내에 도착할 수 있는 배차 데이터가 스캔 범위 내에 없습니다.");
            }

            printLog(`✅ 타격 성공: [${bestTrain.dep} 출발 ➔ ${bestTrain.arr} 도착] 열차 픽업 완료.`);

            // 10분 마진 적용 역산
            let [dH, dM, dS] = bestTrain.dep.split(':').map(Number);
            let doorTotalMins = (dH * 60 + dM) - MARGIN;
            
            if (doorTotalMins < 0) doorTotalMins += 24 * 60;
            let doorH = Math.floor(doorTotalMins / 60);
            let doorM = doorTotalMins % 60;

            // UI 렌더링
            document.getElementById('result').style.display = 'block';
            document.getElementById('res-door').innerText = `${String(doorH).padStart(2,'0')}:${String(doorM).padStart(2,'0')}`;
            document.getElementById('res-train').innerText = `${start}역 ${bestTrain.dep} 실제 배차 기준 (-${MARGIN}분 마진)`;
            document.getElementById('res-meta').innerHTML = `
                <b style="color:#fff;">${start} ➔ ${dest}</b><br>
                목적지 실제 도착 시각: <span style="color:var(--green)">${bestTrain.arr}</span> (목표 시간 통과)<br>
                소요 시간: 약 ${travelMins}분
            `;
            
            printLog("모든 계산 완료.", "#30d158");

        } catch (e) {
            printLog(`에러 발생: ${e.message}`, "#ff453a");
        }
    }
</script>
</body>
</html>
