<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>상일동역 리얼 전광판</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000000; --card: #151517; --blue: #0a84ff; --green: #30d158; --text: #ffffff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; }
        
        .widget { padding: 25px; min-height: 100vh; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px; }
        .station-name { font-size: 32px; font-weight: 900; color: var(--blue); letter-spacing: -1px; }
        .version { font-size: 10px; background: #333; padding: 2px 6px; border-radius: 5px; color: #aaa; }

        .board { background: var(--card); border-radius: 24px; padding: 20px; border: 1px solid #222; }
        .board-title { font-size: 14px; font-weight: bold; color: #888; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        .train-list { display: flex; flex-direction: column; gap: 12px; }
        .train-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #222224; border-radius: 16px; transition: 0.2s; }
        .train-item.now { border: 1px solid var(--green); background: #1a2e1f; }
        .train-time { font-size: 24px; font-weight: 800; color: var(--text); font-variant-numeric: tabular-nums; }
        .train-dest { font-size: 14px; color: #aaa; font-weight: 600; }
        .status { font-size: 12px; font-weight: bold; padding: 4px 8px; border-radius: 6px; }
        .s-soon { color: var(--green); background: rgba(48, 209, 88, 0.1); }
        .s-next { color: var(--blue); background: rgba(10, 132, 255, 0.1); }

        .refresh-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--blue); border-radius: 30px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); border: none; color: white; font-size: 20px; }
    </style>
</head>
<body>

    <div class="widget">
        <div class="header">
            <div>
                <div class="version">LIVE DATA</div>
                <div class="station-name">상일동역 <span style="font-size: 18px; color: #555;">5호선</span></div>
            </div>
            <div id="curr-time" style="font-weight: bold; color: #888;">00:00</div>
        </div>

        <div class="board">
            <div class="board-title"><i class="fas fa-list-ul"></i> 실제 배차표 정보</div>
            <div id="train-container" class="train-list">
                <div style="text-align: center; color: #555; padding: 40px;">데이터를 불러오는 중...</div>
            </div>
        </div>
    </div>

    <button class="refresh-btn" onclick="fetchTable()"><i class="fas fa-sync-alt"></i></button>

    <script>
        const API_KEY = 'Rdv6LaA8z0P2BHkKrh/DsA'; // ODsay API Key
        const SANGIL_ID = "553";

        async function fetchTable() {
            const now = new Date();
            document.getElementById('curr-time').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            
            const dayTag = now.getDay() === 0 ? 3 : (now.getDay() === 6 ? 2 : 1);
            const url = `https://api.odsay.com/v1/api/subwayTimeTable?stationID=${SANGIL_ID}&dayTag=${dayTag}&apiKey=${encodeURIComponent(API_KEY)}`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                render(data.result.OrdList.down.list, now); // 하행(방화방면 등) 기준 예시
            } catch(e) {
                document.getElementById('train-container').innerHTML = "데이터 로드 실패";
            }
        }

        function render(list, now) {
            const container = document.getElementById('train-container');
            const nowMins = now.getHours() * 60 + now.getMinutes();
            
            // 현재 시각 이후의 열차 5개 추출
            const upcoming = list
                .map(t => {
                    const [h, m] = t.departureTime.split(':').map(Number);
                    return { ...t, mins: h * 60 + m };
                })
                .filter(t => t.mins >= nowMins)
                .slice(0, 5);

            container.innerHTML = upcoming.map((t, idx) => `
                <div class="train-item ${idx === 0 ? 'now' : ''}">
                    <div>
                        <div class="train-time">${t.departureTime}</div>
                        <div class="train-dest">${t.endStationName}행</div>
                    </div>
                    <div class="status ${idx === 0 ? 's-soon' : 's-next'}">
                        ${idx === 0 ? '진입 예정' : (idx + 1) + '번째 열차'}
                    </div>
                </div>
            `).join('');
        }

        fetchTable();
        setInterval(fetchTable, 60000); // 1분마다 자동 갱신
    </script>
</body>
</html>
