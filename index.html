<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S26 Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000; --card: #151515; --blue: #0a84ff; --green: #30d158; --red: #ff453a; --text: #fff; --orange: #ff9f0a; --purple: #bf5af2; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 50px; }
        
        #header-badge { text-align: right; margin-bottom: 15px; }
        .badge { font-size: 11px; background: #222; padding: 6px 10px; border-radius: 8px; color: var(--purple); font-weight: bold; letter-spacing: 1px; }
        
        .input-box { background: var(--card); border: 1px solid #333; border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        
        .input-label { display: block; font-size: 13px; color: #aaa; margin-bottom: 8px; font-weight: bold; text-align: left; }
        input[type="text"], input[type="time"] { width: 100%; background: #000; border: 1px solid #444; border-radius: 12px; padding: 18px; color: #fff; font-size: 18px; box-sizing: border-box; margin-bottom: 20px; outline: none; font-weight: bold; text-align: center; }
        
        .radio-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .radio-label { flex: 1; text-align: center; background: #000; border: 1px solid #444; border-radius: 12px; padding: 15px; color: #aaa; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .radio-label.active { background: var(--blue); color: #fff; border-color: var(--blue); }
        input[type="radio"] { display: none; }

        button { width: 100%; padding: 20px; border-radius: 14px; border: none; background: var(--blue); color: #fff; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.2s; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        
        #error-box { display: none; background: rgba(255,69,58,0.1); border: 1px solid var(--red); color: var(--red); padding: 15px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; font-size: 14px; text-align: center; line-height: 1.5; word-break: keep-all; }

        #station-selector { display: none; margin-bottom: 20px; }
        .station-btn { background: #222; border: 1px solid #444; color: #fff; padding: 15px; margin-bottom: 10px; border-radius: 12px; text-align: left; display: flex; justify-content: space-between; align-items: center; width: 100%; cursor: pointer; border-left: 4px solid var(--purple); }
        
        .result-card { background: linear-gradient(145deg, #1a1a1c, #000); border: 1px solid var(--blue); border-radius: 24px; padding: 35px 20px; text-align: center; display: none; margin-top: 20px; }
        .door-time { font-size: 85px; font-weight: 900; color: var(--blue); letter-spacing: -4px; margin: 0 0 15px 0; line-height: 1; }
        
        .route-info { font-size: 14px; color: var(--orange); font-weight: bold; margin-bottom: 20px; word-break: keep-all; line-height: 1.4; }
        
        .summary-info { font-size: 14px; color: #aaa; font-weight: bold; margin-bottom: 25px; background: #111; border: 1px solid #333; border-radius: 12px; padding: 16px; display: inline-block; line-height: 1.8; text-align: center; min-width: 70%; }
        .summary-row { margin-top: 10px; }
        .summary-highlight { color: var(--green); }
        
        .weather-box { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 20px; text-align: left; border: 1px solid #222; display: flex; flex-direction: column; gap: 25px; margin-bottom: 0; }
        .w-title { font-size: 16px; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        .w-title.temp { color: var(--orange); }
        .w-title.pop { color: var(--blue); }
        
        .chart-container { position: relative; height: 160px; width: 100%; }
        #w-clothes { font-size: 13px; color: #ddd; line-height: 1.6; margin-top: 15px; }

        .loader-container { display: none; text-align: center; padding: 40px 0; }
        .loader { border: 4px solid #222; border-top: 4px solid var(--blue); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px auto; }
        .loader-text { color: var(--blue); font-size: 13px; font-weight: bold; margin-top: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div id="header-badge">
        <span class="badge">Master (ODsay Native A*)</span>
    </div>

    <div id="error-box"></div>

    <div class="input-box">
        <div class="radio-group">
            <label class="radio-label active" id="label-A"><input type="radio" name="mode" value="A" checked onchange="window.S26App.toggleMode()"> 목적지로</label>
            <label class="radio-label" id="label-B"><input type="radio" name="mode" value="B" onchange="window.S26App.toggleMode()"> 근처역으로</label>
        </div>

        <label class="input-label" for="dest">최종 목적지 (출발: 상일동역 고정)</label>
        <input type="text" id="dest" value="강동한방병원" placeholder="최종 목적지 입력">
        
        <label class="input-label" for="time">도착 목표 시각 (24H)</label>
        <input type="time" id="time" value="10:17">
        
        <button id="btn-submit" onclick="window.S26App.startEngine()"><i class="fas fa-route"></i> 최적 경로 연산 시작</button>
    </div>

    <div id="station-selector">
        <div id="station-list"></div>
    </div>

    <div id="loader" class="loader-container">
        <div class="loader"></div>
        <div class="loader-text">ODsay 시간표 로컬 매칭 중...</div>
    </div>

    <div id="result" class="result-card">
        <div id="res-door" class="door-time">--:--</div>
        <div id="res-route" class="route-info"></div>
        <div id="res-summary" class="summary-info"></div>
        
        <div id="res-weather" class="weather-box">
            <div>
                <div class="w-title temp">🌡️ 고온 <span id="w-temp-max">--</span>°C / 저온 <span id="w-temp-min">--</span>°C</div>
                <div class="chart-container"><canvas id="tempChart"></canvas></div>
                <div id="w-clothes"></div>
            </div>
            <div>
                <div class="w-title pop">☔ 강수 확률</div>
                <div class="chart-container"><canvas id="rainChart"></canvas></div>
            </div>
        </div>
    </div>
</div>

<script>
window.S26App = (function() {
    const CONFIG = {
        ODSAY_KEY: 'Rdv6LaA8z0P2BHkKrh/DsA', 
        KAKAO: '56b6a0adbc28cab6f7c87ac9f84b14d0',
        KMA: 'ddfd71d0b929827fd9c3c1851b50c301f9afb482a3143c0b39e135f9b3b8f070',
        PROXY: 'https://script.google.com/macros/s/AKfycbxRODYhCj2NupEwxZm7YEigfFM_N_wg5TXUHWGtDvirC_clahAQgx7Z4bT94rJX9fZWtg/exec',
        MARGIN: 10,
        WALK_FACTOR: 1.35,  
        WALK_SPEED_MPM: 67,
        SANGIL_SID: 553 // ODsay 기준 상일동역 고유 ID
    };

    let charts = { rain: null, temp: null };
    let tempOptions = [];
    
    // 상일동역 상행/하행 전체 시간표를 캐싱해둘 객체 (통신 딜레이 완전 제거)
    let cachedTimetable = { up: [], down: [] }; 

    const showError = (msg) => {
        const box = document.getElementById('error-box');
        box.innerText = msg;
        box.style.display = 'block';
    };
    const hideError = () => { document.getElementById('error-box').style.display = 'none'; };

    // 자정(0시~3시) 시간대를 24, 25시로 변환하여 역산 꼬임 원천 차단
    const hmToMins = (timeStr) => {
        if (!timeStr) return 0;
        let [h, m] = timeStr.split(':').map(Number);
        if (h < 4) h += 24; 
        return h * 60 + m;
    };
    
    const minsToHm = (mins) => {
        let m = Math.round(mins);
        while(m < 0) m += 24 * 60;
        m = m % (24 * 60);
        return `${String(Math.floor(m / 60)).padStart(2,'0')}:${String(m % 60).padStart(2,'0')}`;
    };

    const cleanStationName = (name) => name.split(' ')[0].split('(')[0].replace(/역$/, '').trim();
    const calcRealWalkMins = (distance) => Math.ceil((distance * CONFIG.WALK_FACTOR) / CONFIG.WALK_SPEED_MPM);

    /* ================= Core API Logics ================= */

    // ★ 1. 상일동역 시간표 최초 1회 전체 로드 (지하철역 전체 시간표 조회)
    const fetchSangilTimetable = async () => {
        if (cachedTimetable.up.length > 0) return cachedTimetable;

        const fetchWay = async (wayCode) => {
            const url = `https://api.odsay.com/v1/api/subwayTimeTable?lang=0&stationID=${CONFIG.SANGIL_SID}&wayCode=${wayCode}&apiKey=${encodeURIComponent(CONFIG.ODSAY_KEY)}`;
            const res = await fetch(`${CONFIG.PROXY}?url=${encodeURIComponent(url)}`);
            const data = await res.json();
            
            if (!data.result) return [];

            const day = new Date().getDay();
            let sched;
            // 요일에 맞는 시간표 자동 선택
            if (day === 0) sched = data.result.SundaySchedule || data.result.sundaySchedule;
            else if (day === 6) sched = data.result.SaturdaySchedule || data.result.saturdaySchedule;
            else sched = data.result.WeekdaySchedule || data.result.weekdaySchedule;

            if (!sched) return [];
            const list = wayCode === 1 ? sched.up : sched.down;
            if (!list) return [];

            // "09:51:00" 문자열을 분(Mins) 단위로 치환하여 오름차순 정렬 저장
            return list.map(item => hmToMins(item.departureTime)).sort((a,b) => a - b);
        };

        try {
            cachedTimetable.up = await fetchWay(1); // 상행 (방화 방면)
            cachedTimetable.down = await fetchWay(2); // 하행 (마천/하남 방면)
        } catch (e) {
            console.warn("시간표 로드 에러 (비상 루프 생성)");
        }

        // ODsay 서버 점검 등 만약의 상황을 대비한 완벽한 6분 간격 비상 시간표 (앱 뻗음 방지)
        if (cachedTimetable.up.length === 0) {
            for(let i = 330; i <= 1440; i += 6) {
                cachedTimetable.up.push(i);
                cachedTimetable.down.push(i);
            }
        }
        return cachedTimetable;
    };

    // ★ 2. ODsay로 특정 역까지의 순수 소요시간(e), 방면(wayCode), 환승경로 탐색
    const fetchSubwayPathInfo = async (stnName) => {
        // 2-1. EID (ODsay Station ID) 획득
        const searchUrl = `https://api.odsay.com/v1/api/searchStation?lang=0&stationName=${encodeURIComponent(stnName)}&CID=1000&stationClass=2&apiKey=${encodeURIComponent(CONFIG.ODSAY_KEY)}`;
        const searchRes = await fetch(`${CONFIG.PROXY}?url=${encodeURIComponent(searchUrl)}`);
        const searchData = await searchRes.json();
        
        if (!searchData.result || !searchData.result.station || searchData.result.station.length === 0) {
            throw new Error("역 ID 조회 실패");
        }
        const eid = searchData.result.station[0].stationID;

        // 2-2. 경로 탐색 (순수 소요시간 e 추출)
        const pathUrl = `https://api.odsay.com/v1/api/subwayPath?lang=0&CID=1000&SID=${CONFIG.SANGIL_SID}&EID=${eid}&Sopt=1&apiKey=${encodeURIComponent(CONFIG.ODSAY_KEY)}`;
        const pathRes = await fetch(`${CONFIG.PROXY}?url=${encodeURIComponent(pathUrl)}`);
        const pathData = await pathRes.json();

        if(!pathData.result || !pathData.result.path || pathData.result.path.length === 0) {
            throw new Error("경로 탐색 실패");
        }

        const path = pathData.result.path[0];
        const e = path.info.totalTime; // 오디세이가 제공하는 완벽한 순수 이동시간(환승 포함)
        
        // 열차 방면(wayCode) 자동 판독 (상행인지 하행인지)
        let wayCode = 1; 
        if (path.subPath) {
            const subwaySubPath = path.subPath.find(sp => sp.trafficType === 1);
            if (subwaySubPath && subwaySubPath.wayCode) {
                wayCode = subwaySubPath.wayCode;
            }
        }

        // 환승경로 텍스트 생성
        let transfers = [];
        if (pathData.result.driveInfoSet && pathData.result.driveInfoSet.driveInfo) {
            const drives = pathData.result.driveInfoSet.driveInfo;
            for (let i = 1; i < drives.length; i++) {
                transfers.push(drives[i].startName + "역(환승)");
            }
        }
        const routeStr = `[경로] 상일동역 탑승 ➔ ${transfers.length > 0 ? transfers.join(' ➔ ') + ' ➔ ' : ''}${stnName}역 하차`;

        return { e, routeStr, wayCode };
    };

    /* ================= 기상청 & 기타 플러그인 ================= */
    const getDynamicKmaBaseTime = () => {
        const now = new Date();
        let h = now.getHours();
        let m = now.getMinutes();
        const baseTimes = [23, 20, 17, 14, 11, 8, 5, 2];
        let baseDate = new Date(now);
        
        if (h < 2 || (h === 2 && m < 15)) {
            baseDate.setDate(baseDate.getDate() - 1);
            h = 23;
        } else {
            if (m < 15) h -= 1; 
            h = baseTimes.find(t => t <= h) || 2;
        }
        return { baseDate: baseDate.toISOString().slice(0,10).replace(/-/g, ''), baseTime: String(h).padStart(2, '0') + '00' };
    };

    const tempThresholdPlugin = {
        id: 'tempThresholds',
        beforeDraw: (chart) => {
            const { ctx, chartArea: { top, right, bottom, left }, scales: { y } } = chart;
            ctx.save();
            [4, 8, 11, 16, 19, 22, 27].forEach(val => {
                const yPos = y.getPixelForValue(val);
                if (yPos > top && yPos < bottom) {
                    ctx.beginPath(); ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)'; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
                    ctx.moveTo(left, yPos); ctx.lineTo(right, yPos); ctx.stroke();
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)'; ctx.font = '10px sans-serif'; ctx.fillText(val + '°C', left + 4, yPos - 4);
                }
            });
            ctx.restore();
        }
    };

    const popThresholdPlugin = {
        id: 'popThreshold',
        beforeDraw: (chart) => {
            const { ctx, chartArea: { top, right, bottom, left }, scales: { y } } = chart;
            ctx.save();
            const yPos = y.getPixelForValue(40);
            if (yPos > top && yPos < bottom) {
                ctx.beginPath(); ctx.strokeStyle = 'rgba(255, 69, 58, 0.6)'; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
                ctx.moveTo(left, yPos); ctx.lineTo(right, yPos); ctx.stroke();
                ctx.fillStyle = 'rgba(255, 69, 58, 0.9)'; ctx.font = 'bold 10px sans-serif'; ctx.fillText('40% 기준선', left + 4, yPos - 4);
            }
            ctx.restore();
        }
    };

    const processWeather = async (lat, lon, targetH) => {
        const grid = dfs_xy_conv(lat, lon);
        const { baseDate, baseTime } = getDynamicKmaBaseTime();
        const url = `https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst?serviceKey=${CONFIG.KMA}&numOfRows=1000&pageNo=1&base_date=${baseDate}&base_time=${baseTime}&nx=${grid.nx}&ny=${grid.ny}&dataType=JSON`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            if(!data.response || !data.response.body) throw new Error("날씨 데이터 파싱 실패");
            
            const items = data.response.body.items.item;
            let hourly = {};
            items.forEach(i => { if(!hourly[i.fcstTime]) hourly[i.fcstTime]={}; hourly[i.fcstTime][i.category]=i.fcstValue; });
            const times = Object.keys(hourly).sort().filter(t => parseInt(t.slice(0,2)) >= targetH && parseInt(t.slice(0,2)) <= 22);
            if(times.length === 0) return;
            
            const temps = times.map(t => parseFloat(hourly[t].TMP));
            const pops = times.map(t => parseInt(hourly[t].POP));
            const labels = times.map(t=>t.slice(0,2)+'시');
            const minT = Math.round(Math.min(...temps)); const maxT = Math.round(Math.max(...temps));

            const rules = [
                { min: 28, max: 99, label: "28도 이상", text: "민소매, 반팔, 반바지" },
                { min: 23, max: 27, label: "27도 ~ 23도", text: "반팔, 얇은 셔츠/바지" },
                { min: 20, max: 22, label: "22도 ~ 20도", text: "긴팔 티셔츠, 얇은 가디건" },
                { min: 17, max: 19, label: "19도 ~ 17도", text: "얇은 니트, 맨투맨, 가을 자켓" },
                { min: 12, max: 16, label: "16도 ~ 12도", text: "자켓, 야상, 두꺼운 가디건" },
                { min: 9, max: 11, label: "11도 ~ 9도", text: "트렌치코트, 야상, 점퍼" },
                { min: 5, max: 8, label: "8도 ~ 5도", text: "코트, 가죽자켓, 히트텍" },
                { min: -99, max: 4, label: "4도 이하", text: "패딩, 두꺼운 코트, 방한용품" }
            ];
            
            let recommendations = [];
            rules.forEach(r => { if (r.min <= maxT && r.max >= minT) recommendations.push(`- <span class="summary-highlight">${r.label}</span> : ${r.text}`); });

            document.getElementById('w-temp-max').innerText = maxT; document.getElementById('w-temp-min').innerText = minT;
            document.getElementById('w-clothes').innerHTML = `${recommendations.join('<br>')}`;
            
            if(charts.temp) charts.temp.destroy();
            charts.temp = new Chart(document.getElementById('tempChart'), {
                type: 'line', data: { labels: labels, datasets: [{ data: temps, borderColor: '#ff9f0a', backgroundColor: 'rgba(255,159,10,0.1)', borderWidth: 2, pointBackgroundColor: '#ff9f0a', fill: true, tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: minT-2, max: maxT+2, ticks: {color: '#888'}, grid: {color: '#333'} }, x: { ticks: {color: '#888'}, grid: {display: false} } } }, plugins: [tempThresholdPlugin]
            });
            if(charts.rain) charts.rain.destroy();
            charts.rain = new Chart(document.getElementById('rainChart'), {
                type: 'line', data: { labels: labels, datasets: [{ data: pops, borderColor: '#0a84ff', backgroundColor: 'rgba(10,132,255,0.1)', borderWidth: 2, pointBackgroundColor: pops.map(p => p >= 40 ? '#ff453a' : '#0a84ff'), fill: true, tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: 0, max: 100, ticks: {color: '#888', stepSize: 20}, grid: {color: '#333'} }, x: { ticks: {color: '#888'}, grid: {display: false} } } }, plugins: [popThresholdPlugin]
            });
        } catch(e) {}
    };

    /* ================= UI Rendering ================= */
    const renderResult = (opt) => {
        document.getElementById('result').style.display = 'block';
        document.getElementById('res-door').innerText = minsToHm(opt.doorDepartureMins);
        document.getElementById('res-route').innerText = opt.train.routeStr;

        const summaryHTML = opt.mode === 'A' 
            ? `<div>열차: <span class="summary-highlight">${opt.train.depText}</span> 탑승 ➔ <span class="summary-highlight">${opt.train.arrText}</span> 하차</div>
               <div class="summary-row">J (출발시각): <span class="summary-highlight">${minsToHm(opt.doorDepartureMins)}</span></div>
               <div class="summary-row">K (최종 도착시각): <span class="summary-highlight">${minsToHm(opt.finalArrivalMins)}</span></div>
               <div class="summary-row">L (도보이동): <span class="summary-highlight">${opt.walkMins}분</span></div>`
            : `<div>열차: <span class="summary-highlight">${opt.train.depText}</span> 탑승 ➔ <span class="summary-highlight">${opt.train.arrText}</span> 하차</div>
               <div class="summary-row">J (출발시각): <span class="summary-highlight">${minsToHm(opt.doorDepartureMins)}</span></div>
               <div class="summary-row">K (역 도착시각): <span class="summary-highlight">${minsToHm(opt.finalArrivalMins)}</span></div>
               <div class="summary-row">L (도보이동): <span style="color:#888;">${opt.walkMins}분</span></div>`;
               
        document.getElementById('res-summary').innerHTML = summaryHTML;
        document.getElementById('result').scrollIntoView({ behavior: 'smooth' }); 
    };

    /* ================= Main A* Engine Controller ================= */
    const startEngine = async () => {
        const btnSubmit = document.getElementById('btn-submit');
        const loader = document.getElementById('loader');
        
        hideError();
        btnSubmit.disabled = true; 
        btnSubmit.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 로컬 시간표 매칭 중...';
        
        document.getElementById('result').style.display = 'none';
        document.getElementById('station-selector').style.display = 'none';
        tempOptions = [];
        loader.style.display = 'block';

        try {
            const dest = document.getElementById('dest').value.trim();
            const targetTimeStr = document.getElementById('time').value;
            const mode = document.querySelector('input[name="mode"]:checked').value;
            const targetArrivalMins = hmToMins(targetTimeStr); 

            // 카카오 장소 검색
            const kRes = await fetch(`https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent(dest)}`, { headers: { Authorization: `KakaoAK ${CONFIG.KAKAO}` }});
            const kData = await kRes.json();
            if(!kData.documents || kData.documents.length === 0) throw new Error(`'${dest}' 장소를 찾을 수 없습니다.`);
            const { x: destX, y: destY } = kData.documents[0];
            
            processWeather(destY, destX, parseInt(targetTimeStr.split(':')[0]));

            // 카카오 지하철역 검색
            const sRes = await fetch(`https://dapi.kakao.com/v2/local/search/category.json?category_group_code=SW8&x=${destX}&y=${destY}&radius=2000&sort=distance`, { headers: { Authorization: `KakaoAK ${CONFIG.KAKAO}` }});
            const sData = await sRes.json();
            if(!sData.documents || sData.documents.length === 0) throw new Error("근처에 지하철역이 존재하지 않습니다.");
            
            let allStations = []; let seen = new Set();
            sData.documents.forEach(doc => {
                let name = cleanStationName(doc.place_name); 
                if (!seen.has(name)) { 
                    seen.add(name); 
                    allStations.push({ name: name, walkMins: calcRealWalkMins(doc.distance) }); 
                }
            });

            // 필터링
            let top5 = allStations.sort((a,b) => a.walkMins - b.walkMins).slice(0, 5);
            const walkMinsFirst = top5[0].walkMins;
            top5 = top5.filter(stn => stn.walkMins < walkMinsFirst + 15);

            // ★ 핵심 1: 상일동역 배차표 로컬 메모리 로드 (통신 지연 완전 제거)
            await fetchSangilTimetable();

            // ★ 핵심 2: ODsay 경로탐색 병렬처리 -> 순수 소요시간(e) 및 방향(wayCode) 확정
            const ePromises = top5.map(async (stn) => {
                try {
                    let routeInfo = await fetchSubwayPathInfo(stn.name);
                    stn.e = routeInfo.e;
                    stn.routeStr = routeInfo.routeStr;
                    stn.wayCode = routeInfo.wayCode; // 1:상행, 2:하행
                    stn.totalTravelMins = stn.walkMins + stn.e;
                    return stn;
                } catch(e) {
                    console.warn(`[스킵] ${stn.name}역:`, e.message);
                    return null; 
                }
            });
            
            let validStations = (await Promise.all(ePromises)).filter(s => s !== null);
            if(validStations.length === 0) throw new Error("ODsay 서버와 통신할 수 없습니다.");

            validStations.sort((a,b) => a.totalTravelMins - b.totalTravelMins);
            const totalTravelFirst = validStations[0].totalTravelMins;
            validStations = validStations.filter(stn => stn.totalTravelMins < totalTravelFirst * 1.15);

            // ★ 핵심 3: 로컬 캐싱된 시간표에서 A* 수학 로직으로 가장 늦은 완벽한 열차 즉시 픽!
            let options = [];
            for (let stn of validStations) {
                // 마지노 도착 시각 계산 (모드 A: 도보 제외, 모드 B: 도보 포함)
                let latestArrival = (mode === 'A') ? (targetArrivalMins - stn.walkMins) : targetArrivalMins;
                let limitDep = latestArrival - stn.e; // I = G - e
                
                // 역 방향에 맞는 시간표 꺼내기
                let targetTimetable = (stn.wayCode === 2) ? cachedTimetable.down : cachedTimetable.up;
                
                let bestDep = -1;
                // 정렬된 캐시 시간표를 순회하며 I 시각을 넘지 않는 가장 늦은 열차를 픽업
                for (let t of targetTimetable) {
                    if (t <= limitDep) bestDep = t;
                    else break; 
                }
                
                if (bestDep !== -1) {
                    let arrM = bestDep + stn.e; // 절대 수식: 탑승 = 하차 - e
                    let doorDep = bestDep - CONFIG.MARGIN;
                    let finalArr = (mode === 'A') ? (arrM + stn.walkMins) : arrM;
                    
                    options.push({
                        stn,
                        doorDepartureMins: doorDep,
                        finalArrivalMins: finalArr,
                        walkMins: stn.walkMins,
                        train: {
                            depM: bestDep,
                            arrM: arrM,
                            depText: minsToHm(bestDep),
                            arrText: minsToHm(arrM),
                            routeStr: stn.routeStr
                        },
                        mode
                    });
                }
            }

            if(options.length === 0) throw new Error("도착 시간에 맞는 적합한 실제 배차표가 없습니다. (막차가 끊겼거나 첫차 이전입니다)");
            
            // J(출발시각) 기준 정렬 (집에서 가장 늦게 나가도 되는 경로가 최적!)
            let maxDoorDep = Math.max(...options.map(o => o.doorDepartureMins));
            let finalOptions = options.filter(o => o.doorDepartureMins > maxDoorDep - 15);
            finalOptions.sort((a,b) => b.doorDepartureMins - a.doorDepartureMins);

            if (mode === 'A') {
                renderResult(finalOptions[0]); // 모드 A는 가장 꿀경로 1개만
            } else {
                if (finalOptions.length === 1) {
                    renderResult(finalOptions[0]);
                } else {
                    tempOptions = finalOptions;
                    let html = '';
                    finalOptions.forEach((opt, idx) => {
                        html += `<button class="station-btn" onclick="window.S26App.selectOption(${idx})">
                            <div style="text-align:left;">
                                <div style="font-size:15px; margin-bottom:4px;"><i class="fas fa-subway"></i> ${opt.stn.name}역 하차</div>
                                <div style="font-size:12px; color:#aaa;">L (도보이동): ${opt.walkMins}분</div>
                            </div>
                            <div style="text-align:right;">
                                <div style="font-size:11px; color:var(--green); margin-bottom:2px;">Jn (출발시각)</div>
                                <div style="font-size:18px; font-weight:bold; color:var(--blue);">${minsToHm(opt.doorDepartureMins)}</div>
                            </div>
                        </button>`;
                    });
                    document.getElementById('station-list').innerHTML = html;
                    document.getElementById('station-selector').style.display = 'block';
                }
            }
        } catch(e) { 
            showError(`[시스템 오류] ${e.message}`);
        } finally {
            loader.style.display = 'none';
            btnSubmit.disabled = false;
            btnSubmit.innerHTML = '<i class="fas fa-route"></i> 최적 경로 연산 시작';
        }
    };

    const toggleMode = () => {
        const mode = document.querySelector('input[name="mode"]:checked').value;
        document.getElementById('label-A').classList.toggle('active', mode === 'A');
        document.getElementById('label-B').classList.toggle('active', mode === 'B');
        document.getElementById('station-selector').style.display = 'none';
        document.getElementById('result').style.display = 'none';
        hideError();
    };

    const selectOption = (idx) => {
        document.getElementById('station-selector').style.display = 'none';
        renderResult(tempOptions[idx]);
    };

    function dfs_xy_conv(v1, v2) {
        const RE = 6371.00877, GRID = 5.0, SLAT1 = 30.0, SLAT2 = 60.0, OLON = 126.0, OLAT = 38.0, XO = 43, YO = 136, DEGRAD = Math.PI / 180.0;
        const re = RE / GRID, slat1 = SLAT1 * DEGRAD, slat2 = SLAT2 * DEGRAD, olon = OLON * DEGRAD, olat = OLAT * DEGRAD;
        let sn = Math.log(Math.cos(slat1) / Math.cos(slat2)) / Math.log(Math.tan(Math.PI * 0.25 + slat2 * 0.5) / Math.tan(Math.PI * 0.25 + slat1 * 0.5));
        let sf = Math.pow(Math.tan(Math.PI * 0.25 + slat1 * 0.5), sn) * Math.cos(slat1) / sn;
        let ro = re * sf / Math.pow(Math.tan(Math.PI * 0.25 + olat * 0.5), sn);
        let ra = re * sf / Math.pow(Math.tan(Math.PI * 0.25 + v1 * DEGRAD * 0.5), sn);
        let theta = v2 * DEGRAD - olon;
        if (theta > Math.PI) theta -= 2.0 * Math.PI; if (theta < -Math.PI) theta += 2.0 * Math.PI;
        return { nx: Math.floor(ra * Math.sin(theta * sn) + XO + 0.5), ny: Math.floor(ro - ra * Math.cos(theta * sn) + YO + 0.5) };
    }

    return { startEngine, toggleMode, selectOption };
})();
</script>
