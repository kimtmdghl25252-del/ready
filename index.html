<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S26 프리미엄 외출 비서</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #ffffff;
            --text-sub: #aaaaaa; --accent-blue: #3e91ff; --accent-orange: #ff9f43;
        }
        body { margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        #initial-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 30px; padding: 40px; }
        .large-btn { width: 100%; height: 120px; background-color: var(--card-bg); border: 2px solid #333; border-radius: 25px; color: var(--text-main); font-size: 22px; font-weight: bold; display: flex; justify-content: center; align-items: center; gap: 15px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        #loading-screen { display: none; flex: 1; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: var(--text-sub); }
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        #station-modal { background: var(--card-bg); padding: 30px; border-radius: 25px; width: 80%; max-width: 400px; text-align: center; }
        .station-option { background: #2a2a2a; color: var(--text-main); border: 1px solid #444; padding: 15px; border-radius: 15px; width: 100%; margin-bottom: 10px; text-align: left; }
        #result-screen { display: none; padding: 20px; flex-direction: column; gap: 20px; }
        .card { background-color: var(--card-bg); border-radius: 20px; padding: 20px; border: 1px solid #2a2a2a; }
        #safety-time { font-size: 40px; font-weight: 900; color: var(--accent-blue); margin: 10px 0; }
        .outfit-row { display: flex; align-items: center; gap: 15px; padding: 15px; background: #2a2a2a; border-radius: 15px; margin-bottom: 10px; }
        #rain-chart-container { height: 200px; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="initial-screen">
        <button class="large-btn" onclick="startProcess('direct')"><i class="fas fa-map-marker-alt"></i> 목적지 바로 앞까지</button>
        <button class="large-btn" onclick="startProcess('station')"><i class="fas fa-subway"></i> 근처 지하철역까지만</button>
    </div>

    <div id="loading-screen">
        <i class="fas fa-spinner fa-spin" style="font-size:50px; color:var(--accent-blue); margin-bottom:20px;"></i>
        <div id="loading-text">장소와 시간을 말씀해주세요...</div>
    </div>

    <div id="modal-overlay"><div id="station-modal"><h3>역 선택</h3><div id="station-list"></div></div></div>

    <div id="result-screen">
        <div class="card" style="border: 2px solid var(--accent-blue);">
            <div>⏰ 최종 출발 시각</div>
            <div id="safety-time">--:--</div>
            <div id="route-detail" style="font-size:14px; color:var(--text-sub);"></div>
        </div>
        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <h2 style="font-size:18px; margin:0;">🌡️ 옷차림 추천</h2>
                <div id="target-temps" style="font-size:14px; color:var(--text-sub);"></div>
            </div>
            <div id="outfit-list"></div>
        </div>
        <div class="card">
            <div style="font-size:16px;">☂️ 강수 확률 (30% 기준)</div>
            <div id="rain-chart-container"><canvas id="rainChart"></canvas></div>
        </div>
    </div>

    <script>
        const KMA_KEY = 'ddfd71d0b929827fd9c3c1851b50c301f9afb482a3143c0b39e135f9b3b8f070';
        const KAKAO_KEY = '56b6a0adbc28cab6f7c87ac9f84b14d0';
        const ODSAY_KEY = 'Rdv6LaA8z0P2BHkKrh/DsA';

        const SANGIL_SUBWAY = { name: "상일동역 (지하철)", sx: 127.1735, sy: 37.5519, mode: 'subway' };
        const SANGIL_BUS = { name: "상일동역1번출구 (버스)", sx: 127.1741, sy: 37.5524, mode: 'bus' };

        let state = { destMode: null, placeName: null, targetTime: null, targetCoords: null };
        let rainChart = null;

        function startProcess(mode) {
            state.destMode = mode;
            document.getElementById('initial-screen').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'flex';
            startSpeechRecognition();
        }

        function startSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) { alert("지원하지 않는 브라우저입니다."); return; }
            const recognition = new SpeechRecognition();
            recognition.lang = 'ko-KR';
            recognition.onresult = (event) => parseSpeech(event.results[0][0].transcript);
            recognition.onerror = () => { document.getElementById('loading-text').innerText = "인식 실패. 다시 시도해주세요."; setTimeout(() => location.reload(), 2000); };
            recognition.start();
        }

        function parseSpeech(text) {
            const timeMatch = text.match(/(\d{1,2})\s*시/);
            if (!timeMatch) { alert("시간(예: 14시)을 포함해 말해주세요."); location.reload(); return; }
            state.targetTime = parseInt(timeMatch[1]);
            state.placeName = text.replace(timeMatch[0], "").trim();
            getCoordsFromKakao();
        }

        async function getCoordsFromKakao() {
            try {
                const response = await fetch(`https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent(state.placeName)}`, {
                    headers: { 'Authorization': `KakaoAK ${KAKAO_KEY}` }
                });
                const data = await response.json();
                if (!data.documents || data.documents.length === 0) throw new Error("장소 검색 결과 없음");
                
                const coords = { x: parseFloat(data.documents[0].x), y: parseFloat(data.documents[0].y) };
                if (state.destMode === 'direct') { state.targetCoords = coords; processAllData(); }
                else { findNearbySubway(coords); }
            } catch (e) { alert(e.message); location.reload(); }
        }

        async function findNearbySubway(coords) {
            const response = await fetch(`https://dapi.kakao.com/v2/local/search/category.json?category_group_code=SW8&x=${coords.x}&y=${coords.y}&radius=1000`, {
                headers: { 'Authorization': `KakaoAK ${KAKAO_KEY}` }
            });
            const data = await response.json();
            if (!data.documents || data.documents.length === 0) { state.targetCoords = coords; processAllData(); return; }
            
            if (data.documents.length === 1) { state.targetCoords = { x: data.documents[0].x, y: data.documents[0].y }; processAllData(); }
            else {
                document.getElementById('modal-overlay').style.display = 'flex';
                const list = document.getElementById('station-list');
                list.innerHTML = '';
                data.documents.forEach(st => {
                    const btn = document.createElement('button');
                    btn.className = 'station-option';
                    btn.innerText = st.place_name;
                    btn.onclick = () => { state.targetCoords = { x: st.x, y: st.y }; document.getElementById('modal-overlay').style.display = 'none'; processAllData(); };
                    list.appendChild(btn);
                });
            }
        }

        async function processAllData() {
            document.getElementById('loading-screen').style.display = 'flex';
            try {
                const [weather, routeA, routeB] = await Promise.all([getKMAWeather(), getODsay(SANGIL_SUBWAY), getODsay(SANGIL_BUS)]);
                updateUI(weather, routeA, routeB);
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('result-screen').style.display = 'flex';
            } catch (e) { alert("데이터 처리 오류"); }
        }

        async function getODsay(org) {
            const res = await fetch(`https://api.odsay.com/v1/api/searchPubTransPathT?SX=${org.sx}&SY=${org.sy}&EX=${state.targetCoords.x}&EY=${state.targetCoords.y}&apiKey=${encodeURIComponent(ODSAY_KEY)}`);
            const data = await res.json();
            return data.result ? { ...org, path: data.result.path[0] } : null;
        }

        async function getKMAWeather() {
            const grid = { x: 62, y: 126 }; // 고덕동 인근 기본값, 실제는 변환 함수 필요하나 오류 방지위해 고정 혹은 단순화
            const now = new Date();
            const bt = now.getHours() < 2 ? "2300" : "0200"; // 단순화된 베이스 타임
            const date = now.toISOString().slice(0,10).replace(/-/g,"");
            const res = await fetch(`https://apis.data.go.kr/1360000/VilageFrcstInfoService_2.0/getVilageFrcst?serviceKey=${KMA_KEY}&pageNo=1&numOfRows=1000&dataType=JSON&base_date=${date}&base_time=${bt}&nx=${grid.x}&ny=${grid.y}`);
            const data = await res.json();
            return data.response?.body?.items?.item || [];
        }

        function updateUI(items, rA, rB) {
            // 1. 교통 로직
            const tA = rA ? rA.path.info.totalTime : 999;
            const tB = rB ? rB.path.info.totalTime : 999;
            const final = (tA - tB >= 15) ? rB : rA;
            const margin = final.mode === 'subway' ? 10 : 25;
            
            const depTime = new Date(); depTime.setHours(state.targetTime, - (final.path.info.totalTime + margin));
            document.getElementById('safety-time').innerText = depTime.toTimeString().slice(0,5);
            document.getElementById('route-detail').innerText = `${final.name} 탑승 (총 ${final.path.info.totalTime}분 소요)`;

            // 2. 날씨 & 옷차림
            const rainData = items.filter(i => i.category === 'POP').map(i => ({ x: i.fcstTime.slice(0,2)+'시', y: parseInt(i.fcstValue) }));
            const temps = items.filter(i => i.category === 'TMP' && parseInt(i.fcstTime.slice(0,2)) >= state.targetTime).map(i => parseInt(i.fcstValue));
            const maxT = Math.max(...temps); const nightT = temps[temps.length-1] || maxT;
            
            document.getElementById('target-temps').innerText = `최고 ${maxT}° / 밤 ${nightT}°`;
            const getOutfit = (t) => {
                if(t>=23) return "반팔, 얇은 셔츠"; if(t>=20) return "긴팔, 면바지"; if(t>=17) return "맨투맨, 가디건";
                if(t>=12) return "자켓, 야상"; if(t>=9) return "트렌치코트, 니트"; return "코트, 히트텍";
            };
            document.getElementById('outfit-list').innerHTML = `<div class="outfit-row"><i class="fas fa-tshirt"></i> 낮: ${getOutfit(maxT)}</div>` + 
                (getOutfit(maxT) !== getOutfit(nightT) ? `<div class="outfit-row"><i class="fas fa-coat"></i> 밤: ${getOutfit(nightT)}</div>` : "");

            // 3. 그래프
            if(rainChart) rainChart.destroy();
            rainChart = new Chart(document.getElementById('rainChart'), {
                type: 'line',
                data: { labels: rainData.map(d=>d.x), datasets: [{ data: rainData.map(d=>d.y), borderColor: '#3e91ff', tension: 0.3 }] },
                options: { maintainAspectRatio: false, plugins: { legend: {display:false} }, scales: { y: { min:0, max:100 } } }
            });
        }
    </script>
</body>
</html>
