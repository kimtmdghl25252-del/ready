<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S26 Premium v18.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000; --card: #151517; --blue: #0a84ff; --green: #30d158; --red: #ff453a; --text: #fff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }
        .container { padding: 25px; max-width: 500px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .brand { font-size: 22px; font-weight: 900; color: var(--blue); letter-spacing: -1px; }
        
        .main-card { background: linear-gradient(160deg, #1c1c1e, #000); border-radius: 35px; padding: 40px 20px; border: 1px solid #2c2c2e; margin-bottom: 25px; text-align: center; }
        .main-label { font-size: 15px; color: #8e8e93; font-weight: 700; margin-bottom: 15px; display: block; }
        .main-time { font-size: 82px; font-weight: 900; color: var(--blue); letter-spacing: -5px; line-height: 1; }
        .main-info { margin-top: 20px; font-size: 16px; color: var(--green); font-weight: 800; }

        .board { background: var(--card); border-radius: 28px; padding: 20px; border: 1px solid #222; }
        .board-title { font-size: 12px; color: #555; margin-bottom: 20px; font-weight: 800; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
        .train-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; border-bottom: 1px solid #222; }
        .train-item:last-child { border-bottom: none; }
        .t-time { font-size: 22px; font-weight: 800; color: #fff; }
        .t-dest { font-size: 13px; color: #666; margin-top: 3px; font-weight: 600; }
        .d-val { font-size: 19px; font-weight: 800; color: var(--blue); }
        .d-label { font-size: 10px; color: #444; font-weight: bold; text-align: right; }

        .loading-box { padding: 100px 0; text-align: center; color: var(--blue); font-weight: 900; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="brand">S26 Premium</div>
            <div id="live-clock" style="font-weight: 800; color: #444;">00:00:00</div>
        </div>

        <div id="content-area">
            <div class="loading-box">
                <i class="fas fa-sync fa-spin"></i><br><br>상일동역 배차 DB 강제 접속 중...
            </div>
        </div>

        <div id="list-area" style="display:none;">
            <div class="board">
                <div class="board-title"><i class="fas fa-subway"></i> 실시간 공식 시간표 (마진 10분)</div>
                <div id="train-list"></div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'Rdv6LaA8z0P2BHkKrh/DsA';
        const SANGIL_ID = "553";
        const MARGIN = 10;

        async function fetchLive() {
            const now = new Date();
            // 2026-03-26 기준 요일 체크 (1:평일, 2:토요일, 3:일요일/공휴일)
            const dayTag = now.getDay() === 0 ? 3 : (now.getDay() === 6 ? 2 : 1);
            
            // [CORS 돌파] 가장 안정적인 corsproxy.io 직접 호출 방식
            const target = `https://api.odsay.com/v1/api/subwayTimeTable?stationID=${SANGIL_ID}&dayTag=${dayTag}&apiKey=${encodeURIComponent(API_KEY)}`;
            const proxy = `https://corsproxy.io/?${encodeURIComponent(target)}`;

            try {
                const res = await fetch(proxy);
                if (!res.ok) throw new Error("네트워크 응답 불안정");
                const data = await res.json();
                
                if (!data.result) throw new Error("API 데이터 없음");

                // 상/하행 데이터 통합 후 시간순 정렬
                const all = [
                    ...(data.result.OrdList.up.list || []),
                    ...(data.result.OrdList.down.list || [])
                ].map(t => {
                    const [h, m] = t.departureTime.split(':').map(Number);
                    return { ...t, mins: h * 60 + m };
                }).sort((a,b) => a.mins - b.mins);

                render(all, now);
            } catch (e) {
                document.getElementById('content-area').innerHTML = `
                    <div class="main-card" style="border-color: var(--red);">
                        <div class="main-label" style="color: var(--red);">데이터 통신 실패</div>
                        <div style="font-size: 14px; color: #888;">${e.message}<br>잠시 후 다시 시도하세요.</div>
                    </div>
                `;
            }
        }

        function render(list, now) {
            const nowMins = now.getHours() * 60 + now.getMinutes();
            // 현재 시각 이후의 열차만 필터링
            const upcoming = list.filter(t => t.mins >= nowMins).slice(0, 5);

            if (upcoming.length > 0) {
                const best = upcoming[0];
                const doorMins = best.mins - MARGIN;
                const h = Math.floor(doorMins / 60);
                const m = doorMins % 60;

                // 메인 카드 업데이트
                document.getElementById('content-area').innerHTML = `
                    <div class="main-card">
                        <span class="main-label">지금 현관문을 나서야 할 시각</span>
                        <div class="main-time">${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}</div>
                        <div class="main-info">실제 ${best.departureTime} 열차 기준 (-10분)</div>
                    </div>
                `;

                // 리스트 표시
                document.getElementById('list-area').style.display = 'block';
                document.getElementById('train-list').innerHTML = upcoming.map(t => {
                    const dm = t.mins - MARGIN;
                    return `
                        <div class="train-item">
                            <div>
                                <div class="t-time">${t.departureTime}</div>
                                <div class="t-dest">${t.endStationName}행</div>
                            </div>
                            <div class="t-departure">
                                <div class="d-label">권장 출발</div>
                                <div class="d-val">${String(Math.floor(dm/60)).padStart(2,'0')}:${String(dm%60).padStart(2,'0')}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }

        // 시계 로직
        setInterval(() => {
            const d = new Date();
            document.getElementById('live-clock').innerText = 
                d.getHours().toString().padStart(2,'0') + ":" + 
                d.getMinutes().toString().padStart(2,'0') + ":" + 
                d.getSeconds().toString().padStart(2,'0');
        }, 1000);

        fetchLive();
    </script>
</body>
</html>
