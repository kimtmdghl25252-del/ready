<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S26 Premium Master vFinal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000; --card: #151515; --blue: #0a84ff; --green: #30d158; --red: #ff453a; --text: #fff; --orange: #ff9f0a; --purple: #bf5af2; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 50px; }
        .header { font-size: 24px; font-weight: 900; color: var(--blue); margin-bottom: 25px; display: flex; align-items: center; justify-content: space-between; }
        .badge { font-size: 10px; background: #333; padding: 4px 8px; border-radius: 6px; color: var(--green); letter-spacing: 1px; }
        .input-box { background: var(--card); border: 1px solid #333; border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 8px; font-weight: bold; }
        input { width: 100%; background: #000; border: 1px solid #444; border-radius: 12px; padding: 15px; color: #fff; font-size: 16px; box-sizing: border-box; margin-bottom: 20px; outline: none; font-weight: bold; }
        button { width: 100%; padding: 18px; border-radius: 14px; border: none; background: var(--blue); color: #fff; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(10, 132, 255, 0.3); }
        button:active { transform: scale(0.98); }
        .result-card { background: linear-gradient(145deg, #1a1a1c, #000); border: 1px solid var(--blue); border-radius: 24px; padding: 35px 20px; text-align: center; display: none; margin-top: 20px; }
        .door-time { font-size: 80px; font-weight: 900; color: var(--blue); letter-spacing: -4px; line-height: 1; margin: 15px 0; }
        .train-info { font-size: 16px; color: var(--green); font-weight: bold; margin-bottom: 20px; }
        .weather-box { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; margin-bottom: 20px; text-align: left; border: 1px solid #333; }
        .chart-container { position: relative; height: 150px; width: 100%; margin-top: 15px; }
        #log { background: #050505; border: 1px solid #222; padding: 15px; height: 150px; overflow-y: auto; color: #0f0; font-size: 11px; margin-top: 20px; border-radius: 12px; font-family: 'Cascadia Code', monospace; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span>S26 <span style="color:#fff;">Premium</span></span>
        <span class="badge">vFINAL TMAP</span>
    </div>

    <div class="input-box">
        <label>목적지 (상일동역 출발 고정)</label>
        <input type="text" id="dest" placeholder="예: 잠실역, 강남역" value="잠실역">
        <label>목표 도착 시각 (24시간제)</label>
        <input type="time" id="time" value="14:00">
        <button onclick="runFinalMaster()"><i class="fas fa-bolt"></i> 스마트 외출 가이드 생성</button>
    </div>

    <div id="result" class="result-card">
        <div style="font-size: 14px; color: #aaa; font-weight: bold;">골든 타임: 현관문을 나설 시각</div>
        <div id="res-door" class="door-time">--:--</div>
        <div id="res-train" class="train-info"></div>
        <div class="weather-box">
            <div id="w-temp" style="font-weight:bold; color:var(--orange);"></div>
            <div id="w-clothes" style="font-size:13px; margin:10px 0; color:#ccc;"></div>
            <div class="chart-container"><canvas id="rainChart"></canvas></div>
        </div>
        <div id="res-meta" style="font-size:13px; color:#777; border-top:1px solid #222; padding-top:15px;"></div>
    </div>

    <div id="log">준비 완료. TMAP & 기상청 API 연동됨.</div>
</div>

<script>
    const CONFIG = {
        KAKAO_KEY: '56b6a0adbc28cab6f7c87ac9f84b14d0',
        TMAP_KEY: '06uWks38SE6WLjWdqbabZ1ZtnfiYxbwK33JXtdAp',
        KMA_KEY: 'ddfd71d0b929827fd9c3c1851b50c301f9afb482a3143c0b39e135f9b3b8f070',
        PROXY: 'https://script.google.com/macros/s/AKfycbxywKA4LXgeBV3FIovlrYIFHIA645jQjQAhPjxzJ-OQ_wusqxZHeqnUNbw0PGswcKssNA/exec',
        START_NAME: '상일동역',
        START_X: '127.1741', // 상일동역 좌표
        START_Y: '37.5562',
        MARGIN: 10
    };

    let rainChart = null;

    function printLog(msg, color="#0f0") {
        const log = document.getElementById('log');
        log.innerHTML += `<div style="color:${color}">> ${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    async function runFinalMaster() {
        const destName = document.getElementById('dest').value;
        const targetTime = document.getElementById('time').value;
        document.getElementById('result').style.display = 'none';
        document.getElementById('log').innerHTML = "";

        try {
            printLog("1. 목적지 지오코딩 및 날씨 스캔...");
            const kRes = await fetch(`https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent(destName)}`, {
                headers: { Authorization: `KakaoAK ${CONFIG.KAKAO_KEY}` }
            });
            const kData = await kRes.json();
            if(!kData.documents[0]) throw new Error("장소를 찾을 수 없습니다.");
            const { x: endX, y: endY } = kData.documents[0];

            // 날씨 프로세스 (기상청)
            processKMAWeather(endY, endX, parseInt(targetTime.split(':')[0]));

            printLog("2. TMAP 정밀 경로 데이터 분석 중...");
            const tmapUrl = `https://apis.openapi.sk.com/tmap/transit/routes`;
            const tmapBody = {
                startX: CONFIG.START_X, startY: CONFIG.START_Y,
                endX: endX, endY: endY,
                count: 5, format: "json"
            };

            const tRes = await fetch(tmapUrl, {
                method: 'POST',
                headers: { "Content-Type": "application/json", "appKey": CONFIG.TMAP_KEY },
                body: JSON.stringify(tmapBody)
            });
            const tData = await tRes.json();
            
            if(!tData.metaData || !tData.metaData.plan.itineraries) throw new Error("TMAP 경로를 찾을 수 없습니다.");

            const targetMins = (parseInt(targetTime.split(':')[0])*60 + parseInt(targetTime.split(':')[1]));
            
            // 도착 시간 기준 최적 경로 필터링
            const itins = tData.metaData.plan.itineraries;
            let bestPath = null;
            let minDiff = Infinity;

            itins.forEach(path => {
                // TMAP은 도착 시각을 직접 주지 않으므로 실시간 배차 기준으로 계산 필요하나, 
                // 여기서는 totalTime을 기반으로 역산 로직 적용
                const totalTimeMins = Math.ceil(path.totalTime / 60);
                const arrivalMins = (new Date().getHours()*60 + new Date().getMinutes()) + totalTimeMins; // 임시 현재기준
                
                // 실제 서비스 시에는 path 내의 상세 시간표(legs)를 분석
                if(totalTimeMins < minDiff) {
                    minDiff = totalTimeMins;
                    bestPath = path;
                }
            });

            // 결과 렌더링
            const totalMins = Math.ceil(bestPath.totalTime / 60);
            const doorMins = targetMins - totalMins - CONFIG.MARGIN;
            
            document.getElementById('result').style.display = 'block';
            document.getElementById('res-door').innerText = minsToHm(doorMins);
            document.getElementById('res-train').innerText = `총 이동 시간: ${totalMins}분 (도보 ${Math.ceil(bestPath.totalWalkTime/60)}분 포함)`;
            document.getElementById('res-meta').innerHTML = `목적지: ${destName}<br>설정 마진: ${CONFIG.MARGIN}분 적용됨`;
            
            printLog("계산 완료. 안전한 외출 되세요!", "#30d158");

        } catch(e) { printLog(e.message, "#ff453a"); }
    }

    function minsToHm(m) {
        m = (m + 1440) % 1440;
        return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
    }

    async function processKMAWeather(lat, lon, targetH) {
        const grid = dfs_xy_conv(lat, lon);
        const baseDate = new Date().toISOString().slice(0,10).replace(/-/g, '');
        const url = `http://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst?serviceKey=${CONFIG.KMA_KEY}&numOfRows=1000&base_date=${baseDate}&base_time=0200&nx=${grid.nx}&ny=${grid.ny}&dataType=JSON`;
        
        try {
            const res = await fetch(`${CONFIG.PROXY}?url=${encodeURIComponent(url)}`);
            const data = await res.json();
            const items = data.response.body.items.item;
            let hourly = {};
            items.forEach(i => { if(!hourly[i.fcstTime]) hourly[i.fcstTime]={}; hourly[i.fcstTime][i.category]=i.fcstValue; });
            
            const times = Object.keys(hourly).sort().filter(t => parseInt(t.slice(0,2)) >= targetH);
            const temps = times.map(t => parseFloat(hourly[t].TMP));
            const pops = times.map(t => parseInt(hourly[t].POP));
            
            const maxT = Math.max(...temps);
            document.getElementById('w-temp').innerText = `기온: ${Math.min(...temps)}°C ~ ${maxT}°C`;
            document.getElementById('w-clothes').innerText = "코디 추천: " + (maxT > 23 ? "반팔과 얇은 바지" : "자켓 혹은 니트류");
            
            if(rainChart) rainChart.destroy();
            rainChart = new Chart(document.getElementById('rainChart'), {
                type: 'line',
                data: { labels: times.map(t=>t.slice(0,2)+'시'), datasets: [{ data: pops, borderColor: '#0a84ff', fill: true, backgroundColor: 'rgba(10,132,255,0.1)' }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: 0, max: 100 } } }
            });
        } catch(e) {}
    }

    function dfs_xy_conv(v1, v2) {
        const RE = 6371.00877, GRID = 5.0, SLAT1 = 30.0, SLAT2 = 60.0, OLON = 126.0, OLAT = 38.0, XO = 43, YO = 136, DEGRAD = Math.PI / 180.0;
        const re = RE / GRID, slat1 = SLAT1 * DEGRAD, slat2 = SLAT2 * DEGRAD, olon = OLON * DEGRAD, olat = OLAT * DEGRAD;
        let sn = Math.log(Math.cos(slat1) / Math.cos(slat2)) / Math.log(Math.tan(Math.PI * 0.25 + slat2 * 0.5) / Math.tan(Math.PI * 0.25 + slat1 * 0.5));
        let sf = Math.pow(Math.tan(Math.PI * 0.25 + slat1 * 0.5), sn) * Math.cos(slat1) / sn;
        let ro = re * sf / Math.pow(Math.tan(Math.PI * 0.25 + olat * 0.5), sn);
        let ra = re * sf / Math.pow(Math.tan(Math.PI * 0.25 + v1 * DEGRAD * 0.5), sn);
        let theta = v2 * DEGRAD - olon;
        if (theta > Math.PI) theta -= 2.0 * Math.PI; if (theta < -Math.PI) theta += 2.0 * Math.PI;
        return { nx: Math.floor(ra * Math.sin(theta * sn) + XO + 0.5), ny: Math.floor(ro - ra * Math.cos(theta * sn) + YO + 0.5) };
    }
</script>
</body>
</html>
