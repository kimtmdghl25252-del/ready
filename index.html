<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S26 외출 비서 v7.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #ffffff; --sub: #aaaaaa; --blue: #3e91ff; --red: #ff4d4d; --green: #2ecc71; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; }
        .screen { display: none; flex-direction: column; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        .btn-large { width: 100%; height: 100px; background: var(--card); border: 1px solid #333; border-radius: 20px; color: var(--text); font-size: 20px; font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 15px; cursor: pointer; }
        .card { background: var(--card); border-radius: 25px; padding: 20px; margin-bottom: 20px; border: 1px solid #2a2a2a; position: relative; overflow: hidden; }
        .time-val { font-size: 56px; font-weight: 900; color: var(--blue); letter-spacing: -2px; }
        .route-box { background: #1a1a1a; border-left: 4px solid var(--blue); padding: 15px; margin-top: 10px; font-size: 14px; line-height: 1.7; border-radius: 0 15px 15px 0; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; margin-right: 6px; color: white; }
        .b-subway { background: var(--blue); }
        .b-bus { background: var(--red); }
        .real-time-info { position: absolute; top: 20px; right: 20px; font-size: 12px; color: var(--green); font-weight: bold; text-align: right; }
    </style>
</head>
<body>

    <div id="sc-main" class="screen active" style="justify-content: center;">
        <button class="btn-large" onclick="init('direct')"><i class="fas fa-location-arrow"></i> 목적지 바로 앞까지</button>
        <button class="btn-large" onclick="init('station')"><i class="fas fa-train-subway"></i> 근처 지하철역까지만</button>
    </div>

    <div id="sc-load" class="screen" style="justify-content: center; align-items: center;">
        <i class="fas fa-spinner fa-spin" style="font-size: 50px; color: var(--blue); margin-bottom: 20px;"></i>
        <div id="load-msg" style="text-align:center;">실제 배차 시간표와<br>도착 시각을 매칭 중입니다...</div>
    </div>

    <div id="sc-select" class="screen">
        <h2 style="color: var(--blue); padding: 10px;">하차역 선택</h2>
        <div id="station-list"></div>
    </div>

    <div id="sc-result" class="screen">
        <div id="result-container"></div>
        <div class="card">
            <h3 style="margin:0 0 15px 0; font-size: 16px;">🌡️ 활동 시간 옷차림</h3>
            <div id="outfit-info"></div>
        </div>
        <div class="card">
            <h3 style="margin:0 0 15px 0; font-size: 16px;">☂️ 강수 확률</h3>
            <div style="height: 150px;"><canvas id="chart"></canvas></div>
        </div>
    </div>

    <script>
        const KEY = { K: '56b6a0adbc28cab6f7c87ac9f84b14d0', M: 'ddfd71d0b929827fd9c3c1851b50c301f9afb482a3143c0b39e135f9b3b8f070', O: 'Rdv6LaA8z0P2BHkKrh/DsA' };
        
        // 정밀 좌표 고정
        const POS = {
            BUS: { name: "상일동역 1번출구(버스)", x: 127.164253, y: 37.556658 },
            SUB: { name: "상일동역 1번출구(지하철)", x: 127.166029, y: 37.557058 }
        };

        let app = { mode: '', targetH: 0, place: '', walk: 0 };

        function setSc(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function init(mode) {
            app.mode = mode;
            setSc('sc-load');
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'ko-KR';
            rec.onresult = async (e) => {
                const txt = e.results[0][0].transcript;
                const tm = txt.match(/(\d{1,2})\s*시/);
                if(!tm) { alert("도착 시간(예: 14시)을 포함해주세요."); location.reload(); return; }
                app.targetH = parseInt(tm[1]);
                app.place = txt.replace(tm[0], "").trim();

                try {
                    const kUrl = `https://corsproxy.io/?${encodeURIComponent(`https://dapi.kakao.com/v2/local/search/keyword.json?query=${app.place}`)}`;
                    const kRes = await fetch(kUrl, { headers: { 'Authorization': `KakaoAK ${KEY.K}` } });
                    const kData = await kRes.json();
                    const dx = kData.documents[0].x, dy = kData.documents[0].y;
                    
                    if(app.mode === 'station') {
                        const sUrl = `https://corsproxy.io/?${encodeURIComponent(`https://dapi.kakao.com/v2/local/search/category.json?category_group_code=SW8&x=${dx}&y=${dy}&radius=1500&sort=distance`)}`;
                        const sRes = await fetch(sUrl, { headers: { 'Authorization': `KakaoAK ${KEY.K}` } });
                        const sData = await sRes.json();
                        renderStations(sData.documents, dx, dy);
                    } else { fetchData(dx, dy); }
                } catch(e) { alert("장소를 찾지 못했습니다."); location.reload(); }
            };
            rec.start();
        }

        function renderStations(list, dx, dy) {
            setSc('sc-select');
            const cont = document.getElementById('station-list');
            const filtered = list.filter(s => (s.distance/67) <= 15);
            cont.innerHTML = filtered.length ? filtered.map(s => `
                <button class="btn-station" style="width:100%; background:#252525; border:1px solid var(--blue); color:white; padding:15px; border-radius:15px; margin-bottom:10px; text-align:left;" 
                onclick="selectSt('${s.x}','${s.y}',${Math.ceil(s.distance/67)})"><b>${s.place_name}</b><br>하차 후 도보 ${Math.ceil(s.distance/67)}분</button>
            `).join('') : `<button class="btn-station" onclick="selectSt('${dx}','${dy}',0)">목적지 바로 안내</button>`;
        }

        function selectSt(x, y, w) { app.walk = w; setSc('sc-load'); fetchData(x, y); }

        async function fetchData(ex, ey) {
            // [핵심] SearchType=1: 도착 시각 기준 조회
            // app.targetH 시 00분에 도착하는 가장 늦은 경로를 찾음
            const oUrl = `https://api.odsay.com/v1/api/searchPubTransPathT?SX=${POS.SUB.x}&SY=${POS.SUB.y}&EX=${ex}&EY=${ey}&SearchType=1&ArrivalTime=${String(app.targetH).padStart(2,'0')}00&apiKey=${encodeURIComponent(KEY.O)}`;
            const date = new Date(new Date().getTime() + 32400000).toISOString().slice(0,10).replace(/-/g,"");
            const wUrl = `https://corsproxy.io/?${encodeURIComponent(`https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst?serviceKey=${KEY.M}&pageNo=1&numOfRows=1000&dataType=JSON&base_date=${date}&base_time=0200&nx=62&ny=126`)}`;
            
            const [rRes, wRes] = await Promise.all([fetch(oUrl), fetch(wUrl)]);
            renderFinal(await rRes.json(), await wRes.json());
        }

        function renderFinal(r, w) {
            setSc('sc-result');
            const container = document.getElementById('result-container');
            container.innerHTML = "";
            
            // 첫 도보 1분 이내 경로만 필터링
            const paths = r.result?.path?.filter(p => p.subPath[0].trafficType !== 3 || p.subPath[0].sectionTime <= 1) || [];
            
            // 지하철 전용 vs 버스 포함 경로 분리
            const subway = paths.filter(p => p.pathType === 1).sort((a,b) => b.info.lastTransitDepartureTime - a.info.lastTransitDepartureTime)[0];
            const bus = paths.filter(p => p.pathType !== 1).sort((a,b) => b.info.lastTransitDepartureTime - a.info.lastTransitDepartureTime)[0];

            let displayList = [];
            if (subway && bus) {
                const diff = subway.info.totalTime - bus.info.totalTime;
                if (diff <= 0) displayList = [subway];
                else if (diff < 15) displayList = [subway, bus];
                else displayList = [bus];
            } else {
                if (subway) displayList.push(subway);
                else if (bus) displayList.push(bus);
            }

            if (!displayList.length) { container.innerHTML = "<div class='card'>해당 시간에 도착 가능한 배차가 없습니다.</div>"; return; }

            displayList.forEach((p, idx) => {
                const isBus = p.pathType !== 1;
                const margin = isBus ? 15 : 10;
                
                // [배차 기반 역산 로직] 
                // p.info.firstStartStationPointTime: 실제 타야 하는 첫 차 시각 (예: "13:05")
                const carTime = p.info.firstStartStationPointTime; 
                let finalH, finalM;
                
                if (carTime && carTime.includes(':')) {
                    const [h, m] = carTime.split(':').map(Number);
                    const totalMins = h * 60 + m - margin;
                    finalH = Math.floor(totalMins / 60);
                    finalM = totalMins % 60;
                } else {
                    // 차 정보가 없을 경우 이론적 계산
                    const dep = new Date();
                    dep.setHours(app.targetH, -(p.info.totalTime + margin));
                    finalH = dep.getHours();
                    finalM = dep.getMinutes();
                }

                const card = document.createElement('div');
                card.className = 'card';
                if(idx === 0 && displayList.length > 1) card.style.borderTop = "6px solid var(--blue)";
                
                let html = `<div class="real-time-info">${carTime || '--:--'} 차량 탑승 기준</div>`;
                html += `<div style="font-size:14px; font-weight:bold; color:var(--green);">${isBus ? '🚌 버스/복합 경로' : '🚇 지하철 전용'}</div>`;
                html += `<div class="time-val">${String(finalH).padStart(2,'0')}:${String(finalM).padStart(2,'0')}</div>`;
                html += `<div style="font-size:14px; color:var(--sub); margin-top:-5px;">현관문을 나서야 할 시각 (여유 ${margin}분)</div>`;
                
                html += `<div class="route-box">` + p.subPath.filter(s => s.trafficType !== 3).map((s, i) => `
                    <div><span class="badge ${s.trafficType===1?'b-subway':'b-bus'}">${s.trafficType===1?s.lane[0].name:s.lane[0].busNo}</span> 
                    <b>${s.startName}</b> 탑승 ➔ <b>${s.endName}</b></div>
                `).join('<div style="font-size:10px; margin-left:15px; color:#555;">▼ 환승</div>') + `</div>`;
                
                card.innerHTML = html;
                container.appendChild(card);
            });

            renderWeather(w);
        }

        function renderWeather(w) {
            const items = w.response?.body?.items?.item || [];
            const v = items.filter(i => i.fcstTime >= String(app.targetH).padStart(2,'0')+"00" && i.fcstTime <= "2200");
            if(v.length) {
                const t = v.filter(i => i.category==='TMP').map(i => parseInt(i.fcstValue));
                const mx = Math.max(...t);
                const out = mx >= 23 ? "반팔" : mx >= 20 ? "얇은 긴팔" : mx >= 17 ? "맨투맨/니트" : mx >= 12 ? "자켓/야상" : "코트";
                document.getElementById('outfit-info').innerHTML = `최고 기온 <b>${mx}°</b> 기준 추천: <b>${out}</b>`;
                const p = v.filter(i => i.category==='POP');
                new Chart(document.getElementById('chart'), {
                    type: 'bar',
                    data: { labels: p.map(i => i.fcstTime.slice(0,2)+'시'), datasets: [{ data: p.map(i => i.fcstValue), backgroundColor: p.map(i => i.fcstValue >= 40 ? '#ff4d4d' : '#3e91ff'), borderRadius: 5 }] },
                    options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: 0, max: 100 } } }
                });
            }
        }
    </script>
</body>
</html>
