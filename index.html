<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S26 Debugger v27.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000; --blue: #0a84ff; --card: #1c1c1e; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Cascadia Code', monospace; }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        #console { 
            background: #0a0a0a; border: 1px solid #333; padding: 15px; 
            height: 180px; overflow-y: auto; font-size: 11px; color: #0f0; 
            margin-top: 15px; border-radius: 10px; line-height: 1.4;
        }
        .input-card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #333; }
        input { width: 100%; background: #000; border: 1px solid #444; border-radius: 10px; padding: 12px; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 15px; border: none; background: var(--blue); color: #fff; font-weight: bold; }
        .result-box { background: #111; border: 1px solid var(--blue); border-radius: 20px; padding: 25px; margin-top: 20px; text-align: center; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div style="font-size: 18px; font-weight: 900; color: var(--blue); margin-bottom: 20px;">SYSTEM CALIBRATION v27.0</div>

    <div class="input-card">
        <label style="font-size:11px; color:#888;">DESTINATION</label>
        <input type="text" id="dest" value="서울역">
        <div style="display:flex; gap:10px;">
            <input type="date" id="date">
            <input type="time" id="time">
        </div>
        <button onclick="safeRequest()">REQUEST DATA</button>
    </div>

    <div id="result" class="result-box">
        <div id="door-time" style="font-size: 64px; font-weight: 900; color: var(--blue);">--:--</div>
        <div id="train-info" style="color: #30d158; font-weight: bold; font-size: 14px; margin-top: 10px;"></div>
    </div>

    <div id="console"></div>
</div>

<script>
    const KEY = '597057594f6b696d3438526a7a564e';
    const START = "상일동";

    window.onload = () => {
        const now = new Date();
        document.getElementById('date').value = now.toISOString().slice(0, 10);
        document.getElementById('time').value = now.toTimeString().slice(0, 5);
        log("Ready to fetch. Port 8088 removed for stability.");
    };

    function log(msg, color = "#0f0") {
        const con = document.getElementById('console');
        con.innerHTML += `<div style="color:${color}">> ${msg}</div>`;
        con.scrollTop = con.scrollHeight;
    }

    async function safeRequest() {
        const dest = document.getElementById('dest').value.trim().replace(/역$/, "");
        const date = document.getElementById('date').value.replace(/-/g, "");
        const time = document.getElementById('time').value.replace(/:/g, "");
        
        // 1. [구문 보정] 포트번호를 빼고 표준 swopenAPI 도메인 사용
        // 2. [파라미터 보정] 뒤쪽 빈 항목들(///Y)까지 명시적으로 채움
        const apiUrl = `http://swopenAPI.seoul.go.kr/api/subway/${KEY}/json/subwayShortestRoute/1/1/${START}/${dest}/${date}${time}/1///Y`;
        
        log(`Requesting: ${dest}`);
        
        // corsproxy.io의 522 에러 회피를 위해 프록시 주소 형식 변경
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`;

        try {
            const res = await fetch(proxyUrl);
            const wrapper = await res.json();
            const rawData = wrapper.contents;

            // HTML이 오는지 확인
            if (rawData.includes("<!DOCTYPE") || rawData.includes("<html")) {
                log("Error: Target server returned HTML. Check API Key or Path.", "red");
                return;
            }

            const data = JSON.parse(rawData);
            
            // 서울시 API는 대소문자를 섞어서 쓰기도 하니 확인 절차 필요
            const root = data.subwayShortestRoute || data.shortestRoute;

            if (root && (root.resultCode === "00" || root.status === 200)) {
                log("Data Synced Successfully.", "#30d158");
                process(root);
            } else {
                log(`API Logic Error: ${root ? root.resultMsg : 'Unknown'}`, "red");
            }

        } catch (e) {
            log(`Network Exception: ${e.message}`, "red");
        }
    }

    function process(data) {
        // XML 데이터 구조를 JSON으로 매칭
        const paths = data.paths || data.shortestRouteList;
        const firstTrain = paths[0].trainDptreTm || paths[0].shtStatnNmList; // 필드명 재확인 필요
        
        if (!firstTrain) {
            log("Timetable data missing in response.", "orange");
            return;
        }

        let [h, m, s] = firstTrain.split(':').map(Number);
        let total = (h * 60 + m) - 10;

        document.getElementById('result').style.display = 'block';
        document.getElementById('door-time').innerText = `${String(Math.floor(total/60)).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`;
        document.getElementById('train-info').innerText = `Actual Train: ${firstTrain}`;
    }
</script>
</body>
</html>
