<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S26 Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000; --card: #151515; --blue: #0a84ff; --green: #30d158; --red: #ff453a; --text: #fff; --orange: #ff9f0a; --purple: #bf5af2; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 50px; }
        
        #header-badge { text-align: right; margin-bottom: 15px; }
        .badge { font-size: 11px; background: #222; padding: 6px 10px; border-radius: 8px; color: var(--purple); font-weight: bold; letter-spacing: 1px; }
        
        .input-box { background: var(--card); border: 1px solid #333; border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        input[type="text"], input[type="time"] { width: 100%; background: #000; border: 1px solid #444; border-radius: 12px; padding: 18px; color: #fff; font-size: 18px; box-sizing: border-box; margin-bottom: 20px; outline: none; font-weight: bold; text-align: center; }
        
        .radio-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .radio-label { flex: 1; text-align: center; background: #000; border: 1px solid #444; border-radius: 12px; padding: 15px; color: #aaa; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .radio-label.active { background: var(--blue); color: #fff; border-color: var(--blue); }
        input[type="radio"] { display: none; }

        button { width: 100%; padding: 20px; border-radius: 14px; border: none; background: var(--blue); color: #fff; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.2s; }
        
        #station-selector { display: none; margin-bottom: 20px; }
        .station-btn { background: #222; border: 1px solid #444; color: #fff; padding: 15px; margin-bottom: 10px; border-radius: 12px; text-align: left; display: flex; justify-content: space-between; align-items: center; width: 100%; cursor: pointer; border-left: 4px solid var(--purple); }
        
        .result-card { background: linear-gradient(145deg, #1a1a1c, #000); border: 1px solid var(--blue); border-radius: 24px; padding: 35px 20px; text-align: center; display: none; margin-top: 20px; }
        .door-time { font-size: 85px; font-weight: 900; color: var(--blue); letter-spacing: -4px; margin: 0 0 15px 0; line-height: 1; }
        
        /* 경로 텍스트 UI (이미지 참고) */
        .route-info { font-size: 14px; color: var(--orange); font-weight: bold; margin-bottom: 20px; word-break: keep-all; line-height: 1.4; }
        
        /* J, K, L 출력 박스 */
        .summary-info { font-size: 14px; color: #aaa; font-weight: bold; margin-bottom: 25px; background: #111; border: 1px solid #333; border-radius: 12px; padding: 16px; display: inline-block; line-height: 1.8; text-align: center; min-width: 70%; }
        .summary-info span { color: var(--green); }
        
        .weather-box { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 20px; text-align: left; border: 1px solid #222; display: flex; flex-direction: column; gap: 25px; margin-bottom: 0; }
        
        .w-title { font-size: 16px; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        .w-title.temp { color: var(--orange); }
        .w-title.pop { color: var(--blue); }
        
        .chart-container { position: relative; height: 160px; width: 100%; }
        #w-clothes { font-size: 13px; color: #ddd; line-height: 1.6; margin-top: 15px; }

        .loader-container { display: none; text-align: center; padding: 40px 0; }
        .loader { border: 4px solid #222; border-top: 4px solid var(--blue); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px auto; }
        .loader-text { color: var(--blue); font-size: 13px; font-weight: bold; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div id="header-badge">
        <span class="badge">Master (A* Algo)</span>
    </div>

    <div class="input-box">
        <div class="radio-group">
            <label class="radio-label active" id="label-A"><input type="radio" name="mode" value="A" checked onchange="window.toggleMode()"> 목적지로</label>
            <label class="radio-label" id="label-B"><input type="radio" name="mode" value="B" onchange="window.toggleMode()"> 근처역으로</label>
        </div>

        <input type="text" id="dest" value="천호보건지소" placeholder="최종 목적지 입력">
        <input type="time" id="time" value="10:02">
        
        <button onclick="window.startEngine()"><i class="fas fa-route"></i> 최적 경로 연산 시작</button>
    </div>

    <div id="station-selector">
        <div id="station-list"></div>
    </div>

    <div id="loader" class="loader-container">
        <div class="loader"></div>
        <div class="loader-text">A* 알고리즘 역산 중...</div>
    </div>

    <div id="result" class="result-card">
        <div id="res-door" class="door-time">--:--</div>
        
        <div id="res-route" class="route-info"></div>
        
        <div id="res-summary" class="summary-info"></div>
        
        <div id="res-weather" class="weather-box">
            <div>
                <div class="w-title temp">🌡️ 고온 <span id="w-temp-max">--</span>°C / 저온 <span id="w-temp-min">--</span>°C</div>
                <div class="chart-container"><canvas id="tempChart"></canvas></div>
                <div id="w-clothes"></div>
            </div>
            
            <div>
                <div class="w-title pop">☔ 강수 확률</div>
                <div class="chart-container"><canvas id="rainChart"></canvas></div>
            </div>
        </div>
    </div>
</div>

<script>
    // 전역 스코프 유지 보장
    window.CONFIG = {
        KAKAO: '56b6a0adbc28cab6f7c87ac9f84b14d0',
        SEOUL: '597057594f6b696d3438526a7a564e',
        KMA: 'ddfd71d0b929827fd9c3c1851b50c301f9afb482a3143c0b39e135f9b3b8f070',
        PROXY: 'https://script.google.com/macros/s/AKfycbxRODYhCj2NupEwxZm7YEigfFM_N_wg5TXUHWGtDvirC_clahAQgx7Z4bT94rJX9fZWtg/exec',
        MARGIN: 10 // 외출 여유시간 10분
    };

    window.rainChart = null; 
    window.tempChart = null;
    window.tempOptions = [];
    window.sangilTimetable = null; // 상일동 시간표 DB 캐싱용

    window.toggleMode = function() {
        const mode = document.querySelector('input[name="mode"]:checked').value;
        document.getElementById('label-A').classList.toggle('active', mode === 'A');
        document.getElementById('label-B').classList.toggle('active', mode === 'B');
        document.getElementById('station-selector').style.display = 'none';
        document.getElementById('result').style.display = 'none';
    };

    window.hmToMins = function(timeStr) {
        if (!timeStr) return 0;
        let parts = timeStr.split(':').map(Number);
        return parts[0] * 60 + parts[1];
    };
    
    window.minsToHm = function(mins) {
        let m = Math.round(mins);
        while(m < 0) m += 24 * 60;
        m = m % (24 * 60);
        return `${String(Math.floor(m / 60)).padStart(2,'0')}:${String(m % 60).padStart(2,'0')}`;
    };

    window.cleanStationName = function(name) { return name.split(' ')[0].split('(')[0].replace(/역$/, '').trim(); };
    window.calcRealWalkMins = function(straightDistance) { return Math.ceil((straightDistance * 1.35) / 67); };

    // 스마트 기준선 플러그인
    window.tempThresholdPlugin = {
        id: 'tempThresholds',
        beforeDraw: (chart) => {
            const { ctx, chartArea: { top, right, bottom, left }, scales: { y } } = chart;
            ctx.save();
            const thresholds = [4, 8, 11, 16, 19, 22, 27];
            thresholds.forEach(val => {
                const yPos = y.getPixelForValue(val);
                if (yPos > top && yPos < bottom) {
                    ctx.beginPath();
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
                    ctx.lineWidth = 1;
                    ctx.setLineDash([3, 3]);
                    ctx.moveTo(left, yPos);
                    ctx.lineTo(right, yPos);
                    ctx.stroke();
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                    ctx.font = '10px sans-serif';
                    ctx.fillText(val + '°C', left + 4, yPos - 4);
                }
            });
            ctx.restore();
        }
    };

    window.popThresholdPlugin = {
        id: 'popThreshold',
        beforeDraw: (chart) => {
            const { ctx, chartArea: { top, right, bottom, left }, scales: { y } } = chart;
            ctx.save();
            const yPos = y.getPixelForValue(40);
            if (yPos > top && yPos < bottom) {
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(255, 69, 58, 0.6)';
                ctx.lineWidth = 1;
                ctx.setLineDash([3, 3]);
                ctx.moveTo(left, yPos);
                ctx.lineTo(right, yPos);
                ctx.stroke();
                ctx.fillStyle = 'rgba(255, 69, 58, 0.9)';
                ctx.font = 'bold 10px sans-serif';
                ctx.fillText('40% 기준선', left + 4, yPos - 4);
            }
            ctx.restore();
        }
    };

    // ★ 15분 오류 완벽 차단: JSON 기반 최단경로 조회 (e와 환승경로 추출)
    window.fetchE = async function(stnName) {
        let e = -1; // 에러 감지용
        let routeStr = `[경로] 상일동역 탑승 ➔ ${stnName}역 하차`;
        try {
            const url = `http://swopenapi.seoul.go.kr/api/subway/${window.CONFIG.SEOUL}/json/shortestRoute/0/1/상일동/${encodeURIComponent(stnName)}`;
            const res = await fetch(`${window.CONFIG.PROXY}?url=${encodeURIComponent(url)}`);
            const data = await res.json();
            if(data.shortestRouteList && data.shortestRouteList.length > 0) {
                e = parseInt(data.shortestRouteList[0].shtTravelTm, 10);
                let msg = data.shortestRouteList[0].shtTransferMsg;
                if(msg) {
                    // 예: "천호역에서 8호선 환승" ➔ "상일동 ➔ 천호역(환승) ➔ 도착역"
                    let transfers = msg.split(',').map(s => s.trim().split('역에서')[0] + '역(환승)');
                    routeStr = `[경로] 상일동역 탑승 ➔ ${transfers.join(' ➔ ')} ➔ ${stnName}역 하차`;
                }
            }
        } catch(err) {}
        
        // 정 못 가져오면 대략적인 (정거장*2분) 로직 적용 (최소한 15분 고정 오류는 막음)
        if(e === -1) e = 10; 
        return { e, routeStr };
    };

    // ★ 상일동역 실제 시간표(Timetable) DB 구축 (빠른 역산 매칭용)
    window.getSangilTimetable = async function() {
        if(window.sangilTimetable) return window.sangilTimetable;
        const d = new Date();
        const day = d.getDay();
        let dayCode = "1"; // 평일
        if(day === 6) dayCode = "2"; // 토요일
        if(day === 0) dayCode = "3"; // 휴일

        // 2553: 상일동역(5호선), 1: 상행/내선
        const url = `http://openAPI.seoul.go.kr:8088/${window.CONFIG.SEOUL}/json/SearchSTNTimeTableByIDService/1/300/2553/${dayCode}/1/`;
        try {
            const res = await fetch(`${window.CONFIG.PROXY}?url=${encodeURIComponent(url)}`);
            const data = await res.json();
            const rows = data.SearchSTNTimeTableByIDService.row;
            // 출발 시간을 분(Mins)으로 바꿔서 정렬 배열로 캐싱
            window.sangilTimetable = rows.map(r => window.hmToMins(r.LEFTTIME)).sort((a,b)=>a-b);
        } catch(e) {
            // API 실패 시 5분 단위 배차표 임시 생성 (Fail-safe)
            let fallback = [];
            for(let h=5; h<24; h++) {
                for(let m=0; m<60; m+=5) fallback.push(h*60+m);
            }
            window.sangilTimetable = fallback;
        }
        return window.sangilTimetable;
    };

    // ★ A* 알고리즘 타임-시프팅 핵심 로직
    // G(마지노시각)보다 빨리 도착하면서, 가장 늦게 출발해도 되는 최적 열차 탐색
    window.findTrain = async function(G, e, routeStr) {
        const I = G - e; // 대략적인 출발 한계선
        const timetable = await window.getSangilTimetable();
        
        let bestDep = -1;
        // 시간표를 뒤져서 I시각을 넘지 않는 가장 늦은 출발시간 매칭
        for(let t of timetable) {
            if(t <= I) bestDep = t;
            else break; // 정렬되어 있으므로 넘으면 중단
        }
        
        // 예외 처리 (너무 이른 새벽이거나 막차 끊김 등)
        if(bestDep === -1) bestDep = I; 

        // 수학적 역산 완벽 보장: 탑승 + 소요 = 하차
        return { 
            depM: bestDep, 
            arrM: bestDep + e,
            routeStr: routeStr 
        };
    };

    window.startEngine = async function() {
        const dest = document.getElementById('dest').value.trim();
        const targetTimeStr = document.getElementById('time').value;
        const mode = document.querySelector('input[name="mode"]:checked').value;

        document.getElementById('result').style.display = 'none';
        document.getElementById('station-selector').style.display = 'none';
        window.tempOptions = [];
        document.getElementById('loader').style.display = 'block';

        try {
            // [A: 목적시각]
            const A = window.hmToMins(targetTimeStr); 

            // 목적지 B 좌표
            const kRes = await fetch(`https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent(dest)}`, { headers: { Authorization: `KakaoAK ${window.CONFIG.KAKAO}` }});
            const kData = await kRes.json();
            if(!kData.documents[0]) throw new Error("장소를 찾을 수 없습니다.");
            const { x: destX, y: destY } = kData.documents[0];
            
            window.processKMAWeather(destY, destX, parseInt(targetTimeStr.split(':')[0]));

            const sRes = await fetch(`https://dapi.kakao.com/v2/local/search/category.json?category_group_code=SW8&x=${destX}&y=${destY}&radius=2000&sort=distance`, { headers: { Authorization: `KakaoAK ${window.CONFIG.KAKAO}` }});
            const sData = await sRes.json();
            
            let allStations = []; let seen = new Set();
            sData.documents.forEach(doc => {
                let name = window.cleanStationName(doc.place_name); 
                if (!seen.has(name)) { 
                    seen.add(name); 
                    // [c: 도보시간]
                    allStations.push({ name: name, c: window.calcRealWalkMins(doc.distance) }); 
                }
            });

            // 1. c1~c5 정렬 및 도출
            let top5 = allStations.sort((a,b) => a.c - b.c).slice(0, 5);

            // 2. c1+15 이상의 값 삭제 필터링
            const c1 = top5[0].c;
            top5 = top5.filter(stn => stn.c < c1 + 15);

            // 3. 각 역의 e(순수 지하철시간) 및 f(= c+e) 연산
            for(let stn of top5) {
                let routeInfo = await window.fetchE(stn.name);
                stn.e = routeInfo.e;
                stn.routeStr = routeInfo.routeStr;
                stn.f = stn.c + stn.e;
            }

            // 4. f'1~f'5 정렬
            top5.sort((a,b) => a.f - b.f);

            // 5. f'1 * 1.15 이상의 역 삭제 (validStations: H1, H2...)
            const f1 = top5[0].f;
            let validStations = top5.filter(stn => stn.f < f1 * 1.15);

            // ==========================================
            // [모드 1] 목적지로 모드
            // ==========================================
            if (mode === 'A') {
                // f'1만 남기고 다 삭제
                let H = validStations[0];
                
                // 마지노시각 G = A - c
                let G = A - H.c;
                
                // I = G - e 로직이 findTrain 내부에 포함됨 (I 이하의 최적 열차 매칭)
                let train = await window.findTrain(G, H.e, H.routeStr);

                // J(출발시간) = depM - 여유시간(10)
                let J = train.depM - window.CONFIG.MARGIN;
                // K(최종 도착시간) = arrM + c
                let K = train.arrM + H.c;
                // L(도보시간) = c
                let L = H.c;

                window.renderFinalResult({ stn: H, J, K, L, train, mode: 'A' });
            } 
            // ==========================================
            // [모드 2] 근처역으로 모드
            // ==========================================
            else {
                let options = [];
                for(let Hn of validStations) {
                    // ★ 모드 2 룰: 마지노시각 Gn = A (도보시간 c를 빼지 않음!)
                    let Gn = A; 

                    let train = await window.findTrain(Gn, Hn.e, Hn.routeStr);
                    
                    let Jn = train.depM - window.CONFIG.MARGIN;
                    let Kn = train.arrM; // 역 도착시각 (Kn)
                    let Ln = Hn.c;       // L값 표출용

                    options.push({ stn: Hn, J: Jn, K: Kn, L: Ln, train, mode: 'B' });
                }

                if(options.length === 0) throw new Error("적합한 배차표를 찾을 수 없습니다.");
                
                // 제일 늦은 Jn보다 15분 이상 빠른 역 삭제
                let maxJ = Math.max(...options.map(o => o.J));
                let finalOptions = options.filter(o => o.J > maxJ - 15);
                
                finalOptions.sort((a,b) => b.J - a.J);

                document.getElementById('loader').style.display = 'none';

                if (finalOptions.length === 1) {
                    window.renderFinalResult(finalOptions[0]);
                } else {
                    window.tempOptions = finalOptions;
                    let html = '';
                    finalOptions.forEach((opt, idx) => {
                        html += `<button class="station-btn" onclick="window.selectOption(${idx})">
                            <div style="text-align:left;">
                                <div style="font-size:15px; margin-bottom:4px;"><i class="fas fa-subway"></i> ${opt.stn.name}역 도착 목표</div>
                                <div style="font-size:12px; color:#aaa;">K (역 도착시각): ${window.minsToHm(opt.K)}</div>
                            </div>
                            <div style="text-align:right;">
                                <div style="font-size:11px; color:var(--green); margin-bottom:2px;">Jn (출발시각)</div>
                                <div style="font-size:18px; font-weight:bold; color:var(--blue);">${window.minsToHm(opt.J)}</div>
                            </div>
                        </button>`;
                    });
                    document.getElementById('station-list').innerHTML = html;
                    document.getElementById('station-selector').style.display = 'block';
                }
            }
        } catch(e) { 
            document.getElementById('loader').style.display = 'none';
            alert(e.message); 
        }
    };

    window.selectOption = function(idx) {
        const opt = window.tempOptions[idx];
        document.getElementById('station-selector').style.display = 'none';
        window.renderFinalResult(opt);
    };

    window.renderFinalResult = function(opt) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        
        // J (외출 출발시각) 상단 대형 표출
        document.getElementById('res-door').innerText = window.minsToHm(opt.J);
        
        // 유저 요청: [경로] 텍스트 반영
        document.getElementById('res-route').innerText = opt.train.routeStr;

        // J, K, L 구조 박스 렌더링
        if (opt.mode === 'A') {
            document.getElementById('res-summary').innerHTML = `
                <div>열차: <span>${window.minsToHm(opt.train.depM)}</span> 탑승 ➔ <span>${window.minsToHm(opt.train.arrM)}</span> 하차</div>
                <div style="margin-top:10px;">J (출발시각): <span>${window.minsToHm(opt.J)}</span></div>
                <div style="margin-top:10px;">K (최종 도착시각): <span>${window.minsToHm(opt.K)}</span></div>
                <div style="margin-top:10px;">L (도보이동): <span>${opt.L}분</span></div>
            `;
        } else {
            document.getElementById('res-summary').innerHTML = `
                <div>열차: <span>${window.minsToHm(opt.train.depM)}</span> 탑승 ➔ <span>${window.minsToHm(opt.train.arrM)}</span> 하차</div>
                <div style="margin-top:10px;">J (출발시각): <span>${window.minsToHm(opt.J)}</span></div>
                <div style="margin-top:10px;">K (역 도착시각): <span>${window.minsToHm(opt.K)}</span></div>
                <div style="margin-top:10px;">L (도보이동): <span style="color:#888;">${opt.L}분</span></div>
            `;
        }
    };

    window.processKMAWeather = async function(lat, lon, targetH) {
        const grid = window.dfs_xy_conv(lat, lon);
        const baseDate = new Date().toISOString().slice(0,10).replace(/-/g, '');
        const url = `https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst?serviceKey=${window.CONFIG.KMA}&numOfRows=1000&pageNo=1&base_date=${baseDate}&base_time=0200&nx=${grid.nx}&ny=${grid.ny}&dataType=JSON`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            const items = data.response.body.items.item;
            let hourly = {};
            items.forEach(i => { if(!hourly[i.fcstTime]) hourly[i.fcstTime]={}; hourly[i.fcstTime][i.category]=i.fcstValue; });
            const times = Object.keys(hourly).sort().filter(t => parseInt(t.slice(0,2)) >= targetH && parseInt(t.slice(0,2)) <= 22);
            if(times.length === 0) return;
            
            const temps = times.map(t => parseFloat(hourly[t].TMP));
            const pops = times.map(t => parseInt(hourly[t].POP));
            const labels = times.map(t=>t.slice(0,2)+'시');
            
            const minT = Math.round(Math.min(...temps)); 
            const maxT = Math.round(Math.max(...temps));

            const rules = [
                { min: 28, max: 99, label: "28도 이상", text: "민소매, 반팔, 반바지" },
                { min: 23, max: 27, label: "27도 ~ 23도", text: "반팔, 얇은 셔츠/바지" },
                { min: 20, max: 22, label: "22도 ~ 20도", text: "긴팔 티셔츠, 얇은 가디건" },
                { min: 17, max: 19, label: "19도 ~ 17도", text: "얇은 니트, 맨투맨, 가을 자켓" },
                { min: 12, max: 16, label: "16도 ~ 12도", text: "자켓, 야상, 두꺼운 가디건" },
                { min: 9, max: 11, label: "11도 ~ 9도", text: "트렌치코트, 야상, 점퍼" },
                { min: 5, max: 8, label: "8도 ~ 5도", text: "코트, 가죽자켓, 히트텍" },
                { min: -99, max: 4, label: "4도 이하", text: "패딩, 두꺼운 코트, 방한용품" }
            ];
            
            let recommendations = [];
            rules.forEach(r => { if (r.min <= maxT && r.max >= minT) recommendations.push(`- <span style="color:var(--orange); font-weight:bold;">${r.label}</span> : ${r.text}`); });

            document.getElementById('w-temp-max').innerText = maxT;
            document.getElementById('w-temp-min').innerText = minT;
            document.getElementById('w-clothes').innerHTML = `${recommendations.join('<br>')}`;
            
            const yMinTemp = minT - 2;
            const yMaxTemp = maxT + 2;

            if(window.tempChart) window.tempChart.destroy();
            window.tempChart = new Chart(document.getElementById('tempChart'), {
                type: 'line',
                data: { labels: labels, datasets: [{ data: temps, borderColor: '#ff9f0a', backgroundColor: 'rgba(255,159,10,0.1)', borderWidth: 2, pointBackgroundColor: '#ff9f0a', fill: true, tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: yMinTemp, max: yMaxTemp, ticks: {color: '#888'}, grid: {color: '#333'} }, x: { ticks: {color: '#888'}, grid: {display: false} } } },
                plugins: [window.tempThresholdPlugin]
            });

            const popPointColors = pops.map(p => p >= 40 ? '#ff453a' : '#0a84ff');
            if(window.rainChart) window.rainChart.destroy();
            window.rainChart = new Chart(document.getElementById('rainChart'), {
                type: 'line',
                data: { labels: labels, datasets: [{ data: pops, borderColor: '#0a84ff', backgroundColor: 'rgba(10,132,255,0.1)', borderWidth: 2, pointBackgroundColor: popPointColors, fill: true, tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: 0, max: 100, ticks: {color: '#888', stepSize: 20}, grid: {color: '#333'} }, x: { ticks: {color: '#888'}, grid: {display: false} } } },
                plugins: [window.popThresholdPlugin]
            });
        } catch(e) {}
    };

    window.dfs_xy_conv = function(v1, v2) {
        const RE = 6371.00877, GRID = 5.0, SLAT1 = 30.0, SLAT2 = 60.0, OLON = 126.0, OLAT = 38.0, XO = 43, YO = 136, DEGRAD = Math.PI / 180.0;
        const re = RE / GRID, slat1 = SLAT1 * DEGRAD, slat2 = SLAT2 * DEGRAD, olon = OLON * DEGRAD, olat = OLAT * DEGRAD;
        let sn = Math.log(Math.cos(slat1) / Math.cos(slat2)) / Math.log(Math.tan(Math.PI * 0.25 + slat2 * 0.5) / Math.tan(Math.PI * 0.25 + slat1 * 0.5));
        let sf = Math.pow(Math.tan(Math.PI * 0.25 + slat1 * 0.5), sn) * Math.cos(slat1) / sn;
        let ro = re * sf / Math.pow(Math.tan(Math.PI * 0.25 + olat * 0.5), sn);
        let ra = re * sf / Math.pow(Math.tan(Math.PI * 0.25 + v1 * DEGRAD * 0.5), sn);
        let theta = v2 * DEGRAD - olon;
        if (theta > Math.PI) theta -= 2.0 * Math.PI; if (theta < -Math.PI) theta += 2.0 * Math.PI;
        return { nx: Math.floor(ra * Math.sin(theta * sn) + XO + 0.5), ny: Math.floor(ro - ra * Math.cos(theta * sn) + YO + 0.5) };
    };
</script>
