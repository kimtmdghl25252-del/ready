<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S26 Debugger v26.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #050505; --card: #1c1c1e; --blue: #0a84ff; --red: #ff453a; --green: #30d158; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Cascadia Code', monospace; font-size: 14px; }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        
        /* 디버그 터미널 스타일 */
        #console { 
            background: #000; border: 1px solid #333; border-radius: 10px; 
            padding: 15px; height: 200px; overflow-y: auto; 
            font-size: 11px; color: #0f0; margin-top: 20px; border-left: 4px solid var(--blue);
        }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #111; padding-bottom: 2px; }
        .log-error { color: var(--red); }
        .log-success { color: var(--green); }

        .input-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        input { width: 100%; background: #000; border: 1px solid #444; border-radius: 8px; padding: 10px; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--blue); color: #fff; font-weight: bold; cursor: pointer; }

        .result-card { background: #111; border: 1px solid var(--blue); border-radius: 20px; padding: 25px; text-align: center; display: none; }
        .big-time { font-size: 60px; font-weight: 900; color: var(--blue); margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h3 style="color: var(--blue);"><i class="fas fa-terminal"></i> S26 SYSTEM DEBUGGER</h3>

    <div class="input-card">
        <label>목적지역</label>
        <input type="text" id="dest" value="서울역">
        <div style="display:flex; gap:10px;">
            <input type="date" id="date">
            <input type="time" id="time">
        </div>
        <button onclick="runDebug()">데이터 요청 강제 실행</button>
    </div>

    <div id="result" class="result-card">
        <div style="color:#888; font-size:12px;">계산된 출발 시간</div>
        <div id="door-time" class="big-time">--:--</div>
        <div id="train-info" style="color:var(--green); font-weight:bold;"></div>
    </div>

    <div id="console">
        <div class="log-entry">> 시스템 준비 완료. 목적지를 입력하고 실행하세요.</div>
    </div>
</div>

<script>
    const KEY = '597057594f6b696d3438526a7a564e';
    const START = "상일동";

    window.onload = () => {
        const now = new Date();
        document.getElementById('date').value = now.toISOString().slice(0, 10);
        document.getElementById('time').value = now.toTimeString().slice(0, 5);
    };

    function log(msg, type = '') {
        const con = document.getElementById('console');
        const entry = document.createElement('div');
        entry.className = `log-entry ${type === 'error' ? 'log-error' : (type === 'success' ? 'log-success' : '')}`;
        entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        con.appendChild(entry);
        con.scrollTop = con.scrollHeight;
    }

    async function runDebug() {
        const dest = document.getElementById('dest').value.trim().replace(/역$/, "");
        const date = document.getElementById('date').value.replace(/-/g, "");
        const time = document.getElementById('time').value.replace(/:/g, "");
        
        log(`데이터 요청 시작: ${START} -> ${dest}`);
        
        // 1. 순수 API URL 생성
        const apiUrl = `http://openapi.seoul.go.kr:8088/${KEY}/json/subwayShortestRoute/1/1/${START}/${dest}/${date}${time}/1`;
        log(`원본 URL: ${apiUrl}`);

        // 2. 프록시 시도 (corsproxy.io 대신 더 직접적인 codetabs 사용)
        const proxyUrl = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(apiUrl)}`;
        log(`프록시 서버 접속 시도 중...`);

        try {
            const res = await fetch(proxyUrl);
            log(`응답 코드: ${res.status} ${res.statusText}`);

            const rawText = await res.text();
            log(`데이터 수신 완료 (길이: ${rawText.length} bytes)`);

            // 데이터 앞부분 100자 검사 (HTML인지 JSON인지)
            log(`데이터 서두 분석: ${rawText.substring(0, 50).replace(/</g, "&lt;")}...`);

            if (rawText.trim().startsWith("<!DOCTYPE") || rawText.trim().startsWith("<html")) {
                log("결과 에러: JSON이 아닌 HTML(에러페이지)이 반환되었습니다.", "error");
                log("해결책: 서울시 서버 점검 중이거나 프록시가 차단되었습니다. 5초 후 재시도하세요.", "error");
                return;
            }

            const data = JSON.parse(rawText);
            if (data.subwayShortestRoute && data.subwayShortestRoute.resultCode === "00") {
                log("JSON 파싱 성공. 유효한 경로 데이터를 찾았습니다.", "success");
                display(data.subwayShortestRoute);
            } else {
                log(`API 내부 오류: ${data.subwayShortestRoute ? data.subwayShortestRoute.resultMsg : '알 수 없는 응답'}`, "error");
            }

        } catch (e) {
            log(`치명적 오류: ${e.message}`, "error");
        }
    }

    function display(data) {
        const trainTime = data.paths[0].trainDptreTm;
        let [h, m, s] = trainTime.split(':').map(Number);
        let doorMins = (h * 60 + m) - 10;
        
        document.getElementById('result').style.display = 'block';
        document.getElementById('door-time').innerText = `${String(Math.floor(doorMins/60)).padStart(2,'0')}:${String(doorMins%60).padStart(2,'0')}`;
        document.getElementById('train-info').innerText = `상일동역 ${trainTime} 열차 기준 (-10분)`;
    }
</script>
</body>
</html>
