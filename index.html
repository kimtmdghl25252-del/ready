<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S26 프리미엄 외출 비서</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #ffffff; --text-sub: #aaaaaa; --accent-blue: #3e91ff; --alert-red: #ff4d4d; }
        body { margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        #initial-screen, #station-select-screen, #loading-screen, #result-screen { flex: 1; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        #initial-screen { display: flex; gap: 30px; padding: 40px; }
        .large-btn { width: 100%; height: 120px; background-color: var(--card-bg); border: 2px solid #333; border-radius: 25px; color: var(--text-main); font-size: 22px; font-weight: bold; display: flex; justify-content: center; align-items: center; gap: 15px; cursor: pointer; box-shadow: 0 8px 15px rgba(0,0,0,0.4); }
        .large-btn:active { transform: scale(0.98); }
        #station-select-screen { justify-content: flex-start; padding-top: 40px; gap: 15px; width: 100%; box-sizing: border-box; }
        .station-btn { width: 100%; background: #2a2a2a; border: 1px solid var(--accent-blue); padding: 15px; border-radius: 15px; color: white; text-align: left; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
        #result-screen { padding-bottom: 40px; gap: 20px; justify-content: flex-start; width: 100%; box-sizing: border-box; }
        .card { width: 100%; box-sizing: border-box; background-color: var(--card-bg); border-radius: 20px; padding: 20px; border: 1px solid #2a2a2a; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #safety-time { font-size: 45px; font-weight: 900; color: var(--accent-blue); margin: 10px 0; }
        .outfit-row { display: flex; align-items: center; gap: 15px; padding: 15px; background: #2a2a2a; border-radius: 15px; margin-bottom: 10px; line-height: 1.4; }
        .route-step-box { background: #1a1a1a; border-left: 3px solid var(--accent-blue); padding: 15px; border-radius: 0 10px 10px 0; margin-top: 15px; font-size: 14px; color: #eee; line-height: 1.6; }
        .transfer-icon { color: var(--accent-blue); font-size: 12px; margin: 5px 0 5px 10px; }
        .transit-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-right: 5px; }
        .subway-badge { background: #3e91ff; color: #fff; }
        .bus-badge { background: #ff4d4d; color: #fff; }
    </style>
</head>
<body>

    <div id="initial-screen">
        <button class="large-btn" onclick="startProcess('direct')"><i class="fas fa-map-marker-alt"></i> 목적지 바로 앞까지</button>
        <button class="large-btn" onclick="startProcess('station')"><i class="fas fa-subway"></i> 근처 지하철역까지만</button>
    </div>

    <div id="loading-screen">
        <i class="fas fa-spinner fa-spin" style="font-size:50px; color:var(--accent-blue); margin-bottom:20px;"></i>
        <div id="loading-text" style="font-size: 18px; text-align: center;">장소와 시간을 말씀해주세요...</div>
    </div>

    <div id="station-select-screen">
        <h2 style="color:var(--accent-blue); margin-bottom: 10px;">도착할 역을 선택해주세요</h2>
        <div id="station-list-container" style="width: 100%;"></div>
    </div>

    <div id="result-screen">
        <div class="card" style="border: 2px solid var(--accent-blue);">
            <div style="font-size: 16px; font-weight:bold;">⏰ 최종 출발 시각</div>
            <div id="safety-time">--:--</div>
            <div id="route-detail" style="font-size:15px; color:var(--text-sub); line-height: 1.5;">경로 계산 중...</div>
        </div>
        <div class="card">
            <h2 style="font-size:18px; margin:0 0 15px 0;">🌡️ 해당 시간대 옷차림 추천</h2>
            <div id="outfit-list"></div>
        </div>
        <div class="card" id="rain-card">
            <div style="font-size:16px; margin-bottom:10px; font-weight:bold;">☂️ 시간별 강수 확률 (40% 이상 빨간색)</div>
            <div style="height:200px;"><canvas id="rainChart"></canvas></div>
        </div>
    </div>

    <script>
        const KAKAO_KEY = '56b6a0adbc28cab6f7c87ac9f84b14d0'; 
        const KMA_KEY = 'ddfd71d0b929827fd9c3c1851b50c301f9afb482a3143c0b39e135f9b3b8f070';
        const ODSAY_KEY = 'Rdv6LaA8z0P2BHkKrh/DsA';

        // [중요] API가 실제 길찾기에 사용할 절대 출발 좌표 (25133 정류장 기준)
        const FIXED_START = { 
            name: "상일동역 5호선 1번출구", 
            sx: 127.1741, 
            sy: 37.5524 
        };

        let state = { destMode: null, placeName: null, targetTime: null, walkDist: 0 };

        function showScreen(screenId) {
            ['initial-screen', 'station-select-screen', 'loading-screen', 'result-screen'].forEach(id => {
                document.getElementById(id).style.display = (id === screenId) ? 'flex' : 'none';
            });
        }

        function startProcess(mode) {
            state.destMode = mode;
            showScreen('loading-screen');
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'ko-KR';
            recognition.onresult = async (e) => {
                const text = e.results[0][0].transcript;
                const timeMatch = text.match(/(\d{1,2})\s*시/);
                if (!timeMatch) { alert("시간을 포함해 말씀해주세요."); location.reload(); return; }
                state.targetTime = parseInt(timeMatch[1]);
                state.placeName = text.replace(timeMatch[0], "").replace(/[.,]/g, "").trim();
                
                try {
                    const kUrl = `https://corsproxy.io/?${encodeURIComponent(`https://dapi.kakao.com/v2/local/search/keyword.json?query=${state.placeName}`)}`;
                    const kRes = await fetch(kUrl, { headers: { 'Authorization': `KakaoAK ${KAKAO_KEY}` } });
                    const kData = await kRes.json();
                    if (!kData.documents || kData.documents.length === 0) throw new Error("장소 검색 실패");
                    
                    const dx = kData.documents[0].x;
                    const dy = kData.documents[0].y;

                    if (state.destMode === 'station') {
                        const swUrl = `https://corsproxy.io/?${encodeURIComponent(`https://dapi.kakao.com/v2/local/search/category.json?category_group_code=SW8&x=${dx}&y=${dy}&radius=1000&sort=distance`)}`;
                        const swRes = await fetch(swUrl, { headers: { 'Authorization': `KakaoAK ${KAKAO_KEY}` } });
                        const swData = await swRes.json();
                        renderStations(swData.documents, dx, dy);
                    } else {
                        state.walkDist = 0;
                        calculateAll(dx, dy);
                    }
                } catch(e) { alert(e.message); location.reload(); }
            };
            recognition.start();
        }

        function renderStations(stations, dx, dy) {
            showScreen('station-select-screen');
            const container = document.getElementById('station-list-container');
            container.innerHTML = stations.slice(0,4).map(st => {
                const w = Math.ceil(st.distance / 67);
                return w <= 15 ? `<button class="station-btn" onclick="selectSt('${st.x}','${st.y}',${w})"><b>${st.place_name}</b><br>도보 ${w}분</button>` : '';
            }).join('') || `<button class="station-btn" onclick="selectSt('${dx}','${dy}',0)">주변 역 없음 (목적지로 바로가기)</button>`;
        }

        function selectSt(x, y, w) {
            state.walkDist = w;
            showScreen('loading-screen');
            calculateAll(x, y);
        }

        async function calculateAll(dx, dy) {
            const odUrl = `https://api.odsay.com/v1/api/searchPubTransPathT?SX=${FIXED_START.sx}&SY=${FIXED_START.sy}&EX=${dx}&EY=${dy}&apiKey=${encodeURIComponent(ODSAY_KEY)}`;
            const dateStr = new Date(new Date().getTime() + 32400000).toISOString().slice(0,10).replace(/-/g,"");
            const kmaUrl = `https://corsproxy.io/?${encodeURIComponent(`https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst?serviceKey=${KMA_KEY}&pageNo=1&numOfRows=1000&dataType=JSON&base_date=${dateStr}&base_time=0200&nx=62&ny=126`)}`;

            const [rRes, wRes] = await Promise.all([fetch(odUrl), fetch(kmaUrl)]);
            const rData = await rRes.json();
            const wData = await wRes.json();
            renderFinal(rData, wData);
        }

        function renderFinal(rData, wData) {
            showScreen('result-screen');
            // [실제 API 필터링] 첫 구간 도보가 3분 이하인 경로만 탐색
            const best = rData.result?.path?.filter(p => p.subPath[0].trafficType !== 3 || p.subPath[0].sectionTime <= 3)
                         .sort((a,b) => a.info.totalTime - b.info.totalTime)[0];

            if (!best) {
                document.getElementById('safety-time').innerText = "경로 없음";
                document.getElementById('route-detail').innerText = "상일동역 1번출구에서 3분 내로 탑승 가능한 경로가 없습니다.";
                return;
            }

            const isBus = best.subPath.some(s => s.trafficType === 2);
            const margin = isBus ? 25 : 10;
            const dep = new Date(); dep.setHours(state.targetTime, -(best.info.totalTime + margin));
            
            document.getElementById('safety-time').innerText = `${String(dep.getHours()).padStart(2,'0')}:${String(dep.getMinutes()).padStart(2,'0')}`;
            
            let rHtml = `<b>${FIXED_START.name}</b> 출발<br>(이동 ${best.info.totalTime}분 + 여유 ${margin}분)`;
            rHtml += `<div class="route-step-box">` + best.subPath.filter(s => s.trafficType !== 3).map((s, i) => 
                `<div><span class="transit-badge ${s.trafficType===1?'subway-badge':'bus-badge'}">${s.trafficType===1?s.lane[0].name:s.lane[0].busNo}</span> <b>${i===0?FIXED_START.name:s.startName}</b> 탑승 ➔ <b>${s.endName}</b> 하차</div>`
            ).join('<div class="transfer-icon">▼ 환승</div>') + `</div>`;
            
            if(state.walkDist > 0) rHtml += `<div style="margin-top:10px; color:#ff9f43; font-weight:bold;">🚶 하차 후 도보 ${state.walkDist}분</div>`;
            document.getElementById('route-detail').innerHTML = rHtml;

            // 날씨 처리 (상세 생략, 기존 로직 유지)
            renderWeather(wData);
        }

        function renderWeather(w) {
            const items = w.response?.body?.items?.item || [];
            const today = new Date(new Date().getTime() + 32400000).toISOString().slice(0,10).replace(/-/g,"");
            const v = items.filter(i => i.fcstDate === today && i.fcstTime >= String(state.targetTime).padStart(2,'0')+"00" && i.fcstTime <= "2200");
            if(v.length > 0) {
                const t = v.filter(i => i.category==='TMP').map(i => parseInt(i.fcstValue));
                const max = Math.max(...t), min = Math.min(...t);
                const out = max >= 23 ? "반팔" : max >= 20 ? "가디건" : max >= 17 ? "니트" : max >= 12 ? "자켓" : "코트";
                document.getElementById('outfit-list').innerHTML = `<div class="outfit-row"><i class="fas fa-thermometer-half" style="font-size:30px; color:#ff9f43;"></i> <div>최고 ${max}° / 최저 ${min}°<br>${out} 추천</div></div>`;
                
                const p = v.filter(i => i.category==='POP');
                new Chart(document.getElementById('rainChart'), {
                    type: 'bar',
                    data: { labels: p.map(i => i.fcstTime.slice(0,2)+'시'), datasets: [{ data: p.map(i => i.fcstValue), backgroundColor: p.map(i => i.fcstValue >= 40 ? '#ff4d4d' : '#3e91ff') }] },
                    options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: 0, max: 100 } } }
                });
            }
        }
    </script>
</body>
</html>
