<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S26 Premium - Auto Precision v39.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000; --card: #151515; --blue: #0a84ff; --green: #30d158; --red: #ff453a; --text: #fff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        .header { font-size: 24px; font-weight: 900; color: var(--blue); margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        .badge { font-size: 10px; background: #333; padding: 4px 8px; border-radius: 6px; color: var(--green); letter-spacing: 1px; }

        .input-box { background: var(--card); border: 1px solid #333; border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 8px; font-weight: bold; }
        input { width: 100%; background: #000; border: 1px solid #444; border-radius: 12px; padding: 15px; color: #fff; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; outline: none; }
        
        .row { display: flex; gap: 10px; }
        
        button { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--blue); color: #fff; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }

        .result-card { background: linear-gradient(145deg, #1a1a1c, #000); border: 1px solid var(--blue); border-radius: 24px; padding: 35px 20px; text-align: center; display: none; margin-top: 20px; }
        .door-time { font-size: 80px; font-weight: 900; color: var(--blue); letter-spacing: -3px; line-height: 1; margin: 15px 0; }
        .train-info { font-size: 16px; color: var(--green); font-weight: bold; margin-bottom: 15px; }
        .meta-info { font-size: 13px; color: #777; border-top: 1px solid #222; padding-top: 15px; line-height: 1.6; }

        #log { background: #050505; border: 1px solid #222; padding: 15px; height: 220px; overflow-y: auto; color: #0f0; font-size: 11px; margin-top: 20px; border-radius: 8px; font-family: 'Cascadia Code', monospace; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span>S26 <span style="color:#fff;">Premium</span></span>
        <span class="badge">v39.0 CARPET BOMBING</span>
    </div>

    <div class="input-box">
        <div class="row">
            <div style="flex: 1;"><label>출발역</label><input type="text" id="start" value="상일동"></div>
            <div style="flex: 1;"><label>도착역</label><input type="text" id="dest" value="고덕"></div>
        </div>
        
        <div class="row">
            <div style="flex: 1;"><label>목표 날짜</label><input type="date" id="date"></div>
            <div style="flex: 1;"><label>목표 도착 시각</label><input type="time" id="time" value="10:00"></div>
        </div>
        
        <button onclick="runPrecisionEngine()"><i class="fas fa-crosshairs"></i> 정밀 스나이퍼 역산</button>
    </div>

    <div id="result" class="result-card">
        <div style="font-size: 14px; color: #aaa; font-weight: bold;">이 열차를 놓치면 지각입니다. 현관문 출발 시각:</div>
        <div id="res-door" class="door-time">--:--</div>
        <div id="res-train" class="train-info"></div>
        <div id="res-meta" class="meta-info"></div>
    </div>

    <div id="log">시스템 대기 중. 도착 시간과 역을 입력하고 실행하세요.</div>
</div>

<script>
    // 사용자님이 생성하신 무적 구글 프록시
    const GOOGLE_PROXY = 'https://script.google.com/macros/s/AKfycbxLWndiEwIbdskJSR1kj3_Zj55bee0Dzoi7Pxet1IkWw46L8mhwGxPYUdx2kYx4bgQUXA/exec';
    const KEY = '597057594f6b696d3438526a7a564e';
    const MARGIN = 10;

    window.onload = () => {
        const now = new Date();
        document.getElementById('date').value = now.toISOString().slice(0, 10);
    };

    function printLog(msg, color = "#0f0") {
        const logBox = document.getElementById('log');
        const timeStr = new Date().toLocaleTimeString();
        logBox.innerHTML += `<div style="color:${color}; margin-bottom:4px;">[${timeStr}] ${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    async function runPrecisionEngine() {
        const start = document.getElementById('start').value.trim();
        const dest = document.getElementById('dest').value.trim();
        const dateStr = document.getElementById('date').value; 
        const timeStr = document.getElementById('time').value; 
        
        if (!start || !dest) return alert("출발역과 도착역을 입력하세요.");

        document.getElementById('result').style.display = 'none';
        document.getElementById('log').innerHTML = "";
        
        printLog(`[융단폭격 엔진 가동] ${start} ➔ ${dest} (${timeStr} 도착 목표)`);

        try {
            let [tH, tM] = timeStr.split(':').map(Number);
            let targetTotalMins = tH * 60 + tM;
            if (targetTotalMins < 180) targetTotalMins += 24 * 60; // 새벽 시간 보정 (새벽 3시 기준)
            
            // 1단계: 순수 이동 시간 알아내기 (정찰)
            const dummyDate = `${dateStr} 12:00:00`; 
            const probeUrl = `http://openapi.seoul.go.kr:8088/${KEY}/xml/getShtrmPath/1/1/${start}/${dest}/${encodeURIComponent(dummyDate)}/1/%20/%20/Y`;
            
            printLog("정찰 핑 전송 중 (이동 시간 파악)...");
            const probeRes = await fetch(`${GOOGLE_PROXY}?url=${encodeURIComponent(probeUrl)}`);
            const probeXml = new DOMParser().parseFromString(await probeRes.text(), "text/xml");
            
            if (probeXml.getElementsByTagName("resultCode")[0]?.textContent !== "00") {
                throw new Error("경로를 찾을 수 없습니다. 역 이름을 다시 확인하세요.");
            }
            
            const travelMins = Math.ceil(Number(probeXml.getElementsByTagName("totalreqHr")[0]?.textContent) / 60);
            printLog(`이동 시간 파악 완료: 약 ${travelMins}분`);

            // 2단계: 최적 출발 시간(T_opt) 도출 및 다중 스캔
            let optDepMins = targetTotalMins - travelMins;
            printLog(`이론상 최적 탑승 시점: ${Math.floor(optDepMins/60)%24}시 ${optDepMins%60}분`);
            
            // 검색 오프셋 (최적 시간 기준 -15분, -10분, -5분, 정각, +5분)
            const offsets = [-15, -10, -5, 0, 5];
            printLog(`위 시간을 중심으로 5개의 시간대 동시 스캔을 시작합니다.`);

            const fetchPromises = offsets.map(offset => {
                let reqMins = optDepMins + offset;
                if (reqMins < 0) reqMins += 24 * 60;
                let reqTimeStr = `${String(Math.floor(reqMins/60)%24).padStart(2,'0')}:${String(reqMins%60).padStart(2,'0')}:00`;
                let reqDateTime = `${dateStr} ${reqTimeStr}`;
                let reqUrl = `http://openapi.seoul.go.kr:8088/${KEY}/xml/getShtrmPath/1/3/${start}/${dest}/${encodeURIComponent(reqDateTime)}/1/%20/%20/Y`;
                return fetch(`${GOOGLE_PROXY}?url=${encodeURIComponent(reqUrl)}`).then(r => r.text());
            });

            // 5개의 API 응답을 동시에 기다림
            const results = await Promise.all(fetchPromises);
            let allTrains = [];

            // 받은 데이터 하나로 합치기
            results.forEach(xmlText => {
                let xmlDoc = new DOMParser().parseFromString(xmlText, "text/xml");
                let paths = xmlDoc.getElementsByTagName("path");
                for(let i = 0; i < paths.length; i++) {
                    let dep = paths[i].getElementsByTagName("trainDptreTm")[0]?.textContent;
                    let arr = paths[i].getElementsByTagName("trainArvlTm")[0]?.textContent;
                    if(dep && arr) allTrains.push({dep, arr});
                }
            });

            if (allTrains.length === 0) throw new Error("배차 데이터를 하나도 불러오지 못했습니다.");
            
            printLog(`총 ${allTrains.length}개의 후보기 열차 정보가 수집되었습니다. 스나이핑 시작.`);

            // 3단계: 목표 시간과 가장 가까운 열차 1대 필터링
            let bestTrain = null;
            let minDiff = Infinity; 

            allTrains.forEach(t => {
                let [aH, aM] = t.arr.split(':').map(Number);
                let arrTotalMins = aH * 60 + aM;
                if (arrTotalMins < 180 && targetTotalMins > 1000) arrTotalMins += 24 * 60; 
                
                let diff = targetTotalMins - arrTotalMins;
                
                // diff >= 0 이면 지각 아님. 이 중 가장 숫자가 작은 것(타이트한 것)을 찾음
                if (diff >= 0 && diff < minDiff) {
                    minDiff = diff;
                    bestTrain = t;
                } else if (diff === minDiff && bestTrain) {
                    // 동일한 시간에 도착하는 루트가 2개 이상이면, 조금이라도 더 늦게 출발하는 것을 선호
                    let [dH, dM] = t.dep.split(':').map(Number);
                    let depMins = (dH * 60 + dM) < 180 ? dH * 60 + dM + 24 * 60 : dH * 60 + dM;
                    let [bdH, bdM] = bestTrain.dep.split(':').map(Number);
                    let bDepMins = (bdH * 60 + bdM) < 180 ? bdH * 60 + bdM + 24 * 60 : bdH * 60 + bdM;
                    
                    if (depMins > bDepMins) bestTrain = t;
                }
            });

            if (!bestTrain) {
                throw new Error(`목표하신 ${timeStr} 이전까지 도착할 수 있는 열차가 검색망에 없습니다.`);
            }

            printLog(`✅ 스나이핑 성공: [${bestTrain.dep} 출발 ➔ ${bestTrain.arr} 도착] 열차가 가장 완벽합니다!`);

            // 최종 10분 마진 역산
            let [dH, dM] = bestTrain.dep.split(':').map(Number);
            let doorTotalMins = dH * 60 + dM - MARGIN;
            
            if (doorTotalMins < 0) doorTotalMins += 24 * 60;
            let doorH = Math.floor(doorTotalMins / 60) % 24;
            let doorM = doorTotalMins % 60;

            // UI 렌더링
            document.getElementById('result').style.display = 'block';
            document.getElementById('res-door').innerText = `${String(doorH).padStart(2,'0')}:${String(doorM).padStart(2,'0')}`;
            document.getElementById('res-train').innerText = `${start}역 ${bestTrain.dep} 열차 탑승 기준 (-${MARGIN}분 마진)`;
            document.getElementById('res-meta').innerHTML = `
                <b style="color:#fff;">${start} ➔ ${dest}</b><br>
                목적지 실제 도착 시각: <span style="color:var(--green)">${bestTrain.arr}</span> (목표 ${timeStr} 통과)<br>
                열차 소요 시간: 약 ${travelMins}분
            `;
            
            printLog("모든 계산 완료.", "#30d158");

        } catch (e) {
            printLog(`에러 발생: ${e.message}`, "#ff453a");
        }
    }
</script>
</body>
</html>
