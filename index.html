<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S26 프리미엄 외출 비서 (디버깅 모드)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #ffffff; --text-sub: #aaaaaa; --accent-blue: #3e91ff; --error-red: #ff4d4d; }
        body { margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        #initial-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 30px; padding: 40px; }
        .large-btn { width: 100%; height: 120px; background-color: var(--card-bg); border: 2px solid #333; border-radius: 25px; color: var(--text-main); font-size: 22px; font-weight: bold; display: flex; justify-content: center; align-items: center; gap: 15px; cursor: pointer; }
        #loading-screen { display: none; flex: 1; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; color: var(--text-sub); }
        #debug-log { background: #000; color: #00ff00; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 12px; margin: 20px; white-space: pre-wrap; word-wrap: break-word; display: none; border: 1px solid #333; }
        #result-screen { display: none; padding: 20px; flex-direction: column; gap: 20px; padding-bottom: 40px; }
    </style>
</head>
<body>

    <div id="initial-screen">
        <button class="large-btn" onclick="startProcess('direct')"><i class="fas fa-bug"></i> PC버전 오류 추적 시작</button>
    </div>

    <div id="loading-screen">
        <i class="fas fa-spinner fa-spin" style="font-size:50px; color:var(--accent-blue); margin-bottom:20px;"></i>
        <div id="loading-text">장소를 말씀해주세요...</div>
    </div>

    <div id="debug-log"></div>

    <div id="result-screen">
        <h3 style="text-align:center; color: var(--accent-blue);">정상 작동 성공!</h3>
    </div>

    <script>
        const KAKAO_KEY = '56b6a0adbc28cab6f7c87ac9f84b14d0'; 
        const KMA_KEY = 'ddfd71d0b929827fd9c3c1851b50c301f9afb482a3143c0b39e135f9b3b8f070';
        const ODSAY_KEY = 'Rdv6LaA8z0P2BHkKrh/DsA';

        const SANGIL_SUBWAY = { name: "상일동역", sx: 127.1735, sy: 37.5519 };
        let state = { placeName: null, targetTime: null, targetCoords: null };

        // 화면에 로그를 찍는 함수
        function logDebug(title, message) {
            const logDiv = document.getElementById('debug-log');
            logDiv.style.display = 'block';
            logDiv.innerHTML += `<b>[${title}]</b>\n${message}\n\n`;
            console.log(`[${title}]`, message);
        }

        async function fetchWithDebug(name, url, options = {}) {
            try {
                logDebug(name + " 요청", url);
                const response = await fetch(url, options);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    logDebug(name + " 실패 (HTTP " + response.status + ")", errorText);
                    throw new Error(`${name} 서버 에러: HTTP ${response.status}`);
                }
                
                const data = await response.json();
                logDebug(name + " 성공 응답", JSON.stringify(data).substring(0, 200) + "... (생략됨)");
                return data;
            } catch (error) {
                logDebug(name + " 완전 실패 (CORS 또는 네트워크)", error.message);
                throw error;
            }
        }

        function startProcess(mode) {
            document.getElementById('initial-screen').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'flex';
            document.getElementById('debug-log').innerHTML = ''; // 로그 초기화
            
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'ko-KR';
            
            recognition.onresult = async (e) => {
                const text = e.results[0][0].transcript;
                const timeMatch = text.match(/(\d{1,2})\s*시/);
                
                if (!timeMatch) {
                    alert("시간(예: 14시)을 포함해서 다시 말해주세요!");
                    location.reload();
                    return;
                }

                state.targetTime = parseInt(timeMatch[1]);
                state.placeName = text.replace(timeMatch[0], "").replace(/[.,]/g, "").trim();
                document.getElementById('loading-text').innerHTML = `<b>'${state.placeName}'</b> 추적 중...`;

                try {
                    // 1. 카카오 검색 (우회 프록시 사용)
                    const kakaoUrl = `https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent(state.placeName)}`;
                    const kakaoProxy = `https://corsproxy.io/?${encodeURIComponent(kakaoUrl)}`;
                    
                    const kakaoData = await fetchWithDebug("카카오맵", kakaoProxy, { 
                        headers: { 'Authorization': `KakaoAK ${KAKAO_KEY}` } 
                    });

                    if (!kakaoData.documents || kakaoData.documents.length === 0) {
                        throw new Error(`'${state.placeName}' 검색 결과가 없습니다.`);
                    }
                    state.targetCoords = { x: kakaoData.documents[0].x, y: kakaoData.documents[0].y };

                    // 2. 오디세이 (교통) - 프록시 없이 직접 호출 테스트
                    const encodedOdsayKey = encodeURIComponent(ODSAY_KEY);
                    const odAUrl = `https://api.odsay.com/v1/api/searchPubTransPathT?SX=${SANGIL_SUBWAY.sx}&SY=${SANGIL_SUBWAY.sy}&EX=${state.targetCoords.x}&EY=${state.targetCoords.y}&apiKey=${encodedOdsayKey}`;
                    await fetchWithDebug("오디세이(교통)", odAUrl);

                    // 3. 기상청 (날씨) - 프록시 없이 직접 호출 테스트
                    const dateStr = new Date().toISOString().slice(0,10).replace(/-/g,"");
                    const kmaUrl = `https://apis.data.go.kr/1360000/VilageFrcstInfoService_2.0/getVilageFrcst?serviceKey=${KMA_KEY}&pageNo=1&numOfRows=1000&dataType=JSON&base_date=${dateStr}&base_time=0200&nx=62&ny=126`;
                    await fetchWithDebug("기상청(날씨)", kmaUrl);

                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('result-screen').style.display = 'flex';

                } catch (err) {
                    alert("에러 발생! 검은색 디버그 로그 창을 확인해주세요.\n" + err.message);
                    document.getElementById('loading-screen').style.display = 'none';
                }
            };

            recognition.start();
        }
    </script>
</body>
</html>
