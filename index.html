<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S26 Debugger v34.0</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Cascadia Code', monospace; padding: 20px; font-size: 14px; }
        .box { background: #111; border: 1px solid #333; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        textarea { width: 100%; height: 150px; background: #000; border: 1px solid #444; border-radius: 8px; padding: 15px; color: #0f0; font-family: monospace; font-size: 12px; box-sizing: border-box; margin-bottom: 15px; outline: none; }
        button { background: #0a84ff; color: #fff; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 16px; }
        #log { background: #050505; border: 1px solid #222; padding: 15px; height: 300px; overflow-y: auto; color: #0f0; line-height: 1.6; font-size: 12px; border-radius: 8px; }
    </style>
</head>
<body>

    <h2 style="color: #0a84ff; margin-top: 0;">S26 엑스레이 스캐너 v34.0</h2>
    
    <div class="box">
        <label style="color:#aaa; font-weight:bold; font-size:12px; display:block; margin-bottom:10px;">가져오신 데이터를 그대로 붙여넣으세요.</label>
        <textarea id="data-input" placeholder="여기에 붙여넣기..."></textarea>
        <button onclick="scanData()">데이터 내부 구조 스캔</button>
    </div>

    <div id="log">데이터를 기다리는 중...</div>

<script>
    function printLog(msg, color = "#0f0") {
        const logBox = document.getElementById('log');
        logBox.innerHTML += `<div style="color:${color}; margin-bottom:4px;">> ${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    function scanData() {
        const text = document.getElementById('data-input').value.trim();
        document.getElementById('log').innerHTML = ""; 

        if (!text) {
            printLog("오류: 데이터가 비어있습니다.", "#ff453a");
            return;
        }

        // 1. JSON vs XML 판별
        if (text.startsWith("{") || text.startsWith("[")) {
            printLog("❌ 경고: 이 데이터는 XML이 아니라 JSON 형식입니다!", "#ff453a");
            printLog("테스트 페이지에서 출력 형식을 XML로 바꾸셨는지 확인해주세요.", "#ff9f0a");
            
            try {
                const jsonObj = JSON.parse(text);
                printLog(`JSON 최상위 키값: ${Object.keys(jsonObj).join(', ')}`, "#30d158");
            } catch(e) {
                printLog("하지만 JSON 규격도 깨져있습니다.", "#ff453a");
            }
            return;
        }

        // 2. XML 스캔
        printLog("XML 형식 감지됨. 구조 분해 시작...", "#0a84ff");
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(text, "text/xml");

        // 에러 태그 확인
        if (xmlDoc.getElementsByTagName("parsererror").length > 0) {
            printLog("❌ 치명적 오류: 올바른 XML 형식이 아닙니다. 데이터가 잘렸을 수 있습니다.", "#ff453a");
            return;
        }

        // 모든 태그 수집 (중복 제거)
        const allElements = xmlDoc.getElementsByTagName("*");
        const tagSet = new Set();
        for (let i = 0; i < allElements.length; i++) {
            tagSet.add(allElements[i].tagName);
        }
        const uniqueTags = Array.from(tagSet);

        printLog(`총 ${uniqueTags.length}종류의 데이터 필드가 발견되었습니다.`, "#30d158");
        printLog(`------------------------------------`, "#555");
        printLog(uniqueTags.join(", "), "#aaa");
        printLog(`------------------------------------`, "#555");

        // 핵심 변수 팩트 체크
        const hasTrainTime = uniqueTags.includes("trainDptreTm");
        const hasTravelTime = uniqueTags.includes("totalreqHr") || uniqueTags.includes("shtTravelTm");
        const hasRealtime = uniqueTags.includes("realtimeStationArrival");

        if (hasRealtime) {
            printLog("❌ 진단: 이것은 '실시간 도착' API의 결과물입니다. (최단경로가 아님)", "#ff453a");
        } else if (hasTrainTime) {
            printLog("✅ 진단: <trainDptreTm>가 존재합니다! 정상적인 최단경로 데이터입니다.", "#30d158");
            const val = xmlDoc.getElementsByTagName("trainDptreTm")[0].textContent;
            printLog(`첫 번째 열차 시간값: [${val}]`, "#0a84ff");
        } else {
            printLog("❌ 진단: 역시 <trainDptreTm>가 없습니다.", "#ff453a");
            if (hasTravelTime) {
                printLog("소요 시간 데이터는 있지만, 출발 시간표는 서버가 고의로 주지 않았습니다.", "#ff9f0a");
                printLog("이유 1: 검색하신 시간에 운행하는 열차가 없을 수 있습니다.", "#ff9f0a");
                printLog("이유 2: 검색일시 포맷이 틀렸을 수 있습니다. (예: 202603261400 형식)", "#ff9f0a");
            }
        }
    }
</script>

</body>
</html>
