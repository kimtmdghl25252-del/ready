<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S26 Debugger v28.0</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; padding: 20px; font-size: 14px; }
        .box { background: #111; border: 1px solid #333; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        input { background: #000; border: 1px solid #555; padding: 10px; color: #fff; width: calc(100% - 22px); margin-bottom: 10px; }
        button { background: #0a84ff; color: #fff; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #log { background: #050505; border: 1px solid #222; padding: 15px; height: 300px; overflow-y: auto; color: #0f0; line-height: 1.5; font-size: 12px; }
        .error { color: #ff453a; }
        .success { color: #30d158; }
        .warning { color: #ff9f0a; }
    </style>
</head>
<body>

    <h2 style="color: #0a84ff;">S26 통신 디버거 v28.0</h2>
    
    <div class="box">
        <label>목적지</label>
        <input type="text" id="dest" value="서울">
        <div style="display:flex; gap:10px;">
            <input type="date" id="date">
            <input type="time" id="time">
        </div>
        <button onclick="startTest()">통신 테스트 시작</button>
    </div>

    <div id="log">대기 중... 시스템을 시작하세요.</div>

<script>
    const KEY = '597057594f6b696d3438526a7a564e';
    const START = "상일동";

    window.onload = () => {
        const now = new Date();
        document.getElementById('date').value = now.toISOString().slice(0, 10);
        document.getElementById('time').value = now.toTimeString().slice(0, 5);
    };

    function printLog(msg, type = "normal") {
        const logBox = document.getElementById('log');
        let color = "#0f0";
        if (type === "error") color = "#ff453a";
        if (type === "success") color = "#30d158";
        if (type === "warning") color = "#ff9f0a";
        
        const timeStr = new Date().toLocaleTimeString();
        logBox.innerHTML += `<div style="color:${color}; margin-bottom:4px;">[${timeStr}] ${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    async function startTest() {
        const dest = document.getElementById('dest').value.trim();
        const date = document.getElementById('date').value.replace(/-/g, "");
        const time = document.getElementById('time').value.replace(/:/g, "");
        
        document.getElementById('log').innerHTML = ""; // 로그 초기화
        printLog(`데이터 요청 초기화: ${START} -> ${dest}`);

        // 서울시 포트 8088 원본 URL (XML)
        const targetUrl = `http://openapi.seoul.go.kr:8088/${KEY}/xml/subwayShortestRoute/1/1/${START}/${dest}/${date}${time}/1`;
        printLog(`타겟 URL: ${targetUrl}`);

        // 테스트할 프록시 리스트 (우회 경로들)
        const proxies = [
            { name: "ThingProxy", url: `https://thingproxy.freeboard.io/fetch/${targetUrl}` },
            { name: "CodeTabs", url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}` },
            { name: "AllOrigins (Raw)", url: `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}` },
            { name: "CorsProxy.io", url: `https://corsproxy.io/?${encodeURIComponent(targetUrl)}` }
        ];

        let success = false;

        for (let i = 0; i < proxies.length; i++) {
            if (success) break;
            
            const p = proxies[i];
            printLog(`------------------------------------`);
            printLog(`[시도 ${i+1}/${proxies.length}] ${p.name} 프록시 연결 중...`, "warning");

            try {
                // 5초 타임아웃 설정 (프록시가 뻗어서 무한 대기하는 것 방지)
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 7000);

                const res = await fetch(p.url, { signal: controller.signal });
                clearTimeout(timeoutId);

                printLog(`응답 상태 코드: ${res.status}`);

                if (!res.ok) {
                    throw new Error(`HTTP 에러 ${res.status}`);
                }

                const text = await res.text();
                printLog(`데이터 수신 바이트: ${text.length} bytes`);

                // 데이터 검증
                if (text.includes("<!DOCTYPE") || text.includes("<html")) {
                    printLog("결과: HTML 에러 페이지 반환 (방화벽 차단됨)", "error");
                    continue; // 다음 프록시로 넘어감
                }

                if (text.includes("<subwayShortestRoute>")) {
                    printLog("✅ 완벽한 XML 데이터 수신 성공!", "success");
                    success = true;
                    
                    // 파싱 테스트
                    const parser = new DOMParser();
                    const xml = parser.parseFromString(text, "text/xml");
                    const trainTime = xml.getElementsByTagName("trainDptreTm")[0]?.textContent;
                    
                    if(trainTime) {
                        printLog(`[데이터 추출 확인] 첫 열차 출발 시각: ${trainTime}`, "success");
                    } else {
                        printLog("경로 데이터가 비어있습니다. (시간/날짜 혹은 목적지 오류)", "error");
                    }
                } else {
                    printLog("결과: 알 수 없는 데이터 형식", "error");
                }

            } catch (e) {
                if (e.name === 'AbortError') {
                    printLog("결과: 타임아웃 (7초 초과 - 서버 무응답)", "error");
                } else {
                    printLog(`결과: 연결 실패 (${e.message})`, "error");
                }
            }
        }

        if (!success) {
            printLog(`====================================`, "error");
            printLog("모든 프록시 서버가 서울시 방화벽에 막혔거나 응답하지 않습니다.", "error");
            printLog("현재 깃허브 페이지(HTTPS) 환경에서는 이 방법으로 호출이 불가능합니다.", "error");
        }
    }
</script>

</body>
</html>
