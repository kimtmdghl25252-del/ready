<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S26 Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000; --card: #151515; --blue: #0a84ff; --green: #30d158; --red: #ff453a; --text: #fff; --orange: #ff9f0a; --purple: #bf5af2; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 50px; }
        
        /* 뱃지 우측 정렬 */
        .header-badge { text-align: right; margin-bottom: 15px; }
        .badge { font-size: 11px; background: #222; padding: 6px 10px; border-radius: 8px; color: var(--purple); font-weight: bold; letter-spacing: 1px; }
        
        .input-box { background: var(--card); border: 1px solid #333; border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        input[type="text"], input[type="time"] { width: 100%; background: #000; border: 1px solid #444; border-radius: 12px; padding: 18px; color: #fff; font-size: 18px; box-sizing: border-box; margin-bottom: 20px; outline: none; font-weight: bold; text-align: center; }
        
        .radio-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .radio-label { flex: 1; text-align: center; background: #000; border: 1px solid #444; border-radius: 12px; padding: 15px; color: #aaa; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .radio-label.active { background: var(--blue); color: #fff; border-color: var(--blue); }
        input[type="radio"] { display: none; }

        button { width: 100%; padding: 20px; border-radius: 14px; border: none; background: var(--blue); color: #fff; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.2s; }
        
        #station-selector { display: none; margin-bottom: 20px; }
        .station-btn { background: #222; border: 1px solid #444; color: #fff; padding: 15px; margin-bottom: 10px; border-radius: 12px; text-align: left; display: flex; justify-content: space-between; align-items: center; width: 100%; cursor: pointer; border-left: 4px solid var(--purple); }
        
        .result-card { background: linear-gradient(145deg, #1a1a1c, #000); border: 1px solid var(--blue); border-radius: 24px; padding: 40px 20px; text-align: center; display: none; margin-top: 20px; }
        .door-time { font-size: 90px; font-weight: 900; color: var(--blue); letter-spacing: -4px; margin: 0 0 10px 0; line-height: 1; }
        .train-info { font-size: 28px; color: var(--blue); font-weight: 900; margin-bottom: 30px; letter-spacing: -1px; }
        
        .weather-box { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 25px 20px; margin-bottom: 20px; text-align: left; border: 1px solid #222; }
        .chart-container { position: relative; height: 140px; width: 100%; margin-top: 25px; }

        #res-meta { font-size: 14px; color: #aaa; border-top: 1px solid #222; padding-top: 20px; line-height: 1.8; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-badge">
        <span class="badge">v54.0</span>
    </div>

    <div class="input-box">
        <div class="radio-group">
            <label class="radio-label active" id="label-A"><input type="radio" name="mode" value="A" checked onchange="toggleMode()"> 목적지로</label>
            <label class="radio-label" id="label-B"><input type="radio" name="mode" value="B" onchange="toggleMode()"> 근처역으로</label>
        </div>

        <input type="text" id="dest" value="천호보건지소" placeholder="최종 목적지 입력">
        <input type="time" id="time" value="22:02">
        
        <button onclick="startEngine()"><i class="fas fa-route"></i> 최적 경로 연산 시작</button>
    </div>

    <div id="station-selector">
        <div id="station-list"></div>
    </div>

    <div id="result" class="result-card">
        <div id="res-door" class="door-time">--:--</div>
        <div id="res-train" class="train-info">--:--</div>
        
        <div id="res-weather" class="weather-box">
            <div id="w-temp" style="font-size: 16px; font-weight: bold; color: #fff;"></div>
            <div id="w-clothes" style="font-size:13px; color:#ddd; margin-top:10px; line-height:1.6;"></div>
            <div class="chart-container"><canvas id="rainChart"></canvas></div>
        </div>

        <div id="res-meta"></div>
    </div>
</div>

<script>
    const CONFIG = {
        KAKAO: '56b6a0adbc28cab6f7c87ac9f84b14d0',
        SEOUL: '597057594f6b696d3438526a7a564e',
        KMA: 'ddfd71d0b929827fd9c3c1851b50c301f9afb482a3143c0b39e135f9b3b8f070',
        PROXY: 'https://script.google.com/macros/s/AKfycbxRODYhCj2NupEwxZm7YEigfFM_N_wg5TXUHWGtDvirC_clahAQgx7Z4bT94rJX9fZWtg/exec',
        MARGIN: 10
    };

    let rainChart = null;
    window.tempOptions = [];

    // UI 클린업: 화면 하단 로그 대신 개발자 도구 콘솔에만 출력되도록 변경
    function printLog(msg) {
        console.log(`[S26 Engine] ${msg}`);
    }

    function toggleMode() {
        const mode = document.querySelector('input[name="mode"]:checked').value;
        document.getElementById('label-A').classList.toggle('active', mode === 'A');
        document.getElementById('label-B').classList.toggle('active', mode === 'B');
        document.getElementById('station-selector').style.display = 'none';
        document.getElementById('result').style.display = 'none';
    }

    function hmToMins(timeStr) {
        let [h, m] = timeStr.split(':').map(Number);
        return h * 60 + m;
    }
    
    function minsToHm(mins) {
        let m = Math.round(mins);
        while(m < 0) m += 24 * 60;
        m = m % (24 * 60);
        return `${String(Math.floor(m / 60)).padStart(2,'0')}:${String(m % 60).padStart(2,'0')}`;
    }

    function cleanStationName(name) {
        return name.split(' ')[0].split('(')[0].replace(/역$/, '').trim();
    }

    function calcRealWalkMins(straightDistance) {
        return Math.ceil((straightDistance * 1.35) / 67);
    }

    async function startEngine() {
        const dest = document.getElementById('dest').value.trim();
        const targetTime = document.getElementById('time').value;
        const mode = document.querySelector('input[name="mode"]:checked').value;

        document.getElementById('result').style.display = 'none';
        document.getElementById('station-selector').style.display = 'none';
        window.tempOptions = [];

        try {
            printLog("카카오 API 목적지 스캔...");
            const kRes = await fetch(`https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent(dest)}`, {
                headers: { Authorization: `KakaoAK ${CONFIG.KAKAO}` }
            });
            const kData = await kRes.json();
            if(!kData.documents[0]) throw new Error("장소를 찾을 수 없습니다.");
            
            const { x: destX, y: destY, place_name: placeName } = kData.documents[0];
            
            processKMAWeather(destY, destX, parseInt(targetTime.split(':')[0]));

            printLog("주변 지하철역 스캔 및 도보 시간 확보...");
            const sRes = await fetch(`https://dapi.kakao.com/v2/local/search/category.json?category_group_code=SW8&x=${destX}&y=${destY}&radius=2000&sort=distance`, {
                headers: { Authorization: `KakaoAK ${CONFIG.KAKAO}` }
            });
            const sData = await sRes.json();
            
            let allStations = [];
            let seen = new Set();
            sData.documents.forEach(d => {
                let name = cleanStationName(d.place_name); 
                if (!seen.has(name)) {
                    seen.add(name);
                    allStations.push({ name: name, walk: calcRealWalkMins(d.distance) });
                }
            });

            const targetMins = hmToMins(targetTime);

            if (mode === 'A') {
                let bestRoute = null;
                let minTotalMins = Infinity;

                for(let i=0; i<Math.min(3, allStations.length); i++) {
                    let stn = allStations[i];
                    let subMins = 30; 
                    try {
                        const d = new Date();
                        const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                        const probeApi = `http://openapi.seoul.go.kr:8088/${CONFIG.SEOUL}/xml/getShtrmPath/1/100/상일동/${stn.name}/${dateStr} 12:00:00/1/%20/%20/Y`;
                        const res = await fetch(`${CONFIG.PROXY}?url=${encodeURIComponent(probeApi)}`);
                        const xml = new DOMParser().parseFromString(await res.text(), "text/xml");
                        if (xml.getElementsByTagName("resultCode")[0]?.textContent === "00") {
                            subMins = Math.ceil(Number(xml.getElementsByTagName("totalreqHr")[0]?.textContent) / 60);
                        }
                    } catch(e) {}
                    
                    let totalRouteMins = subMins + stn.walk;
                    if (totalRouteMins < minTotalMins) {
                        minTotalMins = totalRouteMins;
                        bestRoute = { ...stn, subMins };
                    }
                }

                if(!bestRoute) throw new Error("경로를 연산할 수 없습니다.");

                const limitMinsA = targetMins - bestRoute.walk;
                let train = await fetchRealTrainSilent(bestRoute.name, limitMinsA, bestRoute.subMins);
                
                if(train) {
                    renderFinalResult({ stn: bestRoute, c: limitMinsA, d: train.depM, train: train, placeName, targetTime, routeMode: 'A' });
                } else {
                    throw new Error("서버 배차 응답 오류.");
                }

            } else {
                let walk15Stations = allStations.filter(s => s.walk <= 15);
                
                if (walk15Stations.length <= 1) {
                    let stn = allStations[0];
                    let subMins = 30; 
                    try {
                        const dateStr = new Date().toISOString().slice(0,10);
                        const probeApi = `http://openapi.seoul.go.kr:8088/${CONFIG.SEOUL}/xml/getShtrmPath/1/100/상일동/${stn.name}/${dateStr} 12:00:00/1/%20/%20/Y`;
                        const res = await fetch(`${CONFIG.PROXY}?url=${encodeURIComponent(probeApi)}`);
                        const xml = new DOMParser().parseFromString(await res.text(), "text/xml");
                        if (xml.getElementsByTagName("resultCode")[0]?.textContent === "00") {
                            subMins = Math.ceil(Number(xml.getElementsByTagName("totalreqHr")[0]?.textContent) / 60);
                        }
                    } catch(e) {}
                    
                    const limitMins = targetMins - stn.walk;
                    let train = await fetchRealTrainSilent(stn.name, limitMins, subMins);
                    if(train) renderFinalResult({ stn: stn, c: limitMins, d: train.depM, train: train, placeName, targetTime, routeMode: 'A' });
                    
                } else {
                    let validOptions = [];

                    for(let stn of walk15Stations.slice(0, 4)) {
                        let subMins = 30; 
                        try {
                            const dateStr = new Date().toISOString().slice(0,10);
                            const probeApi = `http://openapi.seoul.go.kr:8088/${CONFIG.SEOUL}/xml/getShtrmPath/1/100/상일동/${stn.name}/${dateStr} 12:00:00/1/%20/%20/Y`;
                            const res = await fetch(`${CONFIG.PROXY}?url=${encodeURIComponent(probeApi)}`);
                            const xml = new DOMParser().parseFromString(await res.text(), "text/xml");
                            if (xml.getElementsByTagName("resultCode")[0]?.textContent === "00") {
                                subMins = Math.ceil(Number(xml.getElementsByTagName("totalreqHr")[0]?.textContent) / 60);
                            }
                        } catch(e) {}

                        let limitMins = targetMins; 
                        let train = await fetchRealTrainSilent(stn.name, limitMins, subMins); 
                        
                        if(train) {
                            validOptions.push({ stn: stn, c: limitMins, d: train.depM, train: train, placeName, targetTime, routeMode: 'B' });
                        }
                    }

                    if(validOptions.length === 0) throw new Error("적합한 배차표를 찾을 수 없습니다.");

                    validOptions.sort((a, b) => b.d - a.d);
                    let maxD = validOptions[0].d; 
                    let finalOptions = validOptions.filter(o => o.d >= maxD - 15);

                    if (finalOptions.length === 1) {
                        renderFinalResult(finalOptions[0]);
                    } else {
                        window.tempOptions = finalOptions;
                        let html = '';
                        finalOptions.forEach((opt, idx) => {
                            html += `<button class="station-btn" onclick="selectOption(${idx})">
                                <div style="text-align:left;">
                                    <div style="font-size:15px; margin-bottom:4px;"><i class="fas fa-subway"></i> ${opt.stn.name}역 도착 목표</div>
                                    <div style="font-size:12px; color:#aaa;">(목적지까지 도보 ${opt.stn.walk}분)</div>
                                </div>
                                <div style="text-align:right;">
                                    <div style="font-size:11px; color:var(--green); margin-bottom:2px;">상일동 출발</div>
                                    <div style="font-size:18px; font-weight:bold; color:var(--blue);">${minsToHm(opt.d)}</div>
                                </div>
                            </button>`;
                        });
                        document.getElementById('station-list').innerHTML = html;
                        document.getElementById('station-selector').style.display = 'block';
                    }
                }
            }
        } catch(e) { alert(e.message); }
    }

    async function fetchRealTrainSilent(stnName, limitMins, subMins) {
        const expectedDepMins = limitMins - subMins;
        const d = new Date();
        const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        
        const offsets = [-30, -15, 0, 10];
        let allTrains = [];

        for(let off of offsets) {
            let reqMins = expectedDepMins + off;
            let reqTimeStr = minsToHm(reqMins) + ':00';
            
            let apiUrl = `http://openapi.seoul.go.kr:8088/${CONFIG.SEOUL}/xml/getShtrmPath/1/100/상일동/${stnName}/${dateStr} ${reqTimeStr}/1/%20/%20/Y`;
            try {
                let res = await fetch(`${CONFIG.PROXY}?url=${encodeURIComponent(apiUrl)}`);
                let xmlText = await res.text();
                let xml = new DOMParser().parseFromString(xmlText, "text/xml");
                
                let deps = xml.getElementsByTagName("trainDptreTm");
                let arrs = xml.getElementsByTagName("trainArvlTm");
                
                if(deps.length > 0 && arrs.length > 0) {
                    let dep = deps[0].textContent;
                    let arr = arrs[arrs.length - 1].textContent;
                    allTrains.push({ dep, arr, arrM: hmToMins(arr), depM: hmToMins(dep) });
                }
            } catch(e) {}
        }

        let bestTrain = null;
        let minDiff = Infinity;

        if(allTrains.length > 0) {
            allTrains.forEach(t => {
                let diff = limitMins - t.arrM;
                if(diff < -720) diff += 1440;
                if(diff > 720) diff -= 1440;

                if(diff >= 0 && diff < minDiff) {
                    minDiff = diff;
                    bestTrain = t;
                }
            });
        }
        return bestTrain;
    }

    function selectOption(idx) {
        const opt = window.tempOptions[idx];
        document.getElementById('station-selector').style.display = 'none';
        renderFinalResult(opt);
    }

    function renderFinalResult(opt) {
        document.getElementById('result').style.display = 'block';
        
        const doorMins = opt.d - CONFIG.MARGIN;
        
        // 파란 테두리 UI 반영
        document.getElementById('res-door').innerText = minsToHm(doorMins);
        document.getElementById('res-train').innerText = minsToHm(opt.d);
        
        document.getElementById('res-meta').innerHTML = `
            도착 후 실제 도보 ${opt.stn.walk}분<br>
            <span style="color:var(--green)">하차역 실제 도착 예정 시각: ${opt.train.arr}</span>
        `;
    }

    async function processKMAWeather(lat, lon, targetH) {
        const grid = dfs_xy_conv(lat, lon);
        const baseDate = new Date().toISOString().slice(0,10).replace(/-/g, '');
        const url = `https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst?serviceKey=${CONFIG.KMA}&numOfRows=1000&pageNo=1&base_date=${baseDate}&base_time=0200&nx=${grid.nx}&ny=${grid.ny}&dataType=JSON`;
        
        try {
            const res = await fetch(url);
            const data = await res.json();
            const items = data.response.body.items.item;
            let hourly = {};
            items.forEach(i => { if(!hourly[i.fcstTime]) hourly[i.fcstTime]={}; hourly[i.fcstTime][i.category]=i.fcstValue; });
            
            const times = Object.keys(hourly).sort().filter(t => parseInt(t.slice(0,2)) >= targetH && parseInt(t.slice(0,2)) <= 22);
            if(times.length === 0) return;

            const temps = times.map(t => parseFloat(hourly[t].TMP));
            const pops = times.map(t => parseInt(hourly[t].POP));
            
            const minT = Math.round(Math.min(...temps));
            const maxT = Math.round(Math.max(...temps));

            const rules = [
                { min: 28, max: 99, label: "28도 이상", text: "민소매, 반팔, 반바지" },
                { min: 23, max: 27, label: "27도 ~ 23도", text: "반팔, 얇은 셔츠/바지" },
                { min: 20, max: 22, label: "22도 ~ 20도", text: "긴팔 티셔츠, 얇은 가디건" },
                { min: 17, max: 19, label: "19도 ~ 17도", text: "얇은 니트, 맨투맨, 가을 자켓" },
                { min: 12, max: 16, label: "16도 ~ 12도", text: "자켓, 야상, 두꺼운 가디건" },
                { min: 9, max: 11, label: "11도 ~ 9도", text: "트렌치코트, 야상, 점퍼" },
                { min: 5, max: 8, label: "8도 ~ 5도", text: "코트, 가죽자켓, 히트텍" },
                { min: -99, max: 4, label: "4도 이하", text: "패딩, 두꺼운 코트, 방한용품" }
            ];

            let recommendations = [];
            rules.forEach(r => {
                if (r.min <= maxT && r.max >= minT) {
                    recommendations.push(`- <span style="color:var(--orange); font-weight:bold;">${r.label}</span> : ${r.text}`);
                }
            });

            document.getElementById('w-temp').innerText = `기온: 최저 ${minT}°C ~ 최고 ${maxT}°C`;
            document.getElementById('w-clothes').innerHTML = `<b>목적지 도착 시점 추천 코디 스펙트럼:</b><br>${recommendations.join('<br>')}`;
            
            if(rainChart) rainChart.destroy();
            const pointColors = pops.map(p => p >= 40 ? '#ff453a' : '#0a84ff');
            rainChart = new Chart(document.getElementById('rainChart'), {
                type: 'line',
                data: { labels: times.map(t=>t.slice(0,2)+'시'), datasets: [{ data: pops, borderColor: '#0a84ff', backgroundColor: 'rgba(10,132,255,0.1)', borderWidth: 2, pointBackgroundColor: pointColors, fill: true }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: 0, max: 100, ticks: {color: '#888'}, grid: {color: '#333'} }, x: { ticks: {color: '#888'} } } }
            });
        } catch(e) {}
    }

    function dfs_xy_conv(v1, v2) {
        const RE = 6371.00877, GRID = 5.0, SLAT1 = 30.0, SLAT2 = 60.0, OLON = 126.0, OLAT = 38.0, XO = 43, YO = 136, DEGRAD = Math.PI / 180.0;
        const re = RE / GRID, slat1 = SLAT1 * DEGRAD, slat2 = SLAT2 * DEGRAD, olon = OLON * DEGRAD, olat = OLAT * DEGRAD;
        let sn = Math.log(Math.cos(slat1) / Math.cos(slat2)) / Math.log(Math.tan(Math.PI * 0.25 + slat2 * 0.5) / Math.tan(Math.PI * 0.25 + slat1 * 0.5));
        let sf = Math.pow(Math.tan(Math.PI * 0.25 + slat1 * 0.5), sn) * Math.cos(slat1) / sn;
        let ro = re * sf / Math.pow(Math.tan(Math.PI * 0.25 + olat * 0.5), sn);
        let ra = re * sf / Math.pow(Math.tan(Math.PI * 0.25 + v1 * DEGRAD * 0.5), sn);
        let theta = v2 * DEGRAD - olon;
        if (theta > Math.PI) theta -= 2.0 * Math.PI; if (theta < -Math.PI) theta += 2.0 * Math.PI;
        return { nx: Math.floor(ra * Math.sin(theta * sn) + XO + 0.5), ny: Math.floor(ro - ra * Math.cos(theta * sn) + YO + 0.5) };
    }
</script>
</body>
</html>
