<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S26 프리미엄 외출 비서</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #121212; /* One UI 다크모드 배경색 */
            --card-bg: #1e1e1e; /* 카드 배경색 */
            --text-main: #ffffff;
            --text-sub: #aaaaaa;
            --accent-blue: #3e91ff; /* 삼성 블루 */
            --accent-orange: #ff9f43; /* 경고 오렌지 */
            --accent-red: #ff4d4d; /* 초경고 레드 */
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* 초기 화면 (초대형 버튼 2개) */
        #initial-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
            padding: 40px;
        }

        .large-btn {
            width: 100%;
            height: 120px;
            background-color: var(--card-bg);
            border: 2px solid #333;
            border-radius: 25px;
            color: var(--text-main);
            font-size: 22px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .large-btn:active {
            transform: scale(0.97);
            background-color: #2a2a2a;
        }

        .large-btn i {
            font-size: 30px;
            color: var(--accent-blue);
        }

        /* 로딩 화면 */
        #loading-screen {
            display: none;
            flex: 1;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--text-sub);
        }

        #loading-screen i {
            font-size: 50px;
            color: var(--accent-blue);
            margin-bottom: 20px;
        }

        /* 지하철역 선택 모달 */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        #station-modal {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 25px;
            width: 80%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #333;
        }

        #station-modal h3 { margin-top: 0; margin-bottom: 20px; }

        #station-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 250px;
            overflow-y: auto;
        }

        .station-option {
            background: #2a2a2a;
            color: var(--text-main);
            border: 1px solid #444;
            padding: 15px;
            border-radius: 15px;
            font-size: 16px;
            cursor: pointer;
            text-align: left;
        }

        /* 결과 화면 */
        #result-screen {
            display: none;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 40px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 1px solid #2a2a2a;
        }

        /* 출발 알림 카드 (Top) */
        #departure-card {
            border: 2px solid var(--accent-blue);
        }

        #safety-time {
            font-size: 40px;
            font-weight: 900;
            color: var(--accent-blue);
            margin: 10px 0;
        }

        #route-detail, #fast-transfer {
            font-size: 15px;
            color: var(--text-sub);
            margin-top: 10px;
            line-height: 1.4;
        }

        #fast-transfer i { color: #555; margin-right: 5px; }

        /* 옷차림 카드 (Middle) */
        .outfit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .outfit-header h2 { font-size: 18px; margin: 0; }
        #target-temps { font-size: 14px; color: var(--text-sub); }

        .outfit-row {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #2a2a2a;
            border-radius: 15px;
            margin-bottom: 10px;
        }

        .outfit-row:last-child { margin-bottom: 0; }

        .outfit-icon {
            font-size: 35px;
            color: var(--text-sub);
            width: 50px;
            text-align: center;
        }

        .outfit-text {
            flex: 1;
            font-size: 14px;
            color: var(--text-main);
            line-height: 1.4;
            word-break: keep-all;
        }

        .outfit-label {
            font-size: 12px;
            color: var(--text-sub);
            margin-bottom: 3px;
        }

        /* 강수 그래프 카드 (Bottom) */
        #rain-chart-container {
            height: 200px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="initial-screen">
        <button class="large-btn" onclick="startProcess('direct')">
            <i class="fas fa-map-marker-alt"></i>
            📍 목적지 바로 앞까지
        </button>
        <button class="large-btn" onclick="startProcess('station')">
            <i class="fas fa-subway"></i>
            🚇 근처 지하철역까지만
        </button>
    </div>

    <div id="loading-screen">
        <i class="fas fa-spinner fa-spin"></i>
        <div id="loading-text">페이지를 여는 시점의<br>위치를 파악하고 있습니다...</div>
    </div>

    <div id="modal-overlay">
        <div id="station-modal">
            <h3>근처 지하철역 선택</h3>
            <div id="station-list">
                </div>
        </div>
    </div>

    <div id="result-screen">
        <div class="card" id="departure-card">
            <div style="font-size: 16px;">⏰ 최종 출발 시각</div>
            <div id="safety-time">--:--</div>
            <div id="route-detail">대중교통 정보를 불러오는 중입니다...</div>
            <div id="fast-transfer"><i class="fas fa-sign-out-alt"></i> 빠른 환승: --</div>
        </div>

        <div class="card" id="outfit-card">
            <div class="outfit-header">
                <h2>🌡️ 실시간 옷차림 추천</h2>
                <div id="target-temps">최고 --° / 밤10시 --°</div>
            </div>
            <div id="outfit-list">
                </div>
        </div>

        <div class="card">
            <div style="font-size: 16px; margin-bottom: 10px;">☂️ 목적지 시간별 강수 확률</div>
            <div id="rain-chart-container">
                <canvas id="rainChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // === [1. API 키 설정] ===
        const KMA_KEY = 'ddfd71d0b929827fd9c3c1851b50c301f9afb482a3143c0b39e135f9b3b8f070';
        const KAKAO_KEY = '56b6a0adbc28cab6f7c87ac9f84b14d0';
        const ODSAY_KEY = 'Rdv6LaA8z0P2BHkKrh/DsA';

        // === [2. 좌표 및 고정값 설정] ===
        const SANGIL_SUBWAY = { name: "상일동역 (지하철)", sx: 127.1735, sy: 37.5519, mode: 'subway' };
        const SANGIL_BUS = { name: "상일동역1번출구 (버스)", sx: 127.1741, sy: 37.5524, mode: 'bus' };
        const NIGHT_TARGET_HOUR = 22; // 밤 10시 고정

        // === [3. 옷차림 데이터베이스 (현대화된 아이콘 매핑)] ===
        const OUTFIT_DB = [
            { range: [28, 99], text: "민소매, 반팔, 반바지, 원피스", icon: "fa-shirt" },
            { range: [23, 27], text: "반팔, 얇은 셔츠, 반바지, 면바지", icon: "fa-shirt" },
            { range: [20, 22], text: "얇은 가디건, 긴팔, 면바지, 청바지", icon: "fa-user-tie" },
            { range: [17, 19], text: "얇은 니트, 맨투맨, 가디건, 청바지", icon: "fa-mitten" },
            { range: [12, 16], text: "자켓, 가디건, 야상, 스타킹, 청바지", icon: "fa-user-nurse" },
            { range: [9, 11],  text: "자켓, 트렌치코트, 야상, 니트, 청바지", icon: "fa-hat-cowboy" },
            { range: [5, 8],   text: "코트, 가죽자켓, 히트텍, 니트, 레깅스", icon: "fa-hat-winter" },
            { range: [-99, 4], text: "패딩, 두꺼운 코트, 목도리, 기모제품", icon: "fa-snowflake" }
        ];

        let state = { destMode: null, placeName: null, targetTime: null, targetCoords: null };
        let rainChart = null;

        // === [A. 초기 프로세스 시작] ===
        function startProcess(mode) {
            state.destMode = mode;
            document.getElementById('initial-screen').style.display = 'none';
            document.getElementById('loading-screen').style.display = 'flex';
            document.getElementById('loading-text').innerHTML = "'📍 장소, ⏰ 시간'을 말해주세요.<br>예) '서울역, 14시'";
            startSpeechRecognition();
        }

        // === [B. 음성 인식] ===
        function startSpeechRecognition() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!window.SpeechRecognition) {
                alert("이 브라우저는 음성 인식을 지원하지 않습니다. 삼성 인터넷이나 크롬을 이용해 주세요.");
                resetPage();
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'ko-KR';
            recognition.interimResults = false;

            recognition.start();

            recognition.onresult = (event) => {
                const speech = event.results[0][0].transcript;
                parseSpeech(speech);
            };

            recognition.onerror = (event) => {
                document.getElementById('loading-text').innerText = "음성을 인식하지 못했습니다. 버튼을 눌러 다시 시도해주세요.";
                setTimeout(resetPage, 2000);
            };
        }

        // === [C. 음성 파싱] ===
        function parseSpeech(text) {
            // 정규식으로 '장소'와 '시간' 추출 (가장 흔한 패턴: '장소' + '숫자' + '시')
            const timeMatch = text.match(/(\d{1,2})\s*시/);
            
            if (!timeMatch) {
                document.getElementById('loading-text').innerText = "시간 정보를 찾을 수 없습니다. '14시'처럼 말해주세요.";
                setTimeout(resetPage, 2000);
                return;
            }

            state.targetTime = parseInt(timeMatch[1]);
            state.placeName = text.replace(timeMatch[0], "").trim().replace(",", ""); // 시간을 제외한 나머지를 장소로 인식

            document.getElementById('loading-text').innerHTML = `<b>${state.placeName}</b>(으)로<br><b>${state.targetTime}시</b>에 도착하는 길을 찾습니다...`;
            getCoordsFromKakao();
        }

        // === [D. 카카오 API: 장소 -> 좌표 변환] ===
        async function getCoordsFromKakao() {
            try {
                const response = await fetch(`https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent(state.placeName)}`, {
                    headers: { 'Authorization': `KakaoAK ${KAKAO_KEY}` }
                });
                const data = await response.json();

                if (data.documents.length === 0) {
                    throw new Error("장소를 찾을 수 없습니다.");
                }

                const doc = data.documents[0];
                const placeCoords = { x: parseFloat(doc.x), y: parseFloat(doc.y) };

                if (state.destMode === 'direct') {
                    state.targetCoords = placeCoords;
                    processAllData();
                } else {
                    findNearbySubwayStations(placeCoords);
                }

            } catch (error) {
                document.getElementById('loading-text').innerText = error.message;
                setTimeout(resetPage, 2000);
            }
        }

        // === [E. 카카오 API: 근처 지하철역 탐색 ("역으로" 모드)] ===
        async function findNearbySubwayStations(coords) {
            try {
                // 카카오 로컬 카테고리 검색 (SW8 = 지하철역)
                const response = await fetch(`https://dapi.kakao.com/v2/local/search/category.json?category_group_code=SW8&x=${coords.x}&y=${coords.y}&radius=1000&sort=distance`, {
                    headers: { 'Authorization': `KakaoAK ${KAKAO_KEY}` }
                });
                const data = await response.json();

                if (data.documents.length === 0) {
                    // 도보 15분(약 1km) 내 역 없으면 그냥 목적지 바로 앞까지 모드로 전환
                    state.destMode = 'direct';
                    state.targetCoords = coords;
                    document.getElementById('loading-text').innerText = "도보 15분 내 지하철역이 없어<br>목적지 바로 앞으로 길을 찾습니다.";
                    setTimeout(processAllData, 1500);
                    return;
                }

                const stations = data.documents;

                if (stations.length === 1) {
                    // 역이 하나면 바로 선택
                    state.targetCoords = { x: parseFloat(stations[0].x), y: parseFloat(stations[0].y) };
                    processAllData();
                } else {
                    // 역이 여러 개면 모달 팝업
                    showStationModal(stations);
                }

            } catch (error) {
                resetPage();
            }
        }

        // === [F. 모달 표시 및 선택] ===
        function showStationModal(stations) {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('modal-overlay').style.display = 'flex';
            const list = document.getElementById('station-list');
            list.innerHTML = '';

            stations.forEach(st => {
                const btn = document.createElement('button');
                btn.className = 'station-option';
                const distMin = Math.round(parseInt(st.distance) / 67); // 도보 약 1분 = 67m
                btn.innerText = `${st.place_name} (${distMin}분 거리)`;
                btn.onclick = () => {
                    state.targetCoords = { x: parseFloat(st.x), y: parseFloat(st.y) };
                    document.getElementById('modal-overlay').style.display = 'none';
                    document.getElementById('loading-screen').style.display = 'flex';
                    processAllData();
                };
                list.appendChild(btn);
            });
        }

        // === [G. 통합 데이터 처리 (핵심 뼈대)] ===
        async function processAllData() {
            // 로딩 화면 업데이트
            document.getElementById('loading-text').innerText = "최적의 출발 시각과<br>날씨 정보를 계산하고 있습니다...";
            
            // 3개 API 비동기 병렬 호출로 속도 최적화
            try {
                const [weatherData, routeA, routeB] = await Promise.all([
                    getWeatherDataKMA(),
                    getTransitRouteODsay(SANGIL_SUBWAY),
                    getTransitRouteODsay(SANGIL_BUS)
                ]);

                // 데이터 처리 및 UI 업데이트
                updateWeatherUI(weatherData);
                calculateOptimalRoute(routeA, routeB);

                // 화면 전환
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('result-screen').style.display = 'flex';

            } catch (error) {
                document.getElementById('loading-text').innerText = "데이터 수신에 실패했습니다.";
                setTimeout(resetPage, 3000);
            }
        }

        // === [H. 오디세이 API: 대중교통 길찾기 호출] ===
        async function getTransitRouteODsay(origin) {
            try {
                // 특정 시간 도착 기준이 아닌, 대략적인 소요 시간 계산을 위해 현재 시각 기준으로 호출
                const response = await fetch(`https://api.odsay.com/v1/api/searchPubTransPathT?SX=${origin.sx}&SY=${origin.sy}&EX=${state.targetCoords.x}&EY=${state.targetCoords.y}&apiKey=${encodeURIComponent(ODSAY_KEY)}`);
                const data = await response.json();
                
                if (data.result) {
                    // 지하철 전용(pathType=1) 또는 버스+지하철(pathType=0, 2) 중 최적 루트 반환
                    return { ...origin, path: data.result.path[0] }; 
                }
                return null;
            } catch (e) { return null; }
        }

        // === [I. 교통 최적화 및 출발 시각 계산 (가장 복잡한 핵심 로직)] ===
        function calculateOptimalRoute(routeA, routeB) {
            let selectedRoute = null;

            // 1. 소요 시간 비교 (ODsay 소요시간: 0시 0분 포맷 파싱 필요)
            function getMinutes(path) {
                if (!path) return 999;
                return path.info.totalTime;
            }

            const timeA = getMinutes(routeA ? routeA.path : null);
            const timeB = getMinutes(routeB ? routeB.path : null);

            // 15분 차이 룰 적용
            if (routeA && routeB && (timeA - timeB >= 15)) {
                selectedRoute = routeB; // 버스가 15분 이상 빠르면 버스 루트 채택
            } else if (routeA) {
                selectedRoute = routeA; // 그 외엔 지하철 전용 루트 우선
            } else if (routeB) {
                selectedRoute = routeB; // 지하철 전용 없으면 버스 루트
            }

            if (!selectedRoute || !selectedRoute.path) {
                document.getElementById('route-detail').innerText = "이동 경로를 찾을 수 없습니다.";
                return;
            }

            // 2. 최종 출발 시각 계산 (안전 마진 적용)
            // 목표 시각을 Date 객체로 변환 (오늘)
            const now = new Date();
            const targetDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), state.targetTime, 0, 0);
            
            // 소요 시간 및 마진 분(minutes)
            const totalTravelMin = selectedRoute.path.info.totalTime;
            const safetyMarginMin = selectedRoute.mode === 'subway' ? 10 : 25;
            const totalNeededMin = totalTravelMin + safetyMarginMin;

            // 역산된 안전 출발 시각
            const safetyDepartureDate = new Date(targetDate.getTime() - totalNeededMin * 60000);

            // UI 업데이트
            const hours = String(safetyDepartureDate.getHours()).padStart(2, '0');
            const minutes = String(safetyDepartureDate.getMinutes()).padStart(2, '0');
            document.getElementById('safety-time').innerText = `${hours}:${minutes}`;

            document.getElementById('route-detail').innerHTML = `<b>${selectedRoute.name}</b>에서 탑승<br>(총 ${totalTravelMin}분 소요 예상, ${safetyMarginMin}분 여유 포함)`;

            // 빠른 환승 정보 (지하철 수단이 있는 경우에만)
            let fastTransferText = "--";
            if (selectedRoute.path.subPath) {
                // ODsay subPath에서 첫 지하철 탑승 정보 찾기
                const subPath = selectedRoute.path.subPath.find(sp => sp.trafficType === 1);
                if (subPath && subPath.door) {
                    fastTransferText = subPath.door;
                }
            }
            document.getElementById('fast-transfer').innerHTML = `<i class="fas fa-sign-out-alt"></i> 빠른 환승: <b>${fastTransferText}</b>`;
        }

        // === [J. 기상청 API: 날씨 데이터 수신 및 wgs84 좌표 변환] ===
        async function getWeatherDataKMA() {
            // 위경도 -> 기상청 격자좌표 변환 (가장 흔한 JS 스크립트)
            function dfs_xy_conv(code, v1, v2) {
                const RE = 6371.00877, GRID = 5.0, SLAT1 = 30.0, SLAT2 = 60.0, OLON = 126.0, OLAT = 38.0, XO = 43, YO = 136;
                const DEGRAD = Math.PI / 180.0, RADDEG = 180.0 / Math.PI;
                const re = RE / GRID, slat1 = SLAT1 * DEGRAD, slat2 = SLAT2 * DEGRAD, olon = OLON * DEGRAD, olat = OLAT * DEGRAD;
                let sn = Math.tan(Math.PI * 0.25 + slat2 * 0.5) / Math.tan(Math.PI * 0.25 + slat1 * 0.5);
                sn = Math.log(Math.cos(slat1) / Math.cos(slat2)) / Math.log(sn);
                let sf = Math.tan(Math.PI * 0.25 + slat1 * 0.5);
                sf = Math.pow(sf, sn) * Math.cos(slat1) / sn;
                let ro = Math.tan(Math.PI * 0.25 + olat * 0.5);
                ro = re * sf / Math.pow(ro, sn);
                let rs = {};
                if (code == "toXY") {
                    rs['lat'] = v1; rs['lon'] = v2;
                    let ra = Math.tan(Math.PI * 0.25 + (v1) * DEGRAD * 0.5);
                    ra = re * sf / Math.pow(ra, sn);
                    let theta = v2 * DEGRAD - olon;
                    if (theta > Math.PI) theta -= 2.0 * Math.PI;
                    if (theta < -Math.PI) theta += 2.0 * Math.PI;
                    theta *= sn;
                    rs['x'] = Math.floor(ra * Math.sin(theta) + XO + 0.5);
                    rs['y'] = Math.floor(ro - ra * Math.cos(theta) + YO + 0.5);
                }
                return rs;
            }

            const grid = dfs_xy_conv("toXY", state.targetCoords.y, state.targetCoords.x);

            // API 호출 파라미터 계산 (오늘 날짜, 가장 최근 단기예보 베이스 타임)
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const baseDate = `${year}${month}${date}`;

            // 단기예보는 3시간 간격 발표 (0200, 0500... 위키 참조)
            function getBaseTime() {
                const h = now.getHours();
                if (h < 2) return { d: `${year}${month}${String(now.getDate()-1).padStart(2, '0')}`, t: "2300" }; // 새벽 2시 전엔 어제 밤 11시 예보 사용
                if (h < 5) return { d: baseDate, t: "0200" };
                if (h < 8) return { d: baseDate, t: "0500" };
                if (h < 11) return { d: baseDate, t: "0800" };
                if (h < 14) return { d: baseDate, t: "1100" };
                if (h < 17) return { d: baseDate, t: "1400" };
                if (h < 20) return { d: baseDate, t: "1700" };
                if (h < 23) return { d: baseDate, t: "2000" };
                return { d: baseDate, t: "2300" };
            }
            const bt = getBaseTime();

            const response = await fetch(`http://apis.data.go.kr/1360000/VilageFrcstInfoService_2.0/getVilageFrcst?serviceKey=${KMA_KEY}&pageNo=1&numOfRows=500&dataType=JSON&base_date=${bt.d}&base_time=${bt.t}&nx=${grid.x}&ny=${grid.y}`);
            const data = await response.json();

            if (data.response && data.response.body) {
                return data.response.body.items.item;
            }
            return [];
        }

        // === [K. 날씨/옷차림 UI 업데이트 및 선 그래프 생성] ===
        function updateWeatherUI(items) {
            // 1. 필요한 데이터 추출 및 가공
            const hourlyRain = [];
            const tempsInRange = [];
            let targetMaxTemp = -99;
            let targetNightTemp = null;

            items.forEach(item => {
                const fcstHour = parseInt(item.fcstTime.substring(0, 2));
                
                // 오늘 예보만 처리
                if (item.fcstDate === items[0].fcstDate) {
                    // 강수 확률 (POP) -> 페이지 연 시점부터 자정까지 1시간 간격
                    if (item.category === 'POP' && fcstHour >= new Date().getHours()) {
                        hourlyRain.push({ hour: fcstHour, prob: parseInt(item.fcstValue) });
                    }
                    // 기온 (TMP) -> 입력한 도착시간부터 밤 10시까지
                    if (item.category === 'TMP' && fcstHour >= state.targetTime && fcstHour <= NIGHT_TARGET_HOUR) {
                        const temp = parseInt(item.fcstValue);
                        tempsInRange.push(temp);
                        if (fcstHour === NIGHT_TARGET_HOUR) targetNightTemp = temp;
                    }
                }
            });

            if (tempsInRange.length > 0) {
                targetMaxTemp = Math.max(...tempsInRange); // 해당 범위 내 최고 기온
            }

            // 2. 옷차림 추천 카드 업데이트
            if (targetMaxTemp !== -99 && targetNightTemp !== null) {
                document.getElementById('target-temps').innerText = `최고 ${targetMaxTemp}° / 밤10시 ${targetNightTemp}°`;
                
                // 최고 기온(이너)과 밤 10시(아우터)에 해당하는 OUTFIT_DB 구간 찾기 (최대 2칸)
                function findOutfit(temp) {
                    return OUTFIT_DB.find(db => temp >= db.range[0] && temp <= db.range[1]);
                }

                const outfitInner = findOutfit(targetMaxTemp);
                const outfitOuter = findOutfit(targetNightTemp);

                const list = document.getElementById('outfit-list');
                list.innerHTML = '';

                // 이너 추천 (최고 기온)
                if (outfitInner) {
                    const innerRow = `
                        <div class="outfit-row">
                            <i class="outfit-icon fas ${outfitInner.icon}"></i>
                            <div class="outfit-text">
                                <div class="outfit-label">낮 (최고기온 기준)</div>
                                ${outfitInner.text}
                            </div>
                        </div>
                    `;
                    list.innerHTML += innerRow;
                }

                // 아우터 추천 (밤 10시 기온, 이너와 다른 구간일 때만)
                if (outfitOuter && outfitInner && (outfitOuter.text !== outfitInner.text)) {
                    const outerRow = `
                        <div class="outfit-row">
                            <i class="outfit-icon fas ${outfitOuter.icon}" style="color:var(--accent-blue)"></i>
                            <div class="outfit-text">
                                <div class="outfit-label">귀가 (밤 10시 기준 아우터)</div>
                                ${outfitOuter.text}
                            </div>
                        </div>
                    `;
                    list.innerHTML += outerRow;
                }
            }

            // 3. 강수 확률 선 그래프 생성 (Chart.js)
            const labels = hourlyRain.map(d => `${d.hour}시`);
            const probs = hourlyRain.map(d => d.prob);

            if (rainChart) rainChart.destroy(); // 기존 그래프 파괴

            const ctx = document.getElementById('rainChart').getContext('2d');
            rainChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '강수 확률 (%)',
                        data: probs,
                        // 30% 마지노선 기반 동적 스타일링
                        borderColor: (context) => {
                            const val = context.parsed.y;
                            return val >= 30 ? varAccentOrange() : varTextSub();
                        },
                        borderWidth: (context) => {
                            const val = context.parsed.y;
                            return val >= 30 ? 3 : 2;
                        },
                        pointBackgroundColor: (context) => {
                            const val = context.parsed.y;
                            return val >= 30 ? varAccentOrange() : '#fff';
                        },
                        pointRadius: (context) => {
                            const val = context.parsed.y;
                            return val >= 30 ? 4 : 3;
                        },
                        fill: false,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            min: 0, max: 100,
                            ticks: { color: varTextSub(), font: { size: 10 } },
                            grid: { color: '#333' }
                        },
                        x: {
                            ticks: { color: varTextSub(), font: { size: 10 } },
                            grid: { display: false }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        // 30% 마지노선 붉은 점선 (Annotation 플러그인 생략하고 기본으로 그리기)
                        annotation: { /* CDN 필요해서 제외, 그냥 텍스트로 대체 */ }
                    }
                }
            });
            
            // CSS 변수 가져오기용 헬퍼 함수
            function varTextSub() { return getComputedStyle(document.documentElement).getPropertyValue('--text-sub').trim(); }
            function varAccentOrange() { return getComputedStyle(document.documentElement).getPropertyValue('--accent-orange').trim(); }
        }

        // === [Z. 유틸리티: 페이지 초기화] ===
        function resetPage() {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('initial-screen').style.display = 'flex';
            if (rainChart) rainChart.destroy();
            state = { destMode: null, placeName: null, targetTime: null, targetCoords: null };
        }
    </script>
</body>
