<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S26 Premium v29.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000; --card: #151515; --blue: #0a84ff; --green: #30d158; --red: #ff453a; --text: #fff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; }
        .container { padding: 25px; max-width: 500px; margin: 0 auto; }
        
        .header { font-size: 24px; font-weight: 900; color: var(--blue); margin-bottom: 25px; display: flex; align-items: center; justify-content: space-between; }
        .badge { font-size: 10px; background: #333; padding: 4px 8px; border-radius: 6px; color: #aaa; }

        .board { background: var(--card); border: 1px solid #333; border-radius: 20px; padding: 25px; }
        .board-title { font-size: 13px; color: #888; font-weight: bold; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        .train-list { display: flex; flex-direction: column; gap: 15px; }
        .train-item { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid #222; }
        .train-item:last-child { border-bottom: none; padding-bottom: 0; }
        
        .t-dest { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 5px; }
        .t-status { font-size: 14px; color: var(--green); font-weight: bold; }
        
        .door-info { text-align: right; }
        .door-time { font-size: 24px; font-weight: 900; color: var(--blue); }
        .door-label { font-size: 11px; color: #777; font-weight: bold; }

        button { width: 100%; padding: 16px; border-radius: 12px; border: none; background: #222; color: var(--blue); font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 20px; border: 1px solid #333; }
        
        #log { font-size: 12px; color: #555; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span>S26 <span style="color:#fff;">Premium</span></span>
        <span class="badge">LIVE TRACKING</span>
    </div>

    <div class="board">
        <div class="board-title">
            <span>상일동역 5호선 실시간 현황</span>
            <span id="update-time" style="color:var(--blue);">00:00</span>
        </div>
        
        <div id="train-container" class="train-list">
            <div style="text-align: center; color: #555; padding: 30px;">
                <i class="fas fa-spinner fa-spin"></i> 열차 위치 추적 중...
            </div>
        </div>
    </div>

    <button onclick="fetchLiveData()"><i class="fas fa-sync-alt"></i> 수동 새로고침</button>
    <div id="log">대기 중...</div>
</div>

<script>
    const KEY = '597057594f6b696d3438526a7a564e';
    const START = "상일동";
    const MARGIN = 10; // 현관문 마진 (분)

    async function fetchLiveData() {
        const log = document.getElementById('log');
        log.innerHTML = "<span style='color:var(--blue);'>데이터 요청 중...</span>";

        // 포트 8088이 아닌 표준 swopenAPI 사용 (차단 확률 매우 낮음)
        const targetUrl = `http://swopenAPI.seoul.go.kr/api/subway/${KEY}/json/realtimeStationArrival/0/5/${START}`;
        const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;

        try {
            const res = await fetch(proxyUrl);
            const data = await res.json();

            if (!data.realtimeArrivalList) {
                throw new Error("운행 중인 열차가 없거나 데이터를 불러올 수 없습니다.");
            }

            render(data.realtimeArrivalList);
            
            const now = new Date();
            document.getElementById('update-time').innerText = 
                `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')} 갱신`;
            log.innerHTML = "<span style='color:var(--green);'>동기화 완료</span>";

        } catch (e) {
            log.innerHTML = `<span style='color:var(--red);'>오류: ${e.message}</span>`;
        }
    }

    function render(list) {
        const container = document.getElementById('train-container');
        const now = new Date();
        
        // 데이터 파싱 및 UI 생성
        const html = list.map(train => {
            // barvlDt: 도착까지 남은 시간 (초)
            const remainSecs = parseInt(train.barvlDt) || 0;
            const remainMins = Math.floor(remainSecs / 60);
            
            // 현관문 나설 시간 계산
            let doorText = "--:--";
            let doorLabel = "출발 권장 안함";
            let doorColor = "#777";

            if (remainMins > MARGIN) {
                // 아직 마진보다 시간이 많이 남았을 때
                const targetTime = new Date(now.getTime() + (remainMins - MARGIN) * 60000);
                doorText = `${String(targetTime.getHours()).padStart(2,'0')}:${String(targetTime.getMinutes()).padStart(2,'0')}`;
                doorLabel = `${MARGIN}분 마진 출발`;
                doorColor = "var(--blue)";
            } else {
                // 이미 늦었거나 너무 임박했을 때
                doorText = "탑승 불가";
                doorLabel = "다음 열차 이용";
                doorColor = "var(--red)";
            }

            // 하행/상행 정보 깔끔하게 정리 (예: "방화행 - 여의도방면")
            const destName = train.trainLineNm.split('-')[0].trim();

            return `
                <div class="train-item">
                    <div>
                        <div class="t-dest">${destName}</div>
                        <div class="t-status">${train.arvlMsg2}</div>
                    </div>
                    <div class="door-info">
                        <div class="door-time" style="color: ${doorColor};">${doorText}</div>
                        <div class="door-label">${doorLabel}</div>
                    </div>
                </div>
            `;
        }).join('');

        container.innerHTML = html;
    }

    // 초기 실행
    fetchLiveData();
</script>
</body>
</html>
