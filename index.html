<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S26 Debugger v31.0</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Cascadia Code', monospace; padding: 20px; font-size: 14px; }
        .box { background: #111; border: 1px solid #333; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; color: #0a84ff; font-weight: bold; font-size: 12px; }
        input { background: #000; border: 1px solid #555; padding: 12px; color: #fff; width: 100%; box-sizing: border-box; margin-bottom: 15px; border-radius: 5px; outline: none; }
        button { background: #0a84ff; color: #fff; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; }
        button:active { background: #005bb5; }
        #log { background: #050505; border: 1px solid #222; padding: 15px; height: 350px; overflow-y: auto; color: #0f0; line-height: 1.6; font-size: 12px; }
    </style>
</head>
<body>

    <h2 style="color: #0a84ff; margin-top: 0;">S26 통신 디버거 v31.0</h2>
    
    <div class="box">
        <label>조회할 역 이름</label>
        <input type="text" id="station" value="상일동">
        <button onclick="startProxyScan()">프록시 파이프라인 스캔 시작</button>
    </div>

    <div id="log">시스템 대기 중...</div>

<script>
    const KEY = '597057594f6b696d3438526a7a564e';

    function printLog(msg, color = "#0f0") {
        const logBox = document.getElementById('log');
        const timeStr = new Date().toLocaleTimeString();
        logBox.innerHTML += `<div style="color:${color}; margin-bottom:4px;">[${timeStr}] ${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    async function startProxyScan() {
        const station = document.getElementById('station').value.trim().replace(/역$/, "");
        document.getElementById('log').innerHTML = ""; 
        
        const encodedStation = encodeURIComponent(station);
        // 포트 80을 쓰는 표준 실시간 도착 API
        const targetUrl = `http://swopenAPI.seoul.go.kr/api/subway/${KEY}/json/realtimeStationArrival/0/5/${encodedStation}`;
        
        printLog(`[타겟 API] ${targetUrl}`, "#888");

        const proxies = [
            { id: "AllOrigins (Get)", url: `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}` },
            { id: "CorsProxy.io", url: `https://corsproxy.io/?${encodeURIComponent(targetUrl)}` },
            { id: "CodeTabs", url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}` }
        ];

        let success = false;

        for (let i = 0; i < proxies.length; i++) {
            if (success) break;
            
            const p = proxies[i];
            printLog(`------------------------------------`, "#555");
            printLog(`🚀 [테스트 ${i+1}/3] ${p.id} 연결 시도...`, "#ff9f0a");

            try {
                // 10초 이상 걸리면 무조건 강제 종료 (타임아웃 설정)
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);

                const res = await fetch(p.url, { signal: controller.signal });
                clearTimeout(timeoutId);

                printLog(`상태 코드: ${res.status}`);

                let rawText = await res.text();
                
                // AllOrigins의 get 방식은 contents 안에 원본 데이터를 숨겨둠
                if (p.id.includes("AllOrigins")) {
                    try {
                        const wrapper = JSON.parse(rawText);
                        rawText = wrapper.contents; 
                    } catch(e) {}
                }

                // 응답 데이터 서두 검사
                if (!rawText || rawText.trim().startsWith("<!DOCTYPE") || rawText.trim().startsWith("<html")) {
                    printLog("❌ 결과: 프록시 서버 에러 페이지 반환 (HTML)", "#ff453a");
                    continue;
                }

                // JSON 파싱 시도
                const data = JSON.parse(rawText);
                
                if (data.errorMessage && data.errorMessage.code !== "INFO-000") {
                    printLog(`❌ 서울시 서버 에러: ${data.errorMessage.message}`, "#ff453a");
                    return; // 키 문제이므로 다른 프록시를 테스트할 필요 없음
                }

                if (data.realtimeArrivalList) {
                    printLog(`✅ 관통 성공! 열차 데이터 ${data.realtimeArrivalList.length}개 수신됨.`, "#30d158");
                    printLog(`첫 열차: ${data.realtimeArrivalList[0].trainLineNm} (${data.realtimeArrivalList[0].arvlMsg2})`, "#30d158");
                    printLog(`★ 앞으로 코드를 짤 때 [${p.id}] 프록시를 메인으로 사용하세요.`, "#0a84ff");
                    success = true;
                } else {
                    printLog("❌ 데이터는 받았으나 realtimeArrivalList가 없습니다.", "#ff453a");
                }

            } catch (e) {
                if (e.name === 'AbortError') {
                    printLog("❌ 결과: 10초 타임아웃 (서버 무응답)", "#ff453a");
                } else {
                    printLog(`❌ 연결 실패: ${e.message}`, "#ff453a");
                }
            }
        }

        if (!success) {
            printLog(`====================================`, "#555");
            printLog("❌ 3개의 프록시가 모두 실패했습니다.", "#ff453a");
            printLog("현재 모바일 데이터 망이나 브라우저 설정에서 외부 프록시 호출 자체를 막고 있을 확률이 매우 높습니다.", "#ff453a");
        }
    }
</script>

</body>
</html>
