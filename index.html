<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S26 Premium - Hybrid Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000; --card: #151515; --blue: #0a84ff; --green: #30d158; --red: #ff453a; --text: #fff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        .header { font-size: 24px; font-weight: 900; color: var(--blue); margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        .badge { font-size: 10px; background: #333; padding: 4px 8px; border-radius: 6px; color: var(--green); letter-spacing: 1px; }

        .section { background: var(--card); border: 1px solid #333; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .step-title { font-size: 13px; color: var(--blue); margin-bottom: 15px; font-weight: 900; }
        
        label { display: block; font-size: 12px; color: #888; margin-bottom: 8px; font-weight: bold; }
        input { width: 100%; background: #000; border: 1px solid #444; border-radius: 10px; padding: 12px; color: #fff; font-size: 14px; box-sizing: border-box; margin-bottom: 15px; outline: none; }
        
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--blue); color: #fff; font-weight: 900; font-size: 15px; cursor: pointer; transition: 0.2s; margin-bottom: 10px; display: block; text-align: center; text-decoration: none; box-sizing: border-box; }
        .btn-green { background: var(--green); color: #000; }
        
        textarea { width: 100%; height: 80px; background: #000; border: 1px solid #444; border-radius: 10px; padding: 10px; color: #0f0; font-family: monospace; font-size: 11px; box-sizing: border-box; resize: vertical; margin-bottom: 10px; }

        .result-card { background: linear-gradient(145deg, #1a1a1c, #000); border: 1px solid var(--blue); border-radius: 24px; padding: 30px 20px; text-align: center; display: none; }
        .door-time { font-size: 70px; font-weight: 900; color: var(--blue); letter-spacing: -3px; line-height: 1; margin: 15px 0; }
        .train-info { font-size: 16px; color: var(--green); font-weight: bold; margin-bottom: 15px; }
        .meta-info { font-size: 13px; color: #777; border-top: 1px solid #222; padding-top: 15px; line-height: 1.6; }

        #log { background: #050505; border: 1px solid #222; padding: 15px; height: 150px; overflow-y: auto; color: #0f0; font-size: 11px; margin-top: 20px; border-radius: 8px; font-family: 'Cascadia Code', monospace; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span>S26 <span style="color:#fff;">Premium</span></span>
        <span class="badge">DEBUG MODE ON</span>
    </div>

    <div class="section">
        <div class="step-title">STEP 1. 목적지 및 시간 설정</div>
        <label>도착역 (예: 서울역, 강남)</label>
        <input type="text" id="dest" value="서울역">
        
        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;"><label>조회 날짜</label><input type="date" id="date"></div>
            <div style="flex: 1;"><label>승강장 도착 기준 시각</label><input type="time" id="time"></div>
        </div>
        
        <p style="font-size: 11px; color: #666; margin-top: 0;">※ 팁: '오후 2시까지 도착'을 원하시면, 소요시간(약 45분)을 고려해 '오후 1시'로 검색하세요.</p>
        
        <button class="btn" onclick="generateAndOpenURL()"><i class="fas fa-external-link-alt"></i> 서울시 원본 데이터 뽑기 (새 창)</button>
    </div>

    <div class="section">
        <div class="step-title">STEP 2. 데이터 주입 및 시간 역산</div>
        <textarea id="xml-input" placeholder="새 창에 뜬 알수없는 영어들(XML)을 전체 복사해서 여기에 붙여넣으세요!"></textarea>
        <button class="btn btn-green" onclick="calculateFromXML()"><i class="fas fa-calculator"></i> 현관문 출발 시간 계산</button>
    </div>

    <div id="result" class="result-card">
        <div style="font-size: 14px; color: #aaa; font-weight: bold;">이 열차를 타기 위한 현관문 출발 시각</div>
        <div id="res-door" class="door-time">--:--</div>
        <div id="res-train" class="train-info"></div>
        <div id="res-meta" class="meta-info"></div>
    </div>

    <div id="log">시스템 준비 완료. STEP 1부터 진행해주세요.</div>
</div>

<script>
    const KEY = '597057594f6b696d3438526a7a564e';
    const START = "상일동";
    const MARGIN = 10;

    window.onload = () => {
        const now = new Date();
        document.getElementById('date').value = now.toISOString().slice(0, 10);
        document.getElementById('time').value = now.toTimeString().slice(0, 5);
    };

    function printLog(msg, type = "") {
        const logBox = document.getElementById('log');
        let color = "#0f0";
        if (type === "error") color = "var(--red)";
        if (type === "warning") color = "#ff9f0a";
        
        const timeStr = new Date().toLocaleTimeString();
        logBox.innerHTML += `<div style="color:${color}; margin-bottom:4px;">[${timeStr}] ${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    // STEP 1: 완벽한 URL을 생성하고 새 탭으로 여는 함수
    function generateAndOpenURL() {
        const dest = document.getElementById('dest').value.trim();
        const date = document.getElementById('date').value; // YYYY-MM-DD
        const time = document.getElementById('time').value; // HH:MM
        
        if (!dest) return alert("도착역을 입력하세요.");

        // API가 요구하는 형식: "2026-03-26 14:00:00" -> 인코딩: "2026-03-26%2014:00:00"
        const formattedDateTime = `${date} ${time}:00`;
        const encodedDateTime = encodeURIComponent(formattedDateTime);
        
        // 공백(%20)과 대문자 Y를 완벽하게 조합한 최종 주소
        const targetUrl = `http://openapi.seoul.go.kr:8088/${KEY}/xml/getShtrmPath/1/5/${START}/${dest}/${encodedDateTime}/1/%20/%20/Y`;
        
        printLog(`생성된 API 주소: ${targetUrl}`);
        printLog("새 창에서 서울시 서버로 직접 접속합니다. (CORS 우회 완료)", "warning");
        
        window.open(targetUrl, '_blank');
    }

    // STEP 2: 복사해 온 데이터를 해석하고 계산하는 함수
    function calculateFromXML() {
        const xmlText = document.getElementById('xml-input').value.trim();
        document.getElementById('result').style.display = 'none';
        printLog("----------------------------------");
        
        if (!xmlText) {
            printLog("오류: 입력된 데이터가 없습니다.", "error");
            return;
        }

        printLog("데이터 구조 분석 시작...");

        try {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "text/xml");

            const resultCode = xmlDoc.getElementsByTagName("resultCode")[0]?.textContent;
            if (resultCode && resultCode !== "00") {
                const msg = xmlDoc.getElementsByTagName("resultMsg")[0]?.textContent;
                throw new Error(`서울시 서버가 거부했습니다: ${msg}`);
            }

            const trainTimeNode = xmlDoc.getElementsByTagName("trainDptreTm")[0];
            if (!trainTimeNode || !trainTimeNode.textContent) {
                throw new Error("<trainDptreTm> 필드가 없습니다. 날짜나 역 이름(예: 서울역)이 정확한지 확인하세요.");
            }

            const trainTime = trainTimeNode.textContent; // 예: "14:04:00"
            const travelTime = xmlDoc.getElementsByTagName("totalreqHr")[0]?.textContent || "0"; 
            const destNode = xmlDoc.getElementsByTagName("arvlStn");
            const finalDest = destNode.length > 0 ? destNode[destNode.length - 1].getElementsByTagName("stnNm")[0]?.textContent : "도착역";

            printLog(`데이터 확인! 실제 열차 출발 시간: ${trainTime}`);

            // 수학적 역산
            let [h, m, s] = trainTime.split(':').map(Number);
            let totalMins = (h * 60 + m) - MARGIN;
            
            // 날짜/시간 보정 (음수가 나올 경우 전날로 계산)
            if (totalMins < 0) totalMins += 24 * 60;
            
            let doorH = Math.floor(totalMins / 60);
            let doorM = totalMins % 60;

            // 결과 출력
            document.getElementById('result').style.display = 'block';
            document.getElementById('res-door').innerText = `${String(doorH).padStart(2,'0')}:${String(doorM).padStart(2,'0')}`;
            document.getElementById('res-train').innerText = `상일동역 ${trainTime} 출발 열차 기준`;
            
            // 예상 도착 시각 계산 로직
            let arrMins = (h * 60 + m) + Math.ceil(Number(travelTime) / 60);
            let arrH = Math.floor(arrMins / 60) % 24;
            let arrM = arrMins % 60;

            document.getElementById('res-meta').innerHTML = `
                <b style="color:#fff;">${START} ➔ ${finalDest}</b><br>
                목적지 예상 도착 시각: 약 ${String(arrH).padStart(2,'0')}:${String(arrM).padStart(2,'0')}<br>
                순수 이동 시간: ${Math.ceil(Number(travelTime)/60)}분
            `;

            printLog("역산 알고리즘 완료. 결과를 확인하세요.");

        } catch (e) {
            printLog(`에러 발생: ${e.message}`, "error");
        }
    }
</script>
</body>
</html>
