<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S26 Premium v45.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000; --card: #151515; --blue: #0a84ff; --green: #30d158; --red: #ff453a; --text: #fff; --orange: #ff9f0a; --purple: #bf5af2; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 50px; }
        .header { font-size: 24px; font-weight: 900; color: var(--blue); margin-bottom: 25px; display: flex; align-items: center; justify-content: space-between; }
        .badge { font-size: 10px; background: #333; padding: 4px 8px; border-radius: 6px; color: var(--purple); letter-spacing: 1px; }
        .input-box { background: var(--card); border: 1px solid #333; border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 8px; font-weight: bold; }
        input[type="text"], input[type="time"] { width: 100%; background: #000; border: 1px solid #444; border-radius: 12px; padding: 15px; color: #fff; font-size: 16px; box-sizing: border-box; margin-bottom: 20px; outline: none; font-weight: bold; }
        
        .radio-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .radio-label { flex: 1; text-align: center; background: #000; border: 1px solid #444; border-radius: 12px; padding: 12px; color: #aaa; font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .radio-label.active { background: var(--blue); color: #fff; border-color: var(--blue); }
        input[type="radio"] { display: none; }

        button { width: 100%; padding: 18px; border-radius: 14px; border: none; background: var(--blue); color: #fff; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.2s; }
        
        #station-selector { display: none; margin-bottom: 20px; }
        .station-btn { background: #222; border: 1px solid #444; color: #fff; padding: 15px; margin-bottom: 10px; border-radius: 12px; text-align: left; display: flex; justify-content: space-between; align-items: center; width: 100%; cursor: pointer; }
        
        .result-card { background: linear-gradient(145deg, #1a1a1c, #000); border: 1px solid var(--blue); border-radius: 24px; padding: 30px 20px; text-align: center; display: none; margin-top: 20px; }
        .door-time { font-size: 75px; font-weight: 900; color: var(--blue); letter-spacing: -3px; margin: 15px 0; }
        .train-info { font-size: 16px; color: var(--green); font-weight: bold; margin-bottom: 20px; }
        
        .weather-box { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; margin-bottom: 20px; text-align: left; border: 1px solid #333; }
        .w-header { font-size: 14px; color: var(--orange); font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .chart-container { position: relative; height: 150px; width: 100%; margin-top: 15px; }

        #log { background: #050505; border: 1px solid #222; padding: 15px; height: 180px; overflow-y: auto; color: #0f0; font-size: 11px; margin-top: 20px; border-radius: 12px; font-family: 'Cascadia Code', monospace; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span>S26 <span style="color:#fff;">Premium</span></span>
        <span class="badge">v45.0</span>
    </div>

    <div class="input-box">
        <label>계산 모드</label>
        <div class="radio-group">
            <label class="radio-label active" id="label-A"><input type="radio" name="mode" value="A" checked onchange="toggleMode()"> 경로 자동 비교/최적화</label>
            <label class="radio-label" id="label-B"><input type="radio" name="mode" value="B" onchange="toggleMode()"> 근처 역 직접 선택</label>
        </div>

        <label>최종 목적지 (출발: 상일동 고정)</label>
        <input type="text" id="dest" value="롯데월드 어드벤처">
        
        <label>목표 도착 시각 (24H)</label>
        <input type="time" id="time" value="14:00">
        
        <button onclick="startEngine()"><i class="fas fa-subway"></i> 배차 스캔 시작</button>
    </div>

    <div id="station-selector">
        <label style="color:var(--purple); font-size:14px; margin-bottom:10px; display:block;">도보 이동이 가능한 주변 역</label>
        <div id="station-list"></div>
    </div>

    <div id="result" class="result-card">
        <div style="font-size: 14px; color: #aaa; font-weight: bold;">현관문을 나서야 할 시각</div>
        <div id="res-door" class="door-time">--:--</div>
        <div id="res-train" class="train-info"></div>
        
        <div id="res-weather" class="weather-box">
            <div class="w-header"><i class="fas fa-temperature-high"></i> 외출 시간대 온도 스펙트럼 & 코디</div>
            <div id="w-temp" style="font-size: 16px; font-weight: bold; color: #fff;"></div>
            <div id="w-clothes" style="font-size:13px; color:#ddd; margin-top:10px; line-height:1.6;"></div>
            
            <div class="w-header" style="margin-top:20px; font-size:13px; color:var(--blue); border:none;"><i class="fas fa-umbrella"></i> 강수 확률 그래프 (40% 이상 경고)</div>
            <div class="chart-container"><canvas id="rainChart"></canvas></div>
        </div>

        <div id="res-meta" style="font-size: 13px; color: #888; border-top: 1px solid #222; padding-top: 15px; line-height: 1.6;"></div>
    </div>

    <div id="log">시스템 대기 중. (v45.0)</div>
</div>

<script>
    const CONFIG = {
        KAKAO: '56b6a0adbc28cab6f7c87ac9f84b14d0',
        SEOUL: '597057594f6b696d3438526a7a564e',
        KMA: 'ddfd71d0b929827fd9c3c1851b50c301f9afb482a3143c0b39e135f9b3b8f070',
        // 사용자님이 발급하신 정확한 프록시 주소 하드코딩 완료
        PROXY: 'https://script.google.com/macros/s/AKfycbxRODYhCj2NupEwxZm7YEigfFM_N_wg5TXUHWGtDvirC_clahAQgx7Z4bT94rJX9fZWtg/exec',
        MARGIN: 10
    };

    let rainChart = null;

    function printLog(msg, color = "#0f0") {
        const log = document.getElementById('log');
        log.innerHTML += `<div style="color:${color}; margin-bottom:4px;">> ${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    function toggleMode() {
        const mode = document.querySelector('input[name="mode"]:checked').value;
        document.getElementById('label-A').classList.toggle('active', mode === 'A');
        document.getElementById('label-B').classList.toggle('active', mode === 'B');
        document.getElementById('station-selector').style.display = 'none';
        document.getElementById('result').style.display = 'none';
    }

    function hmToMins(timeStr) {
        let [h, m] = timeStr.split(':').map(Number);
        return h * 60 + m;
    }
    
    function minsToHm(mins) {
        let m = Math.round(mins);
        while(m < 0) m += 24 * 60;
        m = m % (24 * 60);
        return `${String(Math.floor(m / 60)).padStart(2,'0')}:${String(m % 60).padStart(2,'0')}`;
    }

    // 이름 정규화
    function cleanStationName(name) {
        return name.split(' ')[0].split('(')[0].replace(/역$/, '').trim();
    }

    async function startEngine() {
        const dest = document.getElementById('dest').value.trim();
        const targetTime = document.getElementById('time').value;
        const mode = document.querySelector('input[name="mode"]:checked').value;

        document.getElementById('result').style.display = 'none';
        document.getElementById('log').innerHTML = "";

        try {
            printLog("1. 카카오 API 목적지 스캔...");
            const kRes = await fetch(`https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent(dest)}`, {
                headers: { Authorization: `KakaoAK ${CONFIG.KAKAO}` }
            });
            const kData = await kRes.json();
            if(!kData.documents[0]) throw new Error("장소를 찾을 수 없습니다.");
            
            const { x: destX, y: destY, place_name: placeName } = kData.documents[0];
            
            processKMAWeather(destY, destX, parseInt(targetTime.split(':')[0]));

            printLog("2. 주변 지하철역 스캔 및 도보 시간 확보...");
            const sRes = await fetch(`https://dapi.kakao.com/v2/local/search/category.json?category_group_code=SW8&x=${destX}&y=${destY}&radius=2000&sort=distance`, {
                headers: { Authorization: `KakaoAK ${CONFIG.KAKAO}` }
            });
            const sData = await sRes.json();
            
            let stations = [];
            let seen = new Set();
            sData.documents.forEach(d => {
                let name = cleanStationName(d.place_name); 
                if (!seen.has(name)) {
                    seen.add(name);
                    stations.push({ name: name, walk: Math.ceil(d.distance / 80) });
                }
            });

            if (mode === 'A') {
                printLog(`[모드 A] 상위 3개 역의 최적경로를 연산합니다...`);
                let bestRoute = null;
                let minTotalMins = Infinity;

                for(let i=0; i<Math.min(3, stations.length); i++) {
                    let stn = stations[i];
                    let subMins = 30;
                    try {
                        const d = new Date();
                        const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                        
                        const probeApi = `http://openapi.seoul.go.kr:8088/${CONFIG.SEOUL}/xml/getShtrmPath/1/1/상일동/${stn.name}/${dateStr} 12:00:00/1/%20/%20/Y`;
                        const probeRes = await fetch(`${CONFIG.PROXY}?url=${encodeURIComponent(probeApi)}`);
                        const xml = new DOMParser().parseFromString(await probeRes.text(), "text/xml");
                        
                        if (xml.getElementsByTagName("resultCode")[0]?.textContent === "00") {
                            subMins = Math.ceil(Number(xml.getElementsByTagName("totalreqHr")[0]?.textContent) / 60);
                        }
                    } catch(e) {}
                    
                    let totalRouteMins = subMins + stn.walk;
                    printLog(`비교: [${stn.name}] 지하철 ${subMins}분 + 도보 ${stn.walk}분 = 총 ${totalRouteMins}분`);
                    
                    if (totalRouteMins < minTotalMins) {
                        minTotalMins = totalRouteMins;
                        bestRoute = { ...stn, subMins };
                    }
                }

                if(!bestRoute) throw new Error("경로를 연산할 수 없습니다.");
                printLog(`✅ 수학적 최적 경로 선정: [${bestRoute.name}]역 경로`);

                await findRealTrain(bestRoute.name, hmToMins(targetTime), bestRoute.walk, placeName, targetTime, bestRoute.subMins);
                
            } else {
                let html = '';
                stations.slice(0, 5).forEach(s => {
                    html += `<button class="station-btn" onclick="findRealTrain('${s.name}', ${hmToMins(targetTime)}, ${s.walk}, '${placeName}', '${targetTime}', 30)">
                        <span><i class="fas fa-subway"></i> ${s.name}역</span><span style="color:var(--orange)">도보 ${s.walk}분</span></button>`;
                });
                document.getElementById('station-list').innerHTML = html;
                document.getElementById('station-selector').style.display = 'block';
            }
        } catch(e) { printLog(`❌ 시스템 에러: ${e.message}`, "#ff453a"); }
    }

    // 핵심: 배차표 스캔
    async function findRealTrain(stnName, targetMins, walkMins, placeName, targetTimeStr, subMins) {
        document.getElementById('station-selector').style.display = 'none';
        
        const limitMins = targetMins - walkMins;
        const expectedDepMins = limitMins - subMins;
        
        const d = new Date();
        const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        
        let bestTrain = null;
        let minDiff = Infinity;

        try {
            printLog(`3. 서울시 서버 접속: [${stnName}] 배차표 정밀 스캔...`);
            
            const offsets = [-40, -10];
            let allTrains = [];

            for(let off of offsets) {
                let reqMins = expectedDepMins + off;
                let reqTimeStr = minsToHm(reqMins) + ':00';
                
                let apiUrl = `http://openapi.seoul.go.kr:8088/${CONFIG.SEOUL}/xml/getShtrmPath/1/5/상일동/${stnName}/${dateStr} ${reqTimeStr}/1/%20/%20/Y`;
                let res = await fetch(`${CONFIG.PROXY}?url=${encodeURIComponent(apiUrl)}`);
                let xmlText = await res.text();
                let xml = new DOMParser().parseFromString(xmlText, "text/xml");
                
                let paths = xml.getElementsByTagName("path");
                for(let i=0; i<paths.length; i++) {
                    let dep = paths[i].getElementsByTagName("trainDptreTm")[0]?.textContent;
                    let arr = paths[i].getElementsByTagName("trainArvlTm")[paths[i].getElementsByTagName("trainArvlTm").length - 1]?.textContent;
                    
                    if(dep && arr) {
                        allTrains.push({ dep, arr, arrM: hmToMins(arr), depM: hmToMins(dep) });
                    }
                }
            }

            if(allTrains.length > 0) {
                allTrains.forEach(t => {
                    let diff = limitMins - t.arrM;
                    if(diff < -720) diff += 1440;
                    if(diff > 720) diff -= 1440;

                    if(diff >= 0 && diff < minDiff) {
                        minDiff = diff;
                        bestTrain = t;
                    }
                });
            }
        } catch(e) {
            console.error(e);
        }

        document.getElementById('result').style.display = 'block';

        if(bestTrain) {
            printLog(`✅ 스캔 성공! [${bestTrain.dep} 출발 ➔ ${bestTrain.arr} 하차] 열차 확정`, "#30d158");
            const doorMins = bestTrain.depM - CONFIG.MARGIN;
            document.getElementById('res-door').innerText = minsToHm(doorMins);
            document.getElementById('res-train').innerText = `상일동역 ${bestTrain.dep} 출발 열차 기준 (-${CONFIG.MARGIN}분 마진)`;
            document.getElementById('res-meta').innerHTML = `
                목적지: ${placeName} (${targetTimeStr} 도착 목표)<br>
                이동 계획: 하차역(${stnName}) 도착 후 도보 ${walkMins}분<br>
                <span style="color:var(--green)">하차역 실제 도착 예정 시각: ${bestTrain.arr}</span>
            `;
        } else {
            printLog(`⚠️ 서울시 서버 배차 응답 지연. 정밀 평균 소요시간(${subMins}분)으로 마지노선 대체.`, "#ff9f0a");
            const doorMins = expectedDepMins - CONFIG.MARGIN;
            document.getElementById('res-door').innerText = minsToHm(doorMins);
            document.getElementById('res-train').innerText = `상일동역 ${minsToHm(expectedDepMins)} 경 탑승 권장 (실시간 지연 방어)`;
            document.getElementById('res-meta').innerHTML = `
                목적지: ${placeName} (${targetTimeStr} 도착 목표)<br>
                이동 계획: 지하철 약 ${subMins}분 + 도보 ${walkMins}분<br>
                <span style="color:var(--orange)">하차역(${stnName}) 도착 마지노선: ${minsToHm(limitMins)}</span>
            `;
        }
    }

    // 기상청 데이터 처리
    async function processKMAWeather(lat, lon, targetH) {
        const grid = dfs_xy_conv(lat, lon);
        const baseDate = new Date().toISOString().slice(0,10).replace(/-/g, '');
        const url = `https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst?serviceKey=${CONFIG.KMA}&numOfRows=1000&pageNo=1&base_date=${baseDate}&base_time=0200&nx=${grid.nx}&ny=${grid.ny}&dataType=JSON`;
        
        try {
            const res = await fetch(`${CONFIG.PROXY}?url=${encodeURIComponent(url)}`);
            const data = await res.json();
            const items = data.response.body.items.item;
            let hourly = {};
            items.forEach(i => { if(!hourly[i.fcstTime]) hourly[i.fcstTime]={}; hourly[i.fcstTime][i.category]=i.fcstValue; });
            
            const times = Object.keys(hourly).sort().filter(t => parseInt(t.slice(0,2)) >= targetH && parseInt(t.slice(0,2)) <= 22);
            if(times.length === 0) return;

            const temps = times.map(t => parseFloat(hourly[t].TMP));
            const pops = times.map(t => parseInt(hourly[t].POP));
            
            const minT = Math.round(Math.min(...temps));
            const maxT = Math.round(Math.max(...temps));

            const rules = [
                { min: 28, max: 99, text: "민소매, 반팔, 반바지" },
                { min: 23, max: 27, text: "반팔, 얇은 셔츠/바지" },
                { min: 20, max: 22, text: "긴팔 티셔츠, 얇은 가디건" },
                { min: 17, max: 19, text: "얇은 니트, 맨투맨, 가을 자켓" },
                { min: 12, max: 16, text: "자켓, 야상, 두꺼운 가디건" },
                { min: 9, max: 11, text: "트렌치코트, 야상, 점퍼" },
                { min: 5, max: 8, text: "코트, 가죽자켓, 히트텍" },
                { min: -99, max: 4, text: "패딩, 두꺼운 코트, 방한용품" }
            ];

            let recommendations = [];
            rules.forEach(r => {
                if (r.min <= maxT && r.max >= minT) recommendations.push(`- ${r.text}`);
            });

            document.getElementById('w-temp').innerText = `기온: 최저 ${minT}°C ~ 최고 ${maxT}°C`;
            document.getElementById('w-clothes').innerHTML = `<b>이 구간 추천 코디:</b><br>${recommendations.join('<br>')}`;
            
            if(rainChart) rainChart.destroy();
            const pointColors = pops.map(p => p >= 40 ? '#ff453a' : '#0a84ff');
            rainChart = new Chart(document.getElementById('rainChart'), {
                type: 'line',
                data: { labels: times.map(t=>t.slice(0,2)+'시'), datasets: [{ data: pops, borderColor: '#0a84ff', backgroundColor: 'rgba(10,132,255,0.1)', borderWidth: 2, pointBackgroundColor: pointColors, fill: true }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min: 0, max: 100, ticks: {color: '#888'}, grid: {color: '#333'} }, x: { ticks: {color: '#888'} } } }
            });
        } catch(e) {}
    }

    function dfs_xy_conv(v1, v2) {
        const RE = 6371.00877, GRID = 5.0, SLAT1 = 30.0, SLAT2 = 60.0, OLON = 126.0, OLAT = 38.0, XO = 43, YO = 136, DEGRAD = Math.PI / 180.0;
        const re = RE / GRID, slat1 = SLAT1 * DEGRAD, slat2 = SLAT2 * DEGRAD, olon = OLON * DEGRAD, olat = OLAT * DEGRAD;
        let sn = Math.log(Math.cos(slat1) / Math.cos(slat2)) / Math.log(Math.tan(Math.PI * 0.25 + slat2 * 0.5) / Math.tan(Math.PI * 0.25 + slat1 * 0.5));
        let sf = Math.pow(Math.tan(Math.PI * 0.25 + slat1 * 0.5), sn) * Math.cos(slat1) / sn;
        let ro = re * sf / Math.pow(Math.tan(Math.PI * 0.25 + olat * 0.5), sn);
        let ra = re * sf / Math.pow(Math.tan(Math.PI * 0.25 + v1 * DEGRAD * 0.5), sn);
        let theta = v2 * DEGRAD - olon;
        if (theta > Math.PI) theta -= 2.0 * Math.PI; if (theta < -Math.PI) theta += 2.0 * Math.PI;
        return { nx: Math.floor(ra * Math.sin(theta * sn) + XO + 0.5), ny: Math.floor(ro - ra * Math.cos(theta * sn) + YO + 0.5) };
    }
</script>
</body>
</html>
