<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S26 Debugger v30.0</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Cascadia Code', monospace; padding: 20px; font-size: 14px; }
        .box { background: #111; border: 1px solid #333; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; color: #0a84ff; font-weight: bold; font-size: 12px; }
        input { background: #000; border: 1px solid #555; padding: 12px; color: #fff; width: 100%; box-sizing: border-box; margin-bottom: 15px; border-radius: 5px; outline: none; }
        button { background: #0a84ff; color: #fff; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; }
        button:active { background: #005bb5; }
        #log { background: #050505; border: 1px solid #222; padding: 15px; height: 350px; overflow-y: auto; color: #0f0; line-height: 1.6; font-size: 12px; }
        .error { color: #ff453a; }
        .success { color: #30d158; }
        .warning { color: #ff9f0a; }
    </style>
</head>
<body>

    <h2 style="color: #0a84ff; margin-top: 0;">S26 통신 디버거 v30.0</h2>
    
    <div class="box">
        <label>조회할 역 이름 (한글 깨짐 테스트용)</label>
        <input type="text" id="station" value="상일동">
        <button onclick="runDebug()">실시간 데이터 정밀 분석 시작</button>
    </div>

    <div id="log">시스템 대기 중... 디버깅 모드 ON.</div>

<script>
    const KEY = '597057594f6b696d3438526a7a564e';

    function printLog(msg, type = "normal") {
        const logBox = document.getElementById('log');
        let color = "#0f0";
        if (type === "error") color = "#ff453a";
        if (type === "success") color = "#30d158";
        if (type === "warning") color = "#ff9f0a";
        
        const timeStr = new Date().toLocaleTimeString();
        logBox.innerHTML += `<div style="color:${color}; margin-bottom:4px;">[${timeStr}] ${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    async function runDebug() {
        const station = document.getElementById('station').value.trim().replace(/역$/, "");
        document.getElementById('log').innerHTML = ""; // 로그 초기화
        
        printLog(`[실시간 API 분석 시작] 타겟 역: ${station}`);

        // [수학적 보정] 프록시를 거칠 때 한글이 깨지는 것을 방지하기 위해 이중 인코딩 적용
        const encodedStation = encodeURIComponent(station);
        const targetUrl = `http://swopenAPI.seoul.go.kr/api/subway/${KEY}/json/realtimeStationArrival/0/5/${encodedStation}`;
        printLog(`생성된 타겟 URL: ${targetUrl}`);

        // 이번엔 CORS 이슈가 가장 적은 AllOrigins Raw를 메인으로 사용
        const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;
        printLog(`프록시 호출: AllOrigins (Raw Mode)`, "warning");

        try {
            const res = await fetch(proxyUrl);
            printLog(`HTTP 상태 코드: ${res.status}`);

            const text = await res.text();
            printLog(`수신된 데이터 크기: ${text.length} bytes`);

            // 방화벽 차단(HTML 반환) 여부 검사
            if (text.trim().startsWith("<!DOCTYPE") || text.trim().startsWith("<html")) {
                printLog("❌ 프록시 또는 서버가 에러 페이지(HTML)를 반환했습니다.", "error");
                printLog(`내용: ${text.substring(0, 100).replace(/</g, "&lt;")}`, "error");
                return;
            }

            printLog("✅ JSON 파싱 시도 중...");
            const data = JSON.parse(text);

            // 1. 서울시 서버 내부 에러메시지 확인
            if (data.errorMessage && data.errorMessage.code !== "INFO-000") {
                 printLog(`❌ 서울시 API 거부 (코드: ${data.errorMessage.code})`, "error");
                 printLog(`메시지: ${data.errorMessage.message}`, "error");
                 return;
            }
            if (data.RESULT && data.RESULT.CODE !== "INFO-000") {
                 printLog(`❌ 서울시 API 거부 (코드: ${data.RESULT.CODE})`, "error");
                 printLog(`메시지: ${data.RESULT.MESSAGE}`, "error");
                 return;
            }

            // 2. 실제 데이터 존재 여부 확인
            if (data.realtimeArrivalList && data.realtimeArrivalList.length > 0) {
                printLog(`✅ 정상! 실시간 열차 데이터 ${data.realtimeArrivalList.length}개 발견.`, "success");
                data.realtimeArrivalList.forEach((train, idx) => {
                    printLog(`[${idx+1}] ${train.trainLineNm} / ${train.arvlMsg2}`, "success");
                });
            } else {
                printLog("❌ 응답은 받았으나 'realtimeArrivalList'가 비어있습니다.", "error");
                printLog(`서버가 반환한 최상위 변수들: ${Object.keys(data).join(", ")}`, "warning");
                // 원본 데이터 일부 출력
                printLog(`원본 텍스트 일부: ${text.substring(0, 150)}...`, "warning");
            }

        } catch (e) {
            printLog(`❌ 치명적 자바스크립트 오류: ${e.message}`, "error");
        }
    }
</script>

</body>
</html>
